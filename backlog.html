<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Backlog IAF · Squad Finza</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --finza-blue:#1A1AFF;--finza-blue-deep:#0F0F8C;--finza-blue-soft:#E8E8FF;--finza-dark:#0A0A2E;
  --bg:#F2F2F2;--surface:#FFFFFF;--surface-hover:#FAFAFC;--ghost:#C8C8D4;
  --text:#0A0A2E;--text-muted:#5C5C7A;--text-subtle:#9090A8;
  --border:#D8D8E5;--border-soft:#ECECF2;
  --success:#10B981;--success-soft:#D1FAE5;--warning:#F59E0B;--warning-soft:#FEF3C7;
  --danger:#EF4444;--danger-soft:#FEE2E2;--info:#0EA5E9;--info-soft:#E0F2FE;
  --urgent:#DC2626;--urgent-soft:#FEE2E2;
  --f-bitrix:#FF6B35;--f-torre:#1A1AFF;--f-clara:#00B8D4;--f-esperanza:#0F0F8C;
  --f-valentina:#6B5BFF;--f-livia:#D946EF;--f-estrategica:#8B5CF6;
  --st-a-refinar:#9CA3AF;--st-em-refinamento:#F59E0B;--st-refinado:#0EA5E9;
  --st-em-curso:#1A1AFF;--st-bloqueado:#EF4444;--st-validacao:#A855F7;--st-entregue:#10B981;--st-cancelado:#6B7280;
  --font-sans:'Inter',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace;
  --sidebar-w:252px;--topbar-h:54px;
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;
  --shadow-sm:0 1px 2px rgba(10,10,46,.06);--shadow-md:0 4px 12px rgba(10,10,46,.08);--shadow-lg:0 20px 40px rgba(10,10,46,.18);
}
*,*::before,*::after{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:var(--font-sans);font-size:13.5px;line-height:1.55;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}
input,select{font:inherit;color:inherit}
a{color:var(--finza-blue);text-decoration:none;cursor:pointer}
a:hover{text-decoration:underline}
:focus-visible{outline:2px solid var(--finza-blue);outline-offset:2px;border-radius:4px}

.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;background:var(--finza-dark);color:#fff;display:flex;flex-direction:column;padding:18px 12px;overflow-y:auto;z-index:10}
.brand{display:flex;align-items:baseline;gap:8px;padding:6px 10px 20px}
.brand .mark{color:var(--finza-blue);font-size:14px;font-weight:700}
.brand .name{font-size:14px;font-weight:700;color:#fff;letter-spacing:.04em}
.brand .tag{margin-left:auto;font-family:var(--font-mono);font-size:9px;color:rgba(255,255,255,.42);letter-spacing:.08em;text-transform:uppercase}
.side-section{font-size:10px;letter-spacing:.14em;color:rgba(255,255,255,.42);text-transform:uppercase;padding:14px 12px 6px;font-weight:700}
.side-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;color:rgba(255,255,255,.74);font-size:13px;width:100%;text-align:left;transition:background .12s,color .12s;margin-bottom:1px}
.side-item:hover{background:rgba(255,255,255,.06);color:#fff}
.side-item.active{background:var(--finza-blue);color:#fff;font-weight:500}
.side-item .ico{font-size:11px;width:14px;text-align:center}
.side-item .lbl{flex:1}
.side-item .count{font-family:var(--font-mono);font-size:10px;background:rgba(255,255,255,.1);padding:1px 6px;border-radius:99px;color:rgba(255,255,255,.7);min-width:22px;text-align:center}
.side-item.active .count{background:rgba(255,255,255,.22);color:#fff}
.side-item .dot-frente{width:8px;height:8px;border-radius:50%}
.sidebar-footer{margin-top:auto;padding:14px 10px 4px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:rgba(255,255,255,.5)}
.sidebar-footer .who strong{color:#fff;font-weight:500;display:block;font-size:12px;margin-bottom:2px}
.main{min-width:0;display:flex;flex-direction:column;position:relative}
.topbar{position:sticky;top:0;height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 28px;z-index:20}
.crumb{display:flex;align-items:center;gap:8px;font-size:13px}
.crumb .seg{color:var(--text-muted)}
.crumb .seg.cur{color:var(--text);font-weight:500}
.crumb .sep{color:var(--text-subtle);font-size:10px}
.topbar-spacer{flex:1}
.topbar-action{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text-muted)}
.topbar-action:hover{border-color:var(--text-subtle);color:var(--text);cursor:pointer}
.iaf-mark{position:absolute;top:18px;right:28px;font-size:11px;font-weight:700;color:var(--finza-blue);letter-spacing:.1em;z-index:5}
.hamburger{display:none;padding:4px 8px;border-radius:4px;font-size:18px;color:var(--text-muted)}
.view{padding:32px 36px 96px;width:100%;max-width:1600px;margin:0 auto;position:relative}
.ghost{font-weight:300;color:var(--ghost);font-size:38px;line-height:1.08;letter-spacing:-.015em;margin:0 0 6px}
.ghost .accent{font-weight:700;color:var(--finza-blue)}
.sub{color:var(--text-muted);font-size:14px;margin:0 0 26px;max-width:760px;line-height:1.55}
.section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--text-muted);margin:26px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;justify-content:space-between}
.section-title .extra{font-size:11px;font-weight:500;letter-spacing:0;text-transform:none;color:var(--text-muted)}
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--surface);border:2px dotted var(--finza-blue);border-radius:var(--radius-md);padding:14px 16px;transition:transform .12s}
.kpi:hover{transform:translateY(-1px)}
.kpi .lab{font-size:10px;letter-spacing:.12em;color:var(--text-muted);text-transform:uppercase;font-weight:700;margin-bottom:6px}
.kpi .num{font-size:30px;font-weight:700;color:var(--finza-blue);line-height:1;font-family:var(--font-mono)}
.kpi .delta{font-size:11px;color:var(--text-muted);margin-top:5px}
.kpi.urgent .num{color:var(--urgent)}
.kpi.warning .num{color:var(--warning)}
.kpi.success .num{color:var(--success)}
.kpi.muted .num{color:var(--text-subtle)}
.kpi.info .num{color:var(--info)}
.hero-dark{background:var(--finza-dark);color:#fff;padding:26px 30px;border-radius:var(--radius-lg);box-shadow:var(--shadow-md);margin-bottom:22px;position:relative;overflow:hidden}
.hero-dark::after{content:'';position:absolute;top:-30%;right:-10%;width:380px;height:380px;background:radial-gradient(circle,rgba(26,26,255,.32) 0%,transparent 70%);pointer-events:none}
.hero-dark .label{font-size:10px;letter-spacing:.18em;color:rgba(255,255,255,.5);text-transform:uppercase;font-weight:700;margin-bottom:8px}
.hero-dark .title{font-size:26px;font-weight:300;color:#fff;line-height:1.2;margin:0 0 18px;position:relative}
.hero-dark .title .accent{color:var(--finza-blue-soft);font-weight:700}
.hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;position:relative}
.hero-stats.six{grid-template-columns:repeat(6,1fr);gap:18px}
.hero-stat .num{font-size:30px;font-weight:700;color:#fff;line-height:1;font-family:var(--font-mono)}
.hero-stat .num .u{font-size:13px;color:rgba(255,255,255,.6);font-weight:400;margin-left:4px;font-family:var(--font-sans)}
.hero-stat .lab{font-size:11px;color:rgba(255,255,255,.65);margin-top:6px;line-height:1.4}
.hero-stat.urgent .num{color:#FCA5A5}
.hero-stat.info .num{color:#93C5FD}
.hero-stat.warning .num{color:#FCD34D}
.hero-stat.success .num{color:#86EFAC}
.hero-stat.validacao .num{color:#C084FC}
@media (max-width:1100px){.hero-stats.six{grid-template-columns:repeat(3,1fr)}}
@media (max-width:760px){.hero-stats.six{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--surface);border:2px dotted var(--finza-blue);border-radius:var(--radius-md);padding:18px;transition:transform .12s,box-shadow .12s;position:relative}
.card.compact{padding:14px 16px}
.item-card{background:var(--surface);border:2px dotted var(--finza-blue);border-radius:var(--radius-md);padding:14px;cursor:pointer;transition:transform .12s,box-shadow .12s;position:relative;display:flex;flex-direction:column;gap:8px;min-height:120px}
.item-card:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(26,26,255,.08)}
.item-card.urgent{border-left:4px solid var(--urgent);padding-left:14px}
.item-card.cancelado{opacity:.7;background:repeating-linear-gradient(45deg,#FAFAFC,#FAFAFC 8px,#F0F0F4 8px,#F0F0F4 16px)}
.item-card.cancelado .ic-title{text-decoration:line-through;color:var(--text-muted)}
.item-card .ic-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.item-card .ic-id{font-family:var(--font-mono);font-size:11px;color:var(--text-subtle);font-weight:700}
.item-card .ic-title{font-size:13.5px;font-weight:600;line-height:1.35;color:var(--text)}
.item-card .ic-foot{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-top:auto;font-size:10px}
.item-card .ic-st{font-family:var(--font-mono);color:var(--text-subtle);font-size:10px;margin-left:auto}
.badge{display:inline-flex;align-items:center;padding:2px 8px;font-size:10px;font-weight:700;border-radius:4px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.badge.urgente{background:var(--urgent-soft);color:var(--urgent)}
.badge.alta{background:#FED7AA;color:#9A3412}
.badge.media{background:var(--warning-soft);color:#92400E}
.badge.baixa{background:#F3F4F6;color:#6B7280}
.badge.a-refinar{background:#F3F4F6;color:#6B7280}
.badge.em-refinamento{background:var(--warning-soft);color:#92400E}
.badge.refinado{background:var(--info-soft);color:#075985}
.badge.em-curso{background:var(--finza-blue-soft);color:var(--finza-blue);animation:pulse 2s infinite}
.badge.bloqueado{background:var(--danger-soft);color:#991B1B}
.badge.cancelado{background:#E5E7EB;color:#374151}
.badge.validacao{background:#F3E8FF;color:#6B21A8}
.badge.entregue{background:var(--success-soft);color:#065F46}
.badge.arquivado{background:#F3F4F6;color:#9CA3AF}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.frente-pill{display:inline-flex;align-items:center;gap:5px;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.frente-pill .dt{width:6px;height:6px;border-radius:50%}
.frente-pill.bitrix-automacoes{background:rgba(255,107,53,.14);color:#C24A1C}.frente-pill.bitrix-automacoes .dt{background:var(--f-bitrix)}
.frente-pill.torre{background:rgba(26,26,255,.12);color:var(--finza-blue)}.frente-pill.torre .dt{background:var(--f-torre)}
.frente-pill.clara{background:rgba(0,184,212,.14);color:#0080A0}.frente-pill.clara .dt{background:var(--f-clara)}
.frente-pill.esperanza{background:rgba(15,15,140,.12);color:var(--finza-blue-deep)}.frente-pill.esperanza .dt{background:var(--f-esperanza)}
.frente-pill.valentina{background:rgba(107,91,255,.14);color:#5040D0}.frente-pill.valentina .dt{background:var(--f-valentina)}
.frente-pill.livia{background:rgba(217,70,239,.14);color:#A21CAF}.frente-pill.livia .dt{background:var(--f-livia)}
.frente-pill.estrategica{background:rgba(139,92,246,.14);color:#6D32B5}.frente-pill.estrategica .dt{background:var(--f-estrategica)}
.tag{display:inline-flex;align-items:center;padding:1px 7px;background:var(--finza-blue-soft);color:var(--finza-blue);border-radius:4px;font-size:10px;font-weight:600;text-transform:lowercase}
.barchart{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.barchart .row{display:grid;grid-template-columns:160px 1fr 80px;align-items:center;gap:12px;font-size:12px}
.barchart .row .lab{color:var(--text);font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.barchart .row .bar{height:14px;background:var(--bg);border-radius:7px;overflow:hidden}
.barchart .row .fill{height:100%;border-radius:7px;transition:width .4s ease;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;color:#fff;font-family:var(--font-mono);background:var(--finza-blue)}
.barchart .row .num{text-align:right;font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--text)}
/* ---------- DONUT / PIZZA ---------- */
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:14px;margin-bottom:22px}
.chart-card{background:var(--surface);border:2px dotted var(--finza-blue);border-radius:var(--radius-md);padding:18px 20px;position:relative}
.chart-card h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin:0 0 14px}
.chart-wrap{display:flex;gap:18px;align-items:center}
.chart-svg{flex:0 0 130px}
.chart-legend{flex:1;display:flex;flex-direction:column;gap:7px;min-width:0}
.legend-item{display:flex;align-items:center;gap:9px;font-size:12px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-label{flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.legend-value{font-weight:700;color:var(--finza-blue);font-family:var(--font-mono);font-variant-numeric:tabular-nums}
@media(max-width:760px){.chart-svg{flex:0 0 110px}}
.kanban-wrap{overflow-x:auto;padding-bottom:8px}
.kanban{display:grid;grid-template-columns:repeat(8,minmax(220px,1fr));gap:10px;min-width:1760px}
.kcol{background:#FAFAFC;border:1px solid var(--border);border-radius:var(--radius-md);padding:10px;min-height:120px}
.kcol-head{display:flex;align-items:center;justify-content:space-between;padding:0 4px 10px;border-bottom:1px solid var(--border-soft);margin-bottom:10px}
.kcol-head .ttl{display:flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)}
.kcol-head .ttl .sd{width:8px;height:8px;border-radius:50%}
.kcol-head .ct{font-family:var(--font-mono);font-size:10px;background:var(--surface);padding:1px 7px;border-radius:99px;color:var(--text-muted);border:1px solid var(--border)}
.kcol .item-card{padding:10px 12px;min-height:auto;border-radius:6px;margin-bottom:6px}
.kcol .item-card .ic-title{font-size:12.5px}
.gantt-wrap{overflow-x:auto;padding-bottom:8px}
.gantt-noprazo{background:#FAFAFC;border:1px dashed var(--border);border-radius:var(--radius-md);padding:14px;margin-bottom:14px}
.gantt-noprazo .gnt-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--warning);margin-bottom:8px;display:flex;justify-content:space-between}
.gantt-noprazo .gnt-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px}
.gantt-noprazo .gnt-it{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:12px;cursor:pointer}
.gantt-noprazo .gnt-it:hover{border-color:var(--finza-blue)}
.gantt-noprazo .gnt-it .id{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);font-weight:700}
.board-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:18px;align-items:center}
.board-tab{padding:9px 16px;font-size:13px;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;display:flex;align-items:center;gap:6px}
.board-tab:hover{color:var(--text)}
.board-tab.on{color:var(--text);font-weight:500;border-bottom-color:var(--finza-blue)}
.board-tab .ct{font-family:var(--font-mono);font-size:10px;color:var(--text-subtle);margin-left:5px}
.board-filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
.chip-filter{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;background:var(--surface);border:1px solid var(--border);border-radius:99px;font-size:12px;cursor:pointer;transition:all .12s;font-weight:500;user-select:none}
.chip-filter:hover{border-color:var(--finza-blue)}
.chip-filter.on{background:var(--finza-blue);color:#fff;border-color:var(--finza-blue)}
.chip-filter .dt{width:7px;height:7px;border-radius:50%}
.chip-filter.clear{color:#DC2626;border-color:#DC2626}
.board-filters2{margin-top:-6px;margin-bottom:14px}
.flab{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);font-weight:700}
.fdiv{width:1px;height:18px;background:var(--border);display:inline-block}
.date-inp{padding:4px 8px;border:1px solid var(--border);border-radius:8px;font-size:11px;background:var(--surface);color:var(--text)}
.date-inp:focus{border-color:var(--finza-blue);outline:none}
.item-card.overdue{border-left:3px solid #DC2626}
.ic-over{font-size:9px;font-weight:700;color:#DC2626;background:rgba(220,38,38,.10);padding:2px 7px;border-radius:99px;margin-left:auto}
.ic-resp{font-size:9.5px;color:var(--text-muted);font-weight:600}
.search-inp{padding:5px 11px 5px 32px;border:1px solid var(--border);border-radius:99px;font-size:12px;background:var(--surface) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%235C5C7A' stroke-width='2.5' stroke-linecap='round'><circle cx='11' cy='11' r='7'/><path d='m21 21-4.3-4.3'/></svg>") no-repeat 10px center;width:220px;outline:none}
.search-inp:focus{border-color:var(--finza-blue)}
.frente-head{background:var(--surface);border:2px dotted var(--finza-blue);border-radius:var(--radius-md);padding:20px 24px;margin-bottom:20px;position:relative;overflow:hidden}
.frente-head::before{content:'';position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--c-frente,var(--finza-blue))}
.frente-head .lab{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--text-muted);font-weight:700;margin-bottom:6px}
.frente-head h2{font-size:22px;font-weight:300;color:var(--ghost);margin:0 0 4px;line-height:1.2}
.frente-head h2 .accent{font-weight:700;color:var(--c-frente,var(--finza-blue))}
.frente-head .desc{font-size:13px;color:var(--text-muted);margin-top:8px;max-width:760px}
.frente-head .stats{display:flex;gap:22px;margin-top:14px;flex-wrap:wrap}
.frente-head .stat{display:flex;flex-direction:column;gap:2px}
.frente-head .stat .v{font-size:20px;font-weight:700;color:var(--c-frente,var(--finza-blue));font-family:var(--font-mono);line-height:1}
.frente-head .stat .l{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);font-weight:600}
.frente-head .extra{margin-top:12px;display:flex;gap:18px;flex-wrap:wrap;font-size:12px;color:var(--text-muted)}
.frente-head .extra strong{color:var(--text);font-weight:600}
.alert-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:10px}
.alert-card .ah{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.alert-card .ah .ico{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.alert-card .ah .ico.warn{background:var(--warning-soft);color:#92400E}
.alert-card .ah .ico.crit{background:var(--danger-soft);color:#991B1B}
.alert-card .ah .ico.info{background:var(--info-soft);color:#075985}
.alert-card .ah .t{font-size:13px;font-weight:600;color:var(--text);flex:1}
.alert-card .ah .ct{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);background:var(--bg);padding:2px 8px;border-radius:99px}
.alert-card .body{font-size:12.5px;color:var(--text-muted);line-height:1.5}
.drawer-overlay{position:fixed;inset:0;background:rgba(10,10,46,.4);backdrop-filter:blur(3px);z-index:50;display:none}
.drawer-overlay.open{display:block}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(760px,100%);background:var(--surface);box-shadow:var(--shadow-lg);z-index:60;transform:translateX(100%);transition:transform .25s cubic-bezier(.16,1,.3,1);overflow-y:auto;display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-head{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--border-soft);padding:16px 24px;z-index:2}
.drawer-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:11px;color:var(--text-muted)}
.drawer-nav .back{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:99px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;font-weight:500;color:var(--text)}
.drawer-nav .back:hover{background:var(--bg);border-color:var(--finza-blue)}
.drawer-nav .crumbs{display:flex;align-items:center;gap:5px;color:var(--text-subtle);font-family:var(--font-mono);font-size:10.5px}
.drawer-nav .crumbs .sep{opacity:.5}
.drawer-nav .crumbs .cur{color:var(--text-muted);font-weight:700}
.drawer-head .meta-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.drawer-head .id{font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--text-muted);letter-spacing:.04em}
.drawer-head h2{font-size:18px;font-weight:600;line-height:1.3;margin:0;color:var(--text);padding-right:36px}
.drawer-head .close{position:absolute;top:14px;right:18px;font-size:22px;color:var(--text-subtle);padding:4px 10px;border-radius:6px;cursor:pointer}
.drawer-head .close:hover{background:var(--bg);color:var(--text)}
.drawer-body{padding:20px 24px;flex:1}
.drawer-section{margin-bottom:22px}
.drawer-section h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--finza-blue);margin:0 0 10px;padding-bottom:6px;border-bottom:1px dotted var(--finza-blue)}
.drawer-section p{font-size:13.5px;line-height:1.6;color:var(--text);margin:0 0 8px}
.drawer-section .historia{background:var(--finza-blue-soft);border-left:3px solid var(--finza-blue);padding:12px 16px;border-radius:4px;font-size:13.5px;line-height:1.6}
.drawer-section .historia strong{color:var(--finza-blue-deep);font-weight:700}
.drawer-section ul{margin:0;padding-left:20px}
.drawer-section ul li{font-size:13px;line-height:1.6;margin-bottom:4px}
.ca-list{display:flex;flex-direction:column;gap:8px}
.ca-item{background:#FAFAFC;border:1px solid var(--border);border-left:3px solid var(--success);border-radius:6px;padding:10px 14px;font-size:12.5px;line-height:1.55}
.ca-item strong{display:inline-block;background:var(--success-soft);color:#065F46;padding:1px 7px;border-radius:3px;font-size:10px;font-weight:700;margin-right:6px;font-family:var(--font-mono);letter-spacing:.04em}
.st-list{display:flex;flex-direction:column;gap:5px}
.st-item{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;background:#FAFAFC;border:1px solid var(--border);border-radius:6px;padding:9px 12px;font-size:12.5px;line-height:1.4;cursor:pointer;transition:all .12s}
.st-item:hover{border-color:var(--finza-blue);background:var(--surface)}
.st-item .chk{width:14px;height:14px;border:1.5px solid var(--text-subtle);border-radius:3px;flex-shrink:0}
.st-item.concluida .chk{background:var(--success);border-color:var(--success)}
.st-item .stid{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--finza-blue);margin-right:6px}
.st-item .stmeta{font-family:var(--font-mono);font-size:10px;color:var(--text-subtle);white-space:nowrap}
.meta-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.mg-row{display:flex;flex-direction:column;gap:3px}
.mg-lab{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)}
.mg-val{font-size:13px;color:var(--text);font-weight:500}
.mg-val.mono{font-family:var(--font-mono);font-size:12px}
.mg-val.muted{color:var(--text-muted);font-weight:400}
.rice-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.rice-cell{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center}
.rice-cell.score{background:var(--finza-blue);color:#fff;border-color:var(--finza-blue)}
.rice-cell .lab{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);font-weight:700}
.rice-cell.score .lab{color:rgba(255,255,255,.7)}
.rice-cell .v{font-size:17px;font-weight:700;color:var(--finza-blue);font-family:var(--font-mono);margin-top:4px}
.rice-cell.score .v{color:#fff;font-size:19px}
.deps{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.dep-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--bg);border:1px solid var(--border);border-radius:99px;font-size:11px;font-family:var(--font-mono);font-weight:700;color:var(--text);cursor:pointer;transition:all .12s}
.dep-chip:hover{background:var(--finza-blue);color:#fff;border-color:var(--finza-blue)}
.hist-row{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border-soft);font-size:12.5px}
.hist-row:last-child{border-bottom:0}
.hist-row .d{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);min-width:90px;flex-shrink:0}
.cancel-banner{background:#FEF3C7;border:1px solid #F59E0B;border-radius:8px;padding:10px 14px;margin-bottom:18px;font-size:12.5px;color:#92400E}
.cancel-banner strong{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.empty{text-align:center;padding:36px 18px;color:var(--text-muted);font-size:12px}
.empty .icon{font-size:28px;margin-bottom:8px;opacity:.5}
@media (max-width:1300px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
@media (max-width:1100px){.hero-stats{grid-template-columns:repeat(2,1fr)}.rice-grid{grid-template-columns:repeat(2,1fr)}}
@media (max-width:760px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;width:var(--sidebar-w);transform:translateX(-100%);transition:transform .25s ease;box-shadow:var(--shadow-lg)}
  .sidebar.open{transform:translateX(0)}
  .hamburger{display:inline-flex;align-items:center}
  .view{padding:22px 16px 80px}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .hero-stats{grid-template-columns:repeat(2,1fr)}
  .iaf-mark{top:14px;right:14px;font-size:10px}
  .ghost{font-size:26px}
  .drawer{width:100%}
  .meta-grid{grid-template-columns:1fr}
  .frente-head{padding:16px 18px}
  .barchart .row{grid-template-columns:90px 1fr 50px}
}
.mono{font-family:var(--font-mono)}
.muted{color:var(--text-muted)}

/* ===== Foco da squad (Overview executivo) ===== */
.foco-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px}
.foco-card{background:var(--surface);border:2px dotted var(--c-foco,var(--finza-blue));border-radius:var(--radius-lg);padding:24px 26px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm)}
.foco-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--c-foco,var(--finza-blue))}
.foco-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.foco-flag{font-size:10px;text-transform:uppercase;letter-spacing:.14em;font-weight:700;color:var(--c-foco,var(--finza-blue))}
.foco-prio{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;color:var(--text-muted);font-weight:700;background:var(--bg);padding:4px 11px;border-radius:99px;text-transform:uppercase}
.foco-title{font-size:21px;font-weight:600;color:var(--text);line-height:1.28;margin:0 0 8px}
.foco-desc{font-size:13px;line-height:1.55;color:var(--text-muted);margin:0 0 16px}
.foco-item-principal{background:linear-gradient(135deg,#FAFAFC 0%,var(--surface) 100%);border:1.5px solid var(--c-foco,var(--finza-blue));border-radius:var(--radius-md);padding:14px 16px;cursor:pointer;transition:transform .12s,box-shadow .12s}
.foco-item-principal:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(26,26,255,.12)}
.foco-it-tag{font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--c-foco,var(--finza-blue));font-weight:700;margin-bottom:5px}
.foco-it-id{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);font-weight:700;margin-bottom:3px}
.foco-it-title{font-size:14px;font-weight:600;line-height:1.32;color:var(--text);margin-bottom:9px}
.foco-it-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:10px}
.foco-it-meta .pz{font-family:var(--font-mono);font-size:10px;color:var(--c-foco,var(--finza-blue));background:var(--bg);padding:2px 8px;border-radius:4px;font-weight:700;border:1px solid var(--c-foco,var(--finza-blue))}
.foco-apoio-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);font-weight:700;margin:18px 0 8px;padding-top:14px;border-top:1px dotted var(--border)}
.foco-apoio{display:flex;flex-direction:column;gap:5px}
.foco-apoio-it{display:flex;align-items:center;gap:9px;padding:6px 10px;background:var(--bg);border-radius:6px;cursor:pointer;font-size:11.5px;transition:background .12s,transform .08s}
.foco-apoio-it:hover{background:var(--finza-blue-soft);transform:translateX(2px)}
.foco-apoio-it .id{font-family:var(--font-mono);font-size:10px;color:var(--c-foco,var(--finza-blue));font-weight:700;min-width:50px}
.foco-apoio-it .badge{font-size:9px;padding:1px 6px}
.foco-apoio-it .tt{flex:1;color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media (max-width:1100px){.foco-grid{grid-template-columns:1fr}}
@media (max-width:760px){.foco-card{padding:18px 18px}.foco-title{font-size:18px}}

/* ===== Norte da Squad — chip Diretoria ===== */
.norte-banner{background:linear-gradient(135deg,var(--finza-dark) 0%,#1a1a4a 100%);color:#fff;padding:18px 24px;border-radius:var(--radius-md);margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.norte-banner .ico{font-size:22px;color:var(--finza-blue-soft)}
.norte-banner .txt{flex:1;font-size:13px;line-height:1.55;color:rgba(255,255,255,.88)}
.norte-banner .txt strong{color:#fff;font-weight:700}
.norte-banner .tag-dir{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;background:rgba(255,255,255,.12);padding:5px 11px;border-radius:99px;text-transform:uppercase;font-weight:700;color:var(--finza-blue-soft)}

                      "contexto":  "## Objetivo\n\nAtualizar o sistema de **Integrações e Webhooks** da Torre de Controle para que o header `x-org-slug` deixe de ser obrigatório e que as APIs passem a identificar a organização da requisição diretamente pela `x-api-key` enviada.\n\n## Contexto\n\n* As **API keys são criadas dentro de cada org**, ou seja, toda chave já tem vínculo com uma organização.\n* Hoje os endpoints exigem `x-org-slug` no header, o que é redundante (e fonte de erro) quando a `x-api-key` já carrega essa informação.\n* Se atualmente **não houver vínculo registrado** entre `api_key` e `org` no banco/modelo, esse vínculo precisa ser **adicionado/garantido** como parte desta tarefa.\n\n## Escopo\n\n### 1. Modelo / Banco\n\n* Garantir que cada `api_key` tem referência clara à `org` que a criou.\n* Caso o relacionamento não exista hoje, adicionar a coluna/relacionamento e fazer backfill das chaves existentes.\n\n### 2. APIs (Integrações + Webhooks)\n\n* Tornar `x-org-slug` **opcional** no header.\n* Implementar resolução automática da org a partir da `x-api-key`:\n\n    * Validar a chave\n    * Recuperar a org dona da chave\n    * Usar essa org como contexto da requisição\n    \n* Quando `x-org-slug` for enviado:\n\n    * **Validar consistência** com a org da api key\n    * Se divergente → retornar 403 (api key não pertence à org informada)\n    \n\n### 3. Compatibilidade\n\n* Manter backwards compatibility para integrações antigas que ainda enviam `x-org-slug`.\n* Não quebrar webhooks/integrações em uso.\n\n## Critérios de aceite\n\n* \\[ \\] Tabela/relacionamento `api_keys ↔ orgs` confirmado (ou criado, se ausente)\n* \\[ \\] Endpoint de webhooks aceita requisições só com `x-api-key` (sem `x-org-slug`)\n* \\[ \\] Endpoints de integrações aceitam requisições só com `x-api-key` (sem `x-org-slug`)\n* \\[ \\] Quando ambos forem enviados, retorno é 403 se a api key não pertencer ao slug informado\n* \\[ \\] Webhooks/integrações existentes continuam funcionando sem alteração\n* \\[ \\] Documentação interna da API atualizada refletindo que `x-org-slug` é opcional\n\n## Observações\n\n* Conferir o módulo `IntegrationsModule` da Torre (hooks `useApiKeys`, page `IntegrationsPage`) e edge functions de webhook (`receive-webhook`, `dispatch-webhook`, `ai-conversation-webhook`).\n* Em caso de dúvida sobre a arquitetura da Torre, alinhar com Joao Lucas Freitas (tech leader / Torre de Controle).",

                      "contexto":  "Solicitante: João Vinicius Dessimoni  \nÁrea Solicitante: IA  \nDemanda Original: Mensagem do João Martins: Este CNPJ 59615808000126 teve cobrança hoje de um título já pago pela Esperanza, porém quando eu olho na torre de controle ele está com as informações corretas e pagas. Achei estranho e fui fazer o teste no playground e novamente mesmo estando certo na torre cobrou uma parcela já paga. Consegue verificar?\n\nPrecisamos encontrar exatamente de onde a Esperanza tira os dados para cobrar e comparar com a torre para entender o ponto de divergência, pode ser o ETL talvez que esteja causando disparidade nos dados durante um curto momento e dentro dessa janela a esperanza esta cobrando errado.\n\nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/1859/](https://blips.bitrix24.com.br/crm/type/1170/details/1859/)  \nAnexo: [https://blips.bitrix24.com.br/bitrix/services/main/ajax.php?action=crm.controller.item.getFile\u0026SITE_ID=s1\u0026entityTypeId=1170\u0026id=1859\u0026fieldName=UF_CRM_95_1746795386\u0026fileId=848951](https://blips.bitrix24.com.br/bitrix/services/main/ajax.php?action=crm.controller.item.getFile\u0026SITE_ID=s1\u0026entityTypeId=1170\u0026id=1859\u0026fieldName=UF_CRM_95_1746795386\u0026fileId=848951)\n\nDescrição detalhada da tarefa:  \nInvestigar ocorrência de cobrança indevida realizada pela Esperanza para o CNPJ 59615808000126, onde um título/parcela já pago ou renegociado foi cobrado novamente. Segundo o solicitante, a Torre de Controle apresenta as informações corretas, com o título marcado como pago, porém a Esperanza realizou cobrança mesmo assim. O comportamento também foi reproduzido em teste no playground, indicando possível divergência entre a fonte de dados utilizada pela Esperanza e a Torre de Controle.\n\nObjetivos da investigação:  \n1\\. Identificar exatamente qual fonte, endpoint, tabela, fluxo, ETL ou integração a Esperanza utiliza para obter dados de cobrança.  \n2\\. Comparar os dados consumidos pela Esperanza com os dados exibidos na Torre de Controle para o CNPJ 59615808000126 e para o título/parcela em questão.  \n3\\. Verificar se existe defasagem, atraso de sincronização, inconsistência temporária ou falha no ETL que possa gerar uma janela em que a Esperanza recebe dados desatualizados e executa cobrança incorreta.  \n4\\. Analisar o caso descrito no anexo, em que a cliente Adriana informa que um título foi renegociado e não deveria constar como em atraso, e o bot transfere para atendimento humano para validação do histórico da renegociação.  \n5\\. Corrigir a origem da divergência encontrada, evitando novas cobranças de parcelas já pagas ou renegociadas.  \n6\\. Se aplicável, propor validações adicionais na automação da Esperanza antes do disparo de cobrança, garantindo que títulos pagos/renegociados não sejam cobrados indevidamente.\n\nImpacto: demanda urgente, pois envolve cobrança indevida a cliente, possível inconsistência de dados financeiros e risco de recorrência em outros CNPJs.",

                      "contexto":  "Solicitante: João Martins  \nÁrea Solicitante: Cobrança  \nDemanda Original: Bom dia Senhores(as)\n\nAbri esse chamado anteriormente pelo formulário porém a demanda sumiu. Estou abrindo ele novamente de forma mais objetiva.\n\nAtualmente no HyperFlow tem o gatilho de buscar títulos no Sankhya no qual puxa o campo valor desdobramento. Foi feito uma série de testes e situações pra identificar qual valor correto de coletar. O correto é o valor líquido do Sankhya. \n\nCom isto peço que seja ajustado neste gatilho o valor.\n\nAlém disso tem operações que não são informadas sendo uma delas Finza. Os clientes Finza não são identificados e coletados por este Gatilho.\n\nCom isto peça que seja incluído Finza e demais que observarem não estar disponível no gatilho.\n\nIdentificamos também algumas instabilidades nessa função aonde clientes que débito não são puxados e informa uma mensagem de que não há débito gerando confusão, desgaste e inadimplência. Peço apoio no monitoramento e correção dessa conectividade.\n\nÚltimo ponto é que a linguagem utilizada é mais interna e pode gerar confusão para o cliente. Peço que seja alterado da seguinte maneira.\n\nContrato n°:  \nParcela n°:   \nIdentificador único: (NUFIN)  \nData vencimento:  \nValor original:  \nValor atualizado: (SE ESTIVER CORRETO)\n\nTotal original:   \nTotal atualizado:\n\nIncluir gatilho na organização da Finza dentro do HyperFlow também.\n\nFico no aguardo, grato J.\n\nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/1865/](https://blips.bitrix24.com.br/crm/type/1170/details/1865/)\n\nDescrição: Corrigir e atualizar o gatilho de busca de títulos Sankhya no HyperFlow. A automação atualmente coleta o campo “valor desdobramento”, porém, após testes realizados pelo solicitante, o valor correto a ser coletado deve ser o “valor líquido” do Sankhya.\n\nEscopo solicitado:  \n1\\. Ajustar o campo de valor retornado pelo gatilho para utilizar o valor líquido do Sankhya.  \n2\\. Verificar operações não disponíveis no gatilho, incluindo Finza, garantindo que clientes Finza sejam identificados e coletados corretamente.  \n3\\. Investigar e corrigir instabilidades/conectividade da função, especialmente casos em que clientes com débito não são puxados e o sistema retorna mensagem informando que não há débito, causando confusão, desgaste operacional e risco de inadimplência.  \n4\\. Revisar a linguagem/estrutura da mensagem retornada ao cliente para evitar termos internos e apresentar os dados no seguinte formato:\n\n* Contrato n°:\n* Parcela n°:\n* Identificador único: (NUFIN)\n* Data vencimento:\n* Valor original:\n* Valor atualizado: (se estiver correto)\n* Total original:\n* Total atualizado:  \n  5\\. Incluir o gatilho na organização da Finza dentro do HyperFlow.\n\nObservações: Demanda marcada como urgente pelo solicitante. Impacto direto na área de Cobrança, podendo gerar confusão no atendimento, desgaste com clientes e inadimplência quando débitos existentes não são apresentados corretamente.",

                      "contexto":  "Solicitante: Sara Teixeira  \nÁrea Solicitante: Jurídico  \nDemanda Original: Precisamos estruturar uma automação para apoiar o fluxo operacional e jurídico relacionado ao cumprimento de medidas judiciais, com foco nos seguintes pontos:\n\nObjetivo  \nAutomatizar a captura de informações processuais e os acionamentos operacionais necessários após decisões judiciais, reduzindo atuação manual e aumentando a agilidade da execução.\n\nEscopo da demanda  \n1\\. Informações sobre liminares deferidas  \nA automação deve identificar e trazer, de forma organizada, as informações sobre liminares deferidas, considerando que esses casos ficam na raia \"LIMINAR DEFERIDA\" no Bitrix.\n\n2\\. Contato automatizado com os técnicos  \nApós a identificação da medida e/ou da necessidade de cumprimento, a automação deve permitir o contato automatizado com os técnicos, para viabilizar a retirada do bem/equipamento junto com o oficial de justiça, alinhando a execução operacional da diligência.\n\n3\\. Verificação de OS aberta na plataforma Blips  \nA solução deve informar se há OS aberta na plataforma Blips, para que o time consiga validar previamente a situação operacional relacionada ao caso.\n\n4\\. Integração com o sistema do tribunal  \nA automação deve integrar com o sistema do tribunal para identificar e informar quando o mandado for expedido, permitindo o acompanhamento do andamento processual em tempo real ou com o menor atraso possível.\n\nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/1817/](https://blips.bitrix24.com.br/crm/type/1170/details/1817/)\n\nDescrição: Demanda de melhoria para estruturar uma automação de apoio ao fluxo jurídico e operacional de cumprimento de medidas judiciais. A solução deve capturar automaticamente informações de casos na raia \"LIMINAR DEFERIDA\" no Bitrix, identificar eventos processuais relevantes, verificar existência de OS aberta na plataforma Blips, permitir ou disparar contato automatizado com técnicos responsáveis pela diligência e integrar com o sistema do tribunal para monitorar a expedição de mandados. Espera-se reduzir controles manuais, acelerar o acompanhamento das decisões judiciais, melhorar o acionamento operacional em campo e dar visibilidade centralizada sobre o status processual e operacional dos casos. O time deve avaliar viabilidade técnica das integrações, forma de monitoramento, mecanismo de notificação e eventual consolidação em painel, fluxo ou alertas automáticos.",

                      "contexto":  "Solicitante: Jessica Felipe  \nÁrea Solicitante: Cobrança  \nDemanda Original: Gostaria de solicitar o apoio do time de Torre de Controle para avaliar os esforços necessários para inclusão da carteira Rhino no fluxo operacional da Torre de Controle.\n\nO objetivo dessa iniciativa é possibilitar que, através dos contatos Finza, possamos executar de forma estruturada as ações relacionadas à régua de cobrança da carteira, contemplando:\n\nComunicação ativa com clientes;  \nAções de cobrança;  \nAções coercitivas;  \nGestão dos agentes de IA   \nPeço, por gentileza, que avaliem a viabilidade técnica e operacional da implementação, bem como os impactos, dependências e estimativa de esforço envolvidos nessa integração.  \nFico à disposição para detalharmos o contexto da operação e alinharmos os próximos passos  \nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/1839/](https://blips.bitrix24.com.br/crm/type/1170/details/1839/)\n\nDescrição: Avaliar a viabilidade técnica e operacional para inclusão da carteira Rhino no fluxo operacional da Torre de Controle, com foco na estruturação das ações da régua de cobrança por meio dos contatos Finza. A análise deve contemplar os requisitos necessários para suportar comunicação ativa com clientes, execução de ações de cobrança, ações coercitivas e gestão dos agentes de IA envolvidos na operação.\n\nMapear impactos no fluxo atual, dependências técnicas e operacionais, sistemas e integrações eventualmente necessários, além de estimar o esforço para implementação. Como próximo passo esperado, alinhar o contexto da operação com a área solicitante e consolidar uma proposta de abordagem para integração da nova carteira ao processo existente.",

                      "historia":  "",
                      "contexto":  "Solicitante: Sara Teixeira  \nÁrea Solicitante: Jurídico  \nDemanda Original: Demanda para o time de IA – Automação da raia KIT AJUIZAMENTO\n\nPrecisamos automatizar a etapa de montagem do KIT AJUIZAMENTO, que hoje é feita manualmente e representa um gargalo operacional.\n\nObjetivo\n\nAutomatizar a coleta, consolidação e disponibilização dos documentos necessários para ajuizamento, tanto para os casos Blips quanto Ideal.\n\nCenário atual\n\nAtualmente, a equipe faz manualmente a busca dos documentos em diferentes plataformas/sistemas, o que gera demora, retrabalho e risco operacional.\n\nDocumentos e respectivas fontes\n\nOs documentos atualmente são coletados nas seguintes plataformas:\n\nContrato → Plataforma Blips  \nNota fiscal → Sankhya  \nDemonstrativo de débito → Looker Studio  \nNotificação → MRS  \nLembrete de pagamento / retirada / bloqueio / distrato → e-mails Blips e Ideal  \nNecessidade de automação\n\nA ideia é que a IA/automação consiga:\n\nIdentificar o caso a ser tratado;  \nBuscar automaticamente os documentos nas fontes correspondentes;  \nConsolidar todos os arquivos que compõem o KIT AJUIZAMENTO;  \nOrganizar os documentos de forma padronizada;  \nDisponibilizar o kit final para o time jurídico.\n\nHoje os documentos são colocados em uma Drive compartilhada com a assessoria jurídica.\n\nComo alternativa, também podemos avaliar a disponibilização na Drive e/ou no Bitrix, para acesso do time jurídico interno.\n\nResultado esperado\n\nEsperamos reduzir o trabalho manual na montagem do kit, ganhar velocidade no fluxo de ajuizamento e diminuir riscos de perda de documentos ou inconsistências na composição dos arquivos.\n\nPontos para avaliação do time de IA\n\n* Viabilidade de integração com as plataformas mencionadas;\n* Captura de documentos a partir de e-mails;\n* Padronização do nome e organização dos arquivos;\n* Definição do melhor repositório final: Drive ou Bitrix;\n* Possibilidade de rastreabilidade/status da montagem do kit.\n\nObservação: A automação deve contemplar os casos das operações Blips e Ideal.\n\nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/1815/](https://blips.bitrix24.com.br/crm/type/1170/details/1815/)\n\nDescrição: Criar uma automação para montagem do KIT AJUIZAMENTO, contemplando a identificação do caso, coleta automática de documentos em múltiplas fontes (Plataforma Blips, Sankhya, Looker Studio, MRS e e-mails), consolidação dos arquivos obrigatórios, padronização de nomenclatura e organização dos documentos, além da disponibilização do kit final ao time jurídico. A solução deve considerar os fluxos das operações Blips e Ideal, avaliar a viabilidade técnica das integrações necessárias, permitir definição do repositório final entre Drive e Bitrix e, se possível, fornecer rastreabilidade/status da montagem do kit.",

                      "contexto":  "## Contexto\n\nReunião com Jéssica Margaritha (líder Operações Finza), J e Felipe em 22/abr/2026. Carteira cresceu 40% (out/25 → mar/26) e a estratégia para escalar é via tecnologia: 7 agentes de IA.\n\n**Transcrição:** https://docs.google.com/document/d/1m3NpVtk1OsuNJnkCsXAwCOdCZ7C7eshwClw3aH2X77I/edit\n\n## Os 7 agentes\n\n1. **Esperança** — Cobrança Finza (já em prod, Torre)\n2. **Valentina** — Saque/Recepção Finza (em deploy, Estia)\n3. **Distrato** — Política fixa + Intel Post (Torre, prompt adaptável por régua)\n4. **Retirada de Equipamentos** — Intel Coast + transportadora (Torre, prompt adaptável)\n5. **Clara** — Documentação + Formalização Finza+Blips (Estia, multi-org)\n6. **Saque Finza** — = Valentina (boleto, CCB, financiamento)\n7. **Reembolso/Reprovação** — funcionalidade dentro da Clara\n\n## Decisões arquiteturais\n\n* **Distrato + Retirada → Torre** com prompts adaptáveis por fase de régua/filtro (não agentes separados)\n* **Sistema de Evaluation na Torre** — time de negócio testa antes de subir para prod\n* **Fluxo dev → PR → aprovação Mateus/Joao Lucas → prod** (a partir de Sprint 1)\n* **Formalização = Clara única** (Finza + Blips) com curadoria via Estia\n* **Hyper:** trocar automação Onboarding → Formalização (não renomear)\n\n## Sprints\n\n* Sprint 0 (27/abr–01/mai): Imediato — Valentina live, Hyper, fluxo dev\n* Sprint 1 (04/mai–15/mai): Fundação + escopos + spec Torre 2.0\n* Sprint 2 (18/mai–29/mai): Torre 2.0 prompts adaptáveis + integração sistema novo Finza\n* Sprint 3 (01/jun–12/jun): Evaluation + conteúdo Distrato\n* Sprint 4 (15/jun–26/jun): Conteúdo Retirada + Esteiras\n* Sprint 5 (29/jun–10/jul): Dashboards + maturidade\n\n**Entrega total:** 10/jul/2026.\n\n## Stakeholders\n\n* **Operações Finza:** Jéssica Margaritha (líder), J (líder operacional), Felipe e Breno (jovens aprendizes — curadoria)\n* **Time IAF:** Marcos Rodrigues, João Pedro da Silva Neto, Leandro Marques\n* **Apoio:** Joao Lucas Freitas (Tech Lead), Rian Silveira (IA2 — Clara), Carlos Magno (IA2 — STIA)\n\n## Sistema novo Finza\n\nEntrega prevista: **15/mai/2026**. Substitui Bitrix na coleta/validação de documentos e assinatura CCB. Integração obrigatória da Clara após o lançamento.",

                      "contexto":  "Solicitante: João Martins  \nÁrea Solicitante: Cobrança  \nDemanda Original: Status Cancelamento - Em análise judicial | Plataforma  \nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/1807/](https://blips.bitrix24.com.br/crm/type/1170/details/1807/)  \nDescrição: Boa tarde senhores(as),\n\nAtualmente temos contratos dentro da plataforma com status de cancelamento igual a \"Em análise judicial\" no qual estão sendo acionado pela torre de controle ou pelo Hyper quando cliente entra em contato.\n\nPedimos que seja feito a adição de todos esses contratos no blocklist para que não seja acionado pela torre porém que esta rotina seja atualizada diariamente pra verificar se tem novos ou se algum contrato saiu da analise judicial podendo voltar a ser acionado e saindo do blocklist consequentemente.\n\nAlém disso tem a situação de clientes em analise judicial entrar em contato de forma espontânea no Hyper para isso pedimos que seja criado um fluxo no Hyper parar verificar na plataforma se o contrato é um analise judicial e adicionar o rótulo de analise judicial em todos clientes receptivo para evitar acionamento incorreto.\n\nDescrição detalhada: Implementar automação para tratamento de contratos com status de cancelamento \"Em análise judicial\" na operação Finza. A demanda contempla duas frentes: (1) inclusão automática de contratos com esse status em uma blocklist para impedir acionamentos indevidos pela torre de controle, com rotina diária de atualização para incluir novos contratos elegíveis e remover da blocklist aqueles que deixarem de estar em análise judicial; (2) criação de fluxo no Hyper para consultar a plataforma quando houver contato receptivo espontâneo, identificar se o contrato está em análise judicial e aplicar rótulo específico de \"análise judicial\" nos clientes receptivos, evitando acionamentos incorretos. A implementação deve considerar integração/consulta à plataforma, atualização recorrente da blocklist e consistência da regra entre canais de acionamento e atendimento receptivo.",

                      "contexto":  "## Contexto\n\nDecisão arquitetural: Distrato e Retirada NÃO serão agentes separados — serão **prompts que o agente da Torre recebe baseado em fase de régua/filtro**. Além disso, time de negócio precisa de **sistema de evaluation** para testar versões antes de subir para prod.\n\nSem essa spec aprovada, Sprint 2 (desenvolvimento) não inicia.\n\n## Escopo da spec\n\n### Engine de prompts adaptáveis\n\n* Modelagem: como mapear fase/filtro/régua → prompt específico\n* Backend: troca de prompt em runtime baseado em condição (ex: 91+ dias no contrato → prompt distrato)\n* UI: tela onde time Finza configura visualmente quais prompts ativam quando (autonomia de curadoria)\n* Migração: prompt cobrança 91+ dias hoje hardcoded vira o primeiro caso de uso\n\n### Sistema de Evaluation\n\n* Cenários de teste: input do cliente + saída esperada\n* Engine de execução em batch (rodar todos os cenários contra versão X do prompt)\n* Comparação resultado vs esperado (LLM-as-judge OU regex/keyword check — definir na spec)\n* Versionamento staging/prod com gate: só sobe pra prod se eval passar\n* Lições do STIA evaluation (Carlos Magno construiu: IA2-1120, IA2-1145, IA2-861, IA2-907)\n\n## Critério de aceite\n\n* Documento técnico (\\~5-10 páginas) com:\n\n    * Modelo de dados (tabelas/colunas novas)\n    * Diagramas de fluxo\n    * Mockups de UI (esboço, não final)\n    * Plano de migração de prompts existentes\n    * Estimativa de esforço por componente\n    \n* Aprovado por Mateus + Joao Lucas\n* Compartilhado com Marcos (régua) e Carlos Magno (eval STIA)\n\n## Apoio\n\n* **Marcos Rodrigues** — input sobre régua, gestão de carteira, filtros (12 das 15 últimas tasks dele são Torre)\n* **Carlos Magno (IA2)** — input sobre eval STIA (lições aprendidas)\n* **Joao Lucas** — revisão técnica\n\n## Prazo\n\n15/mai/2026 (final do sprint)\n\n## Epic\n\nIAF-130",

                      "contexto":  "Solicitante: Rodolfo Santos  \nÁrea Solicitante: Processos  \nDemanda Original: Contexto: Em alinhamento com Jéssica, houve a necessidade da NÃO passagem de cards automáticos desde Nova Compra/Locação até Checklist pois no meio destas fases existe a necessidade de uma aprovação de documentos por meio da Finza, o que não acontecia antes da empresa ter o handover. Para medida futura, a Finza trabalhará no próprio sistema que recebera informação de quando atuar e repassará os contratos aprovados novamente pro fluxo Blips, mas precisamos dessa ação de contenção rápida.\n\nProblema maior: clientes que inserem os dados na plataforma e ela avança sem verificação do time, onerando muito a identificação destes contratos sem validação.  \nAlém disso, cliente prepara infraestrutrura e pagamentos, podendo não efetivar o contrato por conta de reprovação de documentos nas etapas anteriores.\n\nAção de contenção bitrix: retirar passagem de cards automaticamente das fases Nova Compra/Locação, Envio de Fotos de Documentos, Endereço do Responsável e Checklist.\n\nAção definitiva: plataforma Finza e Blips irão se comunicar e a Finza entregará apenas contratos com documentação aceita.  \nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/1773/](https://blips.bitrix24.com.br/crm/type/1170/details/1773/)  \nDescrição: Demanda para correção/ajuste de comportamento atual da automação no fluxo de Onboarding Documentação relacionado à Finza. Deve ser implementada uma ação de contenção rápida para interromper a passagem automática de cards entre as etapas Nova Compra/Locação, Envio de Fotos de Documentos, Endereço do Responsável e Checklist, evitando avanço sem validação documental pelo time responsável. O objetivo é impedir que contratos avancem indevidamente no fluxo, gerando preparação de infraestrutura e pagamentos antes da aprovação dos documentos. Como solução definitiva, está previsto um modelo de integração em que a plataforma Finza sinalizará quais contratos tiveram documentação aprovada para então serem reenviados ao fluxo Blips.",

                      "historia":  "",
                      "contexto":  "# Resumo do dia — 2026-04-17\n\nForam 6 commits + 1 migration + 1 deploy de Edge Function. Todos commits assinados por `marocosz`.\n\n---\n\n## 1. `feat(repique)` — Mover Repique para Campanhas + backend otimizado (`08a5e41`, 12:11)\n\n**O que foi feito:**\n\n* **Frontend:** movida aba Repique de `/dashboard` para `/campaigns` (ao lado de Monitoramento). Unificados os hooks `useRepiqueActions` + `useRepiqueStats` em um único `useRepiqueDashboard` (1 call só). Paginação no backend (50 rows/página). Reuso do `DashboardFiltersBar` para filtro de período.\n* **Backend:** criada RPC `public.get_repique_dashboard_json` (agregação + paginação em SQL único) + EF `get-repique-dashboard` + índice parcial `idx_actions_repique` nos schemas `org_*`.\n* **Migration:** `20260417100000_repique_dashboard_backend.sql` aplicada em produção.\n\n**Por que:**\n\n* Stats (total/enviados/falhas/campanhas) antes eram calculados em cima de só 500 rows → **KPIs errados** em alto volume. Agora rodam sobre o dataset completo.\n* Query antiga fazia seq-scan na tabela `actions` → índice parcial transforma em index scan.\n* Repique é funcionalmente uma campanha, então pertence à área de Campanhas na UI.\n\n**Segurança:**\n\n* Zero funções preexistentes reescritas (grep confirmou nomes novos).\n* NÃO tocou em `on_organization_created` (trigger crítico com histórico de 17 rewrites).\n* `CREATE INDEX IF NOT EXISTS` → idempotente.\n* DROP da RPC antiga deixada para migration de cleanup posterior (só após frontend confirmado em prod).\n\n---\n\n## 2. `fix(repique)` — Auth + membership check em `get-repique-dashboard` (`d982ba1`, 14:15)\n\n**O que foi feito:**\n\n* Adicionado `Authorization: Bearer` obrigatório na EF.\n* Validação de JWT via `ANON_KEY` client (`getUser`).\n* Checagem de membership em `public.organization_users` usando **userClient (RLS)**, não service_role.\n* Só depois de validar, usa SERVICE_ROLE para chamar a RPC interna.\n* Removido `x-org-slug` do CORS.\n* 401/403 retornam `{\"error\":\"unauthorized\"}` genérico.\n\n**Por que:**\n\n* Falha de segurança: a EF aceitava POST com `org_slug` e usava `SERVICE_ROLE` sem validar JWT nem membership → **qualquer usuário autenticado poderia ler o dashboard de qualquer org** passando o slug.\n\n**Segurança:**\n\n* Fail-closed: sem match de membership → 403 sem vazar se a org existe.\n* Resposta de erro genérica (não diferencia 401 de 403 em detalhes).\n* Preservado regex de validação de schema name e CORS canônicos.\n\n---\n\n## 3. `fix(campaigns)` — Preservar chaves de settings no save do dialog (`330a057`, 15:27)\n\n**O que foi feito:**\n\n* `CampaignDialog` agora faz spread de `campaign.settings` antes de aplicar `repique_enabled`, preservando todas as chaves existentes.\n* Adicionada interface `CampaignSettings` tipando chaves conhecidas (frontend + triggers) com index signature.\n\n**Por que:**\n\n* Bug: ao salvar uma campanha pelo dialog, o JSONB `settings` inteiro era sobrescrito, **apagando chaves plantadas por triggers** (ex: `paused_reason` do `workflow_deactivation_cascade`). Antes do fix, sobrava só `repique_enabled`.\n\n**Segurança / Impacto:**\n\n* Teste manual: campanha com `paused_*` plantados mantém as 4 chaves após save.\n* Sem mudança de schema nem de backend.\n\n---\n\n## 4. `docs` — Consolidar CLAUDE.md em CLAUDE.local.md (`811bae4`, 15:27)\n\n**O que foi feito:**\n\n* Merge do conteúdo único de `CLAUDE.md` (comandos, arquitetura não óbvia, regras de segurança de RPC) em `CLAUDE.local.md`.\n* Remoção do `CLAUDE.md`.\n\n**Por que:**\n\n* Os dois arquivos estavam divergindo, causando risco de instruções contraditórias.\n\n**Segurança:**\n\n* Apenas docs, sem impacto em código.\n\n---\n\n## 5. `fix(migrations)` — Timestamp inválido 20260416300000 → 20260417000000 (`f87088f`, 15:56)\n\n**O que foi feito:**\n\n* Renomeação do arquivo de migration (timestamp 30h é formato inválido `YYYYMMDDHHMMSS`).\n* Rename já aplicado via `migration repair` nos dois bancos (main e dev) para manter histórico consistente.\n\n**Por que:**\n\n* Supabase CLI poderia rejeitar futuras migrations por causa de ordem não monotônica/formato inválido.\n\n**Segurança:**\n\n* Zero mudança de conteúdo SQL (só rename).\n* Repair aplicado em ambos os bancos → sem divergência entre main/dev.\n\n---\n\n## 6. `fix(broadcast)` — Batchear `.in()` para respeitar limite PostgREST \\~8KB (`fbe3cb9`, 16:22)\n\n**O que foi feito:**\n\n* Introduzido helper `batchedIn\u003cT\u003e()` com batch de 150 UUIDs (\\~5.4KB por call) em `broadcast-processor`.\n* Aplicado nas 3 queries vulneráveis: actions dedup, contracts fetch, `vw_titles_live` enrich.\n* **Fail-closed** em erro de batch (throw).\n* Sort global DESC aplicado após batching do `vw_titles_live` (intra-batch DESC não bastava — um contato pode ter contratos em batches diferentes).\n* Remoção de guards redundantes (`batchedIn` garante `T[]`, nunca null).\n\n**Por que:**\n\n* Queries com `.in(col, array)` sem batching viram URL \u003e8KB quando ultrapassam \\~200 UUIDs → **HTTP 414 ou truncamento silencioso** pelo PostgREST.\n* Bug introduzido em `aaf74b2` e `99d381e`.\n\n**Segurança:**\n\n* Fail-closed alinhado com filosofia do commit `99d381e` (melhor erro do que mensagem errada/duplicada).\n* Pattern já validado em `getContactsAlreadyContactedToday` (commit `4ba8338`).\n* Sem mudança de schema, RPCs, ou outras EFs.",

                      "contexto":  "  Contexto\n\n  A flag PNP (\"Primeira Não Paga\") vem do ETL e é armazenada a nível de parcela, em  \n  titles.custom_fields-\u003e\u003e\u0027parcela_pnl\u0027 (nome mantido com \"l\" por compatibilidade, não mexer). O  \n  sistema é title-centric, então a flag por parcela cumpre o papel em avaliações de título — mas  \n   quando se precisa segmentar por contrato ou por cliente, ela não basta.\n\n  Problema\n\n  Filtros que agregam por contrato ou por cliente perdem disjunção: um cliente com parcelas PNP  \n  e parcelas não-PNP aparece nos dois lados de um filtro que deveria separá-lo em apenas um.\n\n  Exemplo: cliente com 10 títulos em aberto, 3 PNP e 7 não-PNP →\n\n* Filtro \"clientes PNP\" inclui o cliente\n* Filtro \"clientes não-PNP\" também inclui o mesmo cliente\n\n  Isso inviabiliza segmentação por PNP em qualquer régua, portfolio, dashboard ou relatório que  \n  opere a nível de contrato ou cliente.\n\n  Resultado esperado\n\n  Criar duas flags novas, derivadas (não vêm do ETL, são calculadas internamente):\n\n* PNP no contrato — binária, vigente\n* PNP no cliente — binária, vigente\n\n  A flag por parcela continua vindo do ETL como hoje, sem alteração.\n\n  Regras de negócio\n\n* Um título é PNP ⇔ parcela_pnl=\u0027true\u0027 (regra atual, inalterada).\n* Um contrato é PNP ⇔ tem ao menos 1 parcela PNP naquele momento.\n* Um cliente é PNP ⇔ tem ao menos 1 contrato PNP naquele momento.\n* Flags são vigentes: quando a última parcela PNP de um contrato é paga ou removida, o  \n  contrato deixa de ser PNP. O mesmo vale em cascata para o cliente.\n\n  O ETL já garante vigência da flag por parcela: o upsert de pagos traz explicitamente FALSE AS  \n  parcela_pnp e o reconcile limpa a flag em remoção. \n\n  Frescor da informação\n\n  Pode usar o caminho natural no projeto: calcular as flags dentro da materialized view  \n  mv_titles_base (mesmo padrão dos agregados existentes como contact_total_open_value,  \n  contract_avg_days_overdue). A defasagem de até 30min do refresh da MV é aceitável para esta  \n  feature.\n\n  Critérios de aceite\n\n* Existem duas flags novas, uma por contrato e uma por cliente, disponíveis no construtor de  \n  filtros.\n* Teste de disjunção (obrigatório): testar os filtros \"contratos PNP\" e outro \"contratos  \n  não-PNP\" e verificar que nenhum contrato aparece nos dois. Repetir o mesmo teste com \"clientes PNP\" / \"clientes não-PNP\" — nenhum cliente pode aparecer nos dois.\n* Quando a última parcela PNP de um contrato é paga ou removida, o contrato sai do filtro  \n  \"contratos PNP\" na próxima rodada da MV (até 30min).\n* A flag por parcela existente (parcela_pnl) continua funcionando como hoje  \n  (backward-compatível).\n* O tempo de refresh da mv_titles_base não aumenta significativamente após a mudança (medir  \n  antes/depois).\n\n  Cuidado operacional\n\n  As flags novas só ficam populadas após a primeira rodada de refresh da MV pós-deploy (até  \n  30min). Avisar o time antes de ativar filtros em produção.\n\n  Fora do escopo\n\n* Alterar como o ETL popula parcela_pnl nas parcelas.\n* Renomear o campo parcela_pnl para corrigir o typo.\n* Reescrever a lógica title-centric do pipeline de campanhas.",

                      "contexto":  "Solicitante: joao.martins@blips.com.br  \nÁrea Solicitante: Cobrança  \nDemanda Original: IA não informa débito de suprimentos  \nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/1679/](https://blips.bitrix24.com.br/crm/type/1170/details/1679/)  \nDescrição: Boa tarde time,\n\nNos deparamos com uma situação no qual a IA não consegue localizar o débito de Suprimentos do cliente, deixando de informar o que gerou inadimplência e juros, e o cliente se recusa a pagar.\n\nSegundo o contexto informado, a IA não retornou essa informação porque a torre atual não possui os dados de suprimentos. Também existe uma integração para buscar suprimentos no Sankhya, porém ela não está ativa, o que contribui diretamente para a falha no retorno do débito.\n\nHá relação com o ticket 1337, já aberto anteriormente, que solicita a inclusão da base Sankhya na torre.\n\nSolicita-se analisar a causa do problema, validar a dependência da integração com o Sankhya e/ou da inclusão da base na torre, e corrigir o comportamento da IA para que consiga localizar e informar corretamente os débitos de suprimentos ao cliente, evitando omissão de valores que geram inadimplência e juros.\n\nAnexo: não informado.",

                      "historia":  "",
                      "contexto":  "Demanda original:  \nSolicitante: Sinara Martins (sinara.martins@blips.com.br)  \nÁrea: Jurídico  \nDescrição original: Olá, tudo bem?\n\nSolicito uma automação, para que seja enviada uma mensagens contendo um formulário para atualização cadastral a todos nossos clientes a cada 6 meses.  Nesse momento o alvo do disparo seria todos os clientes com mais de 6 meses de contrato ativo. Após esse formulário voltar atualizado, seria vinculado automaticamente na plataforma.  \nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/663/](https://blips.bitrix24.com.br/crm/type/1170/details/663/)\n\nDescrição detalhada (para o time de IA e Automação):  \nCriar uma automação que execute as seguintes etapas:  \n1) Seleção de alvo: identificar todos os clientes com mais de 6 meses de contrato ativo. Requisitos: confirmar qual campo/tabela contém a data de início do contrato ou a flag de contrato ativo e critérios exatos (ex.: \u003e180 dias a partir de data_base).  \n2) Agendamento: rodar o disparo periodicamente a cada 6 meses para cada cliente (ou executar job diário que verifica clientes cujo último disparo/formulário aceito tem \u003e=6 meses). Definir se o critério é tempo desde início do contrato ou tempo desde último envio/atualização.  \n3) Canal e template de mensagem: enviar mensagem contendo um formulário para atualização cadastral. Confirmar canal(s) desejado(s): WhatsApp (via BLiPS), e-mail, SMS ou outro. Fornecer template de mensagem e link do formulário (ou usar formulário nativo). Garantir personalização com dados do cliente.  \n4) Formulário: definir campos obrigatórios/optativos no formulário, validações e modelo (ex.: endereço, telefone, documentos, dados bancários se aplicável). Definir comportamento em caso de respostas parciais.  \n5) Recebimento e vinculação: quando o cliente responder, os dados devem ser validados e vinculados automaticamente na plataforma. Especificar como será feito o vínculo: anexar PDF do formulário ao registro do cliente, atualizar campos específicos na base (tabela X, campos Y), ou ambos. Definir mapeamento de campos e regras de negócio (ex.: sobrescrever somente se campo não vazio, manter histórico, criar log de mudanças, auditoria).  \n6) Rastreabilidade e logs: registrar sucesso/erro de cada envio e retorno, criar métricas de entregabilidade, respostas e falhas. Notificações para time responsável em casos de erro crítico.  \n7) Tratamento de consentimento e opt-out: garantir respeito a opt-outs e consentimentos de comunicação. Validar exigências legais (LGPD) e manter registro do consentimento.  \n8) Performance e limites: considerar volume de clientes, throttling por canal (rate limits), tentativas/retries e backoff.  \n9) Testes e rollout: plano de testes (ambiente de homologação), enviar para lote piloto antes de envio em massa, validar mapeamento e vinculação.  \n10) Critérios de aceitação:\n\n* Automação identifica corretamente clientes elegíveis (\u003e6 meses) e dispara o formulário no canal acordado.\n* Respostas do formulário são capturadas e vinculadas automaticamente ao registro do cliente conforme mapeamento definido.\n* Logs de envio/recebimento disponíveis e erros reportados.\n* Respeito a opt-outs e LGPD.\n\nInformações pendentes/necessárias (favor confirmar):\n\n* Canal(s) desejados para envio (WhatsApp / e-mail / SMS / outro).\n* Modelo e campos do formulário (e ex. URL do formulário, se já existir).\n* Onde e como os dados devem ser vinculados na plataforma (tabela/entidade/ID de sistema).\n* Critério exato de elegibilidade (data de início do contrato, último envio, outros).\n* Volume estimado de clientes alvo para dimensionamento.\n* Se há preferências por horários/janelas de envio.\n\nObservação: demanda não marcada como urgente. Prioridade sugerida: Média (3).",

                      "historia":  "",
                      "contexto":  "Solicitante: joao.martins@blips.com.br (João Martins)  \nÁrea Solicitante: Cobrança  \nDemanda Original:\n\nBom dia,\n\nValentina está informando que o cliente não possuí títulos em aberto porém tem. Acredito estar apontando para fonte de dados da Blips/Ideal\n\nEvidencia protocolo:  \n0503266788748  \n0303267219344\n\nPeço apoio\n\nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/1371/](https://blips.bitrix24.com.br/crm/type/1170/details/1371/)\n\nDescrição detalhada (para Time de IA e Automação):\n\nObjetivo:\n\n* Investigar e corrigir a divergência reportada pela Valentina onde o CRM/IA indica que o cliente não possui títulos em aberto, embora existam títulos ativos na fonte (Blips/Ideal).\n\nContexto inicial e evidências:\n\n* Protocolos fornecidos para investigação: 0503266788748, 0303267219344.\n* Suspeita de origem: inconsistência na base de dados ou no processo de leitura/transformação entre Blips/Ideal → Torre de Controle → componente de IA Valentina.\n\nAções sugeridas (passos iniciais):\n\n1) Reproduzir o erro usando os protocolos fornecidos: consultar a Torre de Controle, a base Blips/Ideal e os endpoints/queries que alimentam a Valentina para verificar o fluxo completo de dados.  \n2) Validar se os registros (títulos) existem na fonte (Blips/Ideal) e se foram propagados corretamente até a camada consumida pela IA (camadas ETL, filas, APIs, caches).  \n3) Checar mapeamento de campos e filtros aplicados (ex.: status, flag de elegibilidade, datas de vencimento) que possam causar exclusão ou ocultação do título.  \n4) Verificar logs de sincronização/erros nas últimas 24-72h e presença de falhas/latência/caches expirados no pipeline.  \n5) Se identificado bug na transformação/consulta, propor correção (ajuste de query, regra de negócio, tratamento de nulos/formatos) e aplicar em ambiente de homologação.  \n6) Testar a correção com os protocolos fornecidos e com amostras adicionais; validar que Valentina passa a apresentar os títulos corretamente.\n\nEntregáveis esperados:\n\n* Relatório de diagnóstico com evidências (queries, prints, contagens) apontando a origem da divergência.\n* Correção implementada (ou plano de correção) e passos para deploy/rollback.\n* Testes de validação com os protocolos fornecidos e critérios de aceitação.\n\nCritérios de aceitação:\n\n* Para os protocolos fornecidos, Valentina deve exibir os títulos em aberto existentes na fonte.\n* Relatório com descrição clara da causa raiz e ação aplicada.\n\nInformações necessárias do solicitante (se não disponíveis):\n\n* Indicar exemplos adicionais (prints ou IDs) e datas/horários em que foi observado o problema, se possível.\n* Confirmação se houve mudanças recentes nos processos de sincronização ou deploys na Torre/Valentina.\n* Contato do responsável técnico da fonte Blips/Ideal, se necessário para investigação.\n\nPrioridade recomendada: 1 (Altíssima) — solicitada como urgente.\n\nPrazo sugerido: resposta inicial com diagnóstico dentro de 24 horas para início da investigação.\n\nSolicitante para contato: joao.martins@blips.com.br",

                      "historia":  "",
                      "contexto":  "Solicitante: João Martins (joao.martins@blips.com.br)  \nÁrea Solicitante: Cobrança  \nDemanda Original:  \nBoa tarde Senhores segue formalização da demanda passada no grupo dia 26/02/2026.\n\n4️⃣ Gestão Funcional da IA  \nPermitir gestão e curadoria da IA pelo time de operações diretamente na plataforma Torre de Controle, impactando diretamente na performance operacional.\n\nCapacitação e treinamento da IA por parte do time de Cobrança de forma agnóstica. Descentralizando e ganhando aceleridade nos processos.\n\natt;\n\nDescrição detalhada da tarefa:  \nObjetivo: Implementar funcionalidades na plataforma Torre de Controle que permitam ao time de operações (Cobrança) gerir, curar e treinar modelos/rotinas da IA sem depender diretamente do time de IA/Desenvolvimento, garantindo segurança, rastreabilidade e controle de versão.\n\nEscopo proposto:  \n1) Interface de Curadoria\n\n* Painel para visualizar exemplos de inputs/outputs da IA, com filtros por data, origem e status.\n* Permitir marcação/manual de exemplos como corretos/errados e anotação de observações.\n* Mecanismo para agrupar e priorizar exemplos a serem usados em treino/retreinamento.\n\n2) Módulo de Treinamento/Capacitação Agnóstico\n\n* Fluxo para que o time de Cobrança submeta conjuntos de exemplos (CSV/JSON) para treinar/ajustar pesos/parametros de modo controlado.\n* Validação automática dos dados submetidos (schema, volumes, duplicatas) antes de aceitar para treino.\n* Capacidade de rodar treinos em sandbox/ambiente controlado com métricas geradas (precisão, recall, F1, perda).\n\n3) Controle de Versão e Segurança\n\n* Histórico de versões do modelo e do dataset usado no treino, com possibilidade de rollback.\n* Permissões: papéis definidos (operador, curador, aprovador) para limitar ações sensíveis.\n* Auditoria: logs de quem fez alterações, quando e quais parâmetros foram alterados.\n\n4) Avaliação e Aprovação\n\n* Ambiente de pré-produção para avaliação dos resultados por stakeholders.\n* Processo de aprovação para promover o modelo para produção (checklist de métricas e teste de aceitação).\n\n5) Integração com pipelines existentes na Torre de Controle\n\n* Endpoints/API para disparar treinos e para recuperar métricas e versões.\n* Notificações (Slack/Email/Bitrix) sobre status de treinos e aprovações.\n\nCritérios de aceitação sugeridos:\n\n* Operadores do time de Cobrança conseguem submeter exemplos e marcá-los em produção de forma rastreável.\n* É possível executar um treino controlado e obter métricas comparativas entre versões.\n* Implementadas permissões e logs de auditoria.\n* Processo de aprovação que permita promover um modelo para produção com checklist preenchido.\n\nDependências e dúvidas:\n\n* Precisamos confirmar qual(s) modelos/serviços de IA atuais serão gerenciados por essa funcionalidade.\n* Confirmar armazenamento de dados sensíveis e políticas de anonimização (LGPD).\n* Definir ambientes disponíveis para treino (sandbox/prd) e custos computacionais.\n\nLinks/Anexos:\n\n* (Nenhum anexo fornecido)\n\nPrioridade: 1 (Altíssima) — solicitada como urgente pelo solicitante.\n\nObservações finais:\n\n* Recomenda-se alinhamento inicial entre time de IA/Automação e representantes de Cobrança para detalhar requisitos UX e fluxos de permissão antes de iniciar desenvolvimento.",

                      "contexto":  "Solicitante: joao.martins@blips.com.br (João Martins)  \nÁrea Solicitante: Cobrança  \nDemanda Original:  \nBoa tarde Senhores segue formalização da demanda passada no grupo dia 26/02/2026.\n\n3️⃣ Ajustes no CRM (Bitrix)  \nGarantir atuação correta do time, com espelhamento fiel da base da Torre de Controle.\n\nPara que a base de cobrança ativa pelo time de cobrança(humano) seja idêntica a torre refletindo a realidade atingindo o público correto.\n\natt;\n\nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/1341/](https://blips.bitrix24.com.br/crm/type/1170/details/1341/)\n\nDescrição detalhada (para Time de IA e Automação):\n\nObjetivo:\n\n* Garantir que a base de cobrança ativa apresentada no CRM (Bitrix) esteja perfeitamente espelhada com a base fonte \"Torre de Controle\", de modo que o público listado para o time de cobrança humano seja idêntico ao da Torre.\n\nEscopo inicial:\n\n* Analisar o processo de sincronização/espelhamento entre Torre de Controle e Bitrix (pontos de integração, ETL/ELT, APIs, jobs agendados, scripts de transformação).\n* Identificar divergências entre as duas bases (quantitativas e qualitativas) e suas causas (filtros incorretos, mapeamento de campos, erros em jobs, latência, registros duplicados/excluídos).\n* Propor e aplicar correções para garantir a consistência contínua (reconciliação automática, monitoramento, alertas).\n\nEntregáveis esperados:\n\n1) Relatório diagnóstico com evidências das principais discrepâncias (amostras, contagens, logs) e localização do problema (query/endpoint/job responsável).  \n2) Lista de correções propostas (alterações em queries, filtros, jobs, tratamento de dados) com estimativa de esforço e riscos.  \n3) Implementação das correções em ambiente de homologação e plano de validação.  \n4) Script ou processo de reconciliação periódico (ex.: job diário) que compara Torre x Bitrix e gera alertas quando divergência \u003e X% ou \u003e N registros.  \n5) Testes e validação com sample de usuários; deploy em produção com rollback claro.\n\nCritérios de aceitação (exemplos):\n\n* Contagem total de registros ativos no CRM = contagem na Torre de Controle ± tolerância definida (sugerir 0-1% inicialmente).\n* Para um conjunto de 100 registros amostrados, 100% dos IDs e status correspondam entre as bases.\n* Logs de sincronização sem erros críticos nas últimas 24h (após correção).\n\nDados e informações necessárias do solicitante para avançar rapidamente:\n\n* Exemplos de casos onde o público divergiu (IDs ou prints) e datas/hora do ocorrido.\n* Informação sobre o processo atual: hora/frequência da sincronização, se é push da Torre ou pull do Bitrix, e endpoints/queries utilizados (se disponíveis).\n* Nome do responsável técnico na Torre de Controle e no CRM para alinhamento.\n\nPrioridade e prazo:\n\n* Urgente (solicitado como urgente). Prioridade no Jira definida como 1 (Altíssima).\n* Recomenda-se resposta inicial dentro de 24 horas para início da investigação.\n\nObservações adicionais:\n\n* Se houver dependência de outros times (dados/tower infra), incluir os contatos e abrir sub-tasks com o time de Dados, caso necessário.\n* Caso a demanda seja sobre regras de negócio (quem deve entrar na base ativa), garantir alinhamento com o time de Negócios/Cobrança antes de aplicar filtros.\n\nSolicitante para contato: joao.martins@blips.com.br",
