                      "historia":  "",
                      "contexto":  "Solicitante: leonardo@finza.com.br  \nÁrea Solicitante: Finza  \nDemanda Original: Criação de automação para validação diária de callbacks da Finnet (Registro e Liquidação)  \nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/861/](https://blips.bitrix24.com.br/crm/type/1170/details/861/)\n\nDescrição detalhada:  \nImplementar uma automação diária que valide a ausência de callbacks da Finnet para registros e liquidações de boletos. A automação deve:\n\n* Suportar múltiplas empresas do grupo (parametrizável por empresa).\n* Autenticar na API da Finnet usando credenciais seguras (armazenadas em cofre de segredos).\n* Consultar boletos nas janelas temporais definidas (D-3 para registro e D-3 para liquidação) e identificar títulos que deveriam gerar callback mas não tiveram retorno.\n* Validar, no Módulo Financeiro, se o callback correspondente (registro ou liquidação) foi recebido para cada título consultado.\n* Persistir todos os erros/ocorrências/insights em estrutura dedicada no BigQuery (dataset e tabela a definir), incluindo: id do título, empresa, data do boleto, tipo de callback esperado (registro/liq), resposta da API, timestamp da validação, e metadados do processo.\n* Registrar logs e métricas (execuções, número de falhas, tempo de execução) para monitoramento.\n* Gerar um arquivo anexo (CSV/Excel) com os títulos impactados e enviar automaticamente um email para o contato da Finnet quando houver inconsistências, com cópia para os stakeholders internos configuráveis.\n* Implementar regras de retry em caso de falha temporária de comunicação com a Finnet e alertas em caso de falhas persistentes.\n* Garantir idempotência das execuções diárias e evitar duplicidade de envios/em registros.\n\nRequisitos não funcionais:\n\n* Segurança: credenciais em cofre, conexão TLS, logging sem dados sensíveis.\n* Observabilidade: métricas expostas (Prometheus/GCP Monitoring) e logs centralizados.\n* Armazenamento: BigQuery (dataset/tabela a definir) com esquema alinhado com o documento de referência.\n* Documentação: seguir o DOC fornecido como referência principal.\n\nDocumentação / referência principal:\n\n[https://docs.google.com/document/d/1AiHvZCeE7UijBGp5NHCSptrHMBKnOlPTMOlAfyYOBj0/edit?usp=sharing](https://docs.google.com/document/d/1AiHvZCeE7UijBGp5NHCSptrHMBKnOlPTMOlAfyYOBj0/edit?usp=sharing)\n\nAcceptance criteria (mínimos):  \n1) Execução diária agendada que verifica callbacks de registro e liquidação (janela D-3).  \n2) Erros persistidos em BigQuery com dados mínimos listados acima.  \n3) Email automático enviado para Finnet com arquivo anexo quando houver títulos impactados.  \n4) Logs e métricas disponíveis para investigação e monitoramento.  \n5) Execução deve ser idempotente e possuir retries configurados.\n\nContato/apoio:\n\n* Solicitante: leonardo@finza.com.br\n\nObservações adicionais:\n\n* Ajustar dataset/tabela no BigQuery conforme arquitetura do time de dados.\n* Definir lista de contatos da Finnet e modelo de email (assunto/corpo) antes da primeira execução.",

                      "contexto":  "Solicitante: Thiago Garcia (thiago.garcia@blips.com.br)  \nÁrea Solicitante: IA  \nDemanda Original: Erro IA dados financeiros  \nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/817/](https://blips.bitrix24.com.br/crm/type/1170/details/817/)\n\nDescrição detalhada:  \nCliente reportou que a IA informou que restaria apenas 1 boleto para quitação do contrato, porém ao verificar o cliente (via dados financeiros) há outros boletos em aberto. Em anexo foram enviados relatos de dois ocorridos. CNPJs envolvidos:\n\n* 43.440.358/0001-48\n* 36.363.205/0001-89\n\nAnexo (relatos/documentos): [https://blips.bitrix24.com.br/bitrix/services/main/ajax.php?action=crm.controller.item.getFile\u0026SITE_ID=s1\u0026entityTypeId=1170\u0026id=817\u0026fieldName=UF_CRM_95_1746795386\u0026fileId=542793](https://blips.bitrix24.com.br/bitrix/services/main/ajax.php?action=crm.controller.item.getFile\u0026SITE_ID=s1\u0026entityTypeId=1170\u0026id=817\u0026fieldName=UF_CRM_95_1746795386\u0026fileId=542793)\n\nReproduzir / Observações iniciais:\n\n* Verificar quais fontes de dados (tabelas/endpoint) a IA consulta para compor o status de boletos/parcelas.\n* Conferir se há problemas de frescor (staleness), agregação incorreta ou regras de negócio que filtram boletos pagos/abertos.\n* Validar se os CNPJs acima retornam resultado diferente entre a base transacional e o modelo de IA.\n* Incluir logs e amostras de requisições/respostas da API de IA para o(s) cliente(s) afetados.\n\nImpacto:\n\n* Informação incorreta ao cliente sobre boletos em aberto, podendo causar perda de confiança e problemas financeiros.\n\nO que pedimos ao time IA e Automação:\n\n1) Investigar a origem da discrepância entre os dados financeiros reais e a resposta da IA.  \n2) Identificar se é problema de ingestão/refresh de base, regra de negócio do modelo, ou bug na consulta/consulta de agregação.  \n3) Corrigir o modelo/regra ou pipeline que causa a discrepância.  \n4) Documentar a causa raiz e a correção aplicada.\n\nDados adicionais que podem ajudar:\n\n* IDs dos clientes (CNPJs listados acima).\n* Horário aproximado dos relatos (ver anexo para datas/horários se presentes).\n\nPrioridade sugerida: Alta (2) — não marcado como urgente, mas impacto cliente relevante.\n\nPrazo: (não informado) - solicitar confirmação do SLA com a área solicitante se necessário.",

                      "contexto":  "Solicitante: Lucas Reimer (lucas.reimer@blips.com.br)  \nÁrea Solicitante: Finza  \nDemanda Original: Hoje os titulos do FIDC em atraso estão caindo para uma fila separada no Bitrix para a cobrança. Gostaria que os casos após a recompra, saíssem da fila do FIDC e entrassem em fila normal de atendimento.  \nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/957/](https://blips.bitrix24.com.br/crm/type/1170/details/957/)\n\nDescrição detalhada (para o time de IA e Automação):  \n1) Contexto atual:\n\n* Casos de títulos do FIDC em atraso são roteados automaticamente para uma fila separada no Bitrix destinada à cobrança.\n* Quando ocorre a recompra (recompra do título), os casos permanecem ou não saem corretamente dessa fila, sendo necessário que passem para a fila normal de atendimento.\n\n2) Objetivo:\n\n* Ajustar a lógica/automação no Bitrix para que, quando um caso receber o evento/flag de \"recompra\", ele seja removido da fila FIDC e reencaminhado para a fila normal de atendimento.\n\n3) Escopo sugerido (tarefas esperadas):\n\n* Revisar as automações/workflows e regras de roteamento atuais que movem casos para a fila FIDC.\n* Identificar o campo/evento que sinaliza \"recompra\" (ex.: status, campo customizado, tag ou evento de integração) e confirmar como a informação chega ao Bitrix.\n* Implementar condição adicional na regra de roteamento: se recompra = true (ou status correspondente), mover para fila normal em vez de fila FIDC.\n* Garantir que quaisquer automações concorrentes (ex.: regras de prioridade, time de cobrança) não revertam o roteamento.\n* Testes em ambiente de homologação (casos de teste: recompra antes do roteamento, recompra após roteamento, sem recompra) e validar o comportamento esperado.\n* Planejar liberação/implantação e monitoramento pós-implementação (logs, alertas, rollback se necessário).\n\n4) Critérios de aceitação:\n\n* Quando um caso tiver o indicador de recompra, ele não deve ficar na fila FIDC e deve aparecer na fila normal de atendimento.\n* Testes com diferentes cenários (recompra pré e pós-roteamento) aprovados em homologação.\n* Registro das alterações no Bitrix e documentação das regras atualizadas.\n\n5) Informações pendentes / perguntas ao solicitante (se aplicável):\n\n* Qual o campo ou evento exato que identifica a recompra no Bitrix (nome do campo, valor e/ou integração responsável)?\n* Há preferência sobre qual fila \"normal\" deve receber os casos (nome da fila)?\n* Existe ambiente de homologação disponível para testes e quem é o contato técnico no time do cliente para validar os testes?\n\nObservações:\n\n* Não identificado anexo no pedido original.\n* Demanda não marcada como urgente.",

                      "contexto":  "Solicitante: Jessica Felipe (jessica.felipe@finza.com.br)  \nÁrea solicitante: Cobrança  \nDemanda Original: Projeto IA atendimento Nível 1 em 100% dos atendimentos de cobrança  \nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/615/](https://blips.bitrix24.com.br/crm/type/1170/details/615/)\n\nContexto e problema:\n\n* Atualmente a plataforma Hyper (Hyperflow) aciona a IA apenas no primeiro contato com o cliente. Em casos de atendimentos transferidos de outros departamentos, as IAs (Esperanza e Valentina) não são acionadas.\n* Como consequência, um volume significativo de casos de baixa complexidade está sendo direcionado ao time de especialistas humanos da Cobrança, aumentando custo operacional e tempo de atendimento.\n\nObjetivo da demanda:\n\n* Permitir que as IAs Esperanza e Valentina sejam acionadas também em atendimentos recebidos via transferência entre setores, garantindo que a triagem automática ocorra em 100% dos atendimentos de cobrança antes de encaminhar ao time de especialistas.\n\nEscopo esperado / Requisitos mínimos:\n\n1) Avaliar compatibilidade/configuração na plataforma Hyperflow para acionar as IAs em interações transferidas (não apenas no primeiro contato);  \n2) Implementar a lógica necessária para que, ao receber um atendimento transferido para Cobrança, as IAs Esperanza e Valentina sejam executadas e decidam se o caso segue para atendimento humano;  \n3) Garantir que apenas após o crivo (verificação/triagem) das IAs o caso seja encaminhado ao time de especialistas;  \n4) Definir critérios de decisão/thresholds que as IAs devem utilizar para encaminhar para especialistas (ex.: confiança abaixo de X% ou intents de alta complexidade);  \n5) Testes em ambiente de homologação com amostras de transferências reais e validação pós-implementação;  \n6) Plano de rollback/mitigação caso a alteração impacte negativamente outros pipelines ou cause regressão;  \n7) Entregáveis: documentação das mudanças, plano de testes, cronograma estimado para implementação e métricas alvo (ex.: redução de X% nas transferências para especialistas, aumento de Y% de atendimentos resolvidos por IA).\n\nCriticidade / Prioridade:\n\n* Urgente. Solicitante indicou necessidade imediata. Prioridade atribuída: 1 (altíssima).\n\nObservações e pedido ao time de IA/Automação:\n\n* Encaminhar essa solicitação ao time da Hyperflow (contato/portal de suporte) para avaliação de viabilidade técnica e solicitamos estimativas de prazo.\n* Confirmar dependências (ex.: versão da plataforma Hyperflow, necessidade de alteração de roteadores/flows, eventos de transferência que disparam a IA).\n* Informar risco de impacto em outras integrações/pipelines e necessidade de comunicação com times remetentes das transferências.\n\nSolicitação de retorno:\n\n* Por favor, estruturar a solicitação junto ao time da Hyper e posicionar a área solicitante quanto aos prazos previstos para implementação.\n\nAnexo original:\n\n* (Nenhum arquivo anexado ao Bitrix)",

                      "contexto":  "Solicitante: Jessica Felipe (jessica.felipe@finza.com.br)  \nÁrea Solicitante: Cobrança  \nDemanda Original: Configuração conta de e-mail Hyperflow  \nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/707/](https://blips.bitrix24.com.br/crm/type/1170/details/707/)\n\nDescrição detalhada:\n\nSolicitação de configuração de contas de e-mail na plataforma Hyperflow para tratamento de retornos de cobrança diretamente pela plataforma Omnichannel.\n\n1) Contas de e-mail a serem vinculadas ao Hyperflow\n\n* boletos@blips.com.br\n* boletos@ideal.com.br\n* boletos@finza.com.br\n\nObjetivo: permitir que os retornos recebidos por essas contas sejam tratados diretamente na plataforma Omnichannel, possibilitando atendimento personalizado por mais esse canal.\n\n2) Colaboradores que devem visualizar os protocolos gerados\n\n* Maria Eduarda Medeiros Silva\n* Felipe de Souza Domingos\n* Igor Joaquim de Carvalho\n\nGarantir que esses usuários tenham permissão para visualizar/atender os protocolos originados pelos e-mails acima na fila/canal adequado dentro do Hyperflow.\n\n3) Regra de tratamento automático para retornos de erro  \nOs e-mails de retorno com as seguintes características devem ser finalizados automaticamente (sem ação manual), pois não haverá tratativa por parte do time:\n\n* Título/Assunto: \"Delivery Status Notification (Delay)\"\n* Remetente: \"mailer-daemon@googlemail.com\"\n\nNecessário configurar regra/filtro no fluxo do Hyperflow/Omnichannel para identificar esses casos e encerrar automaticamente o protocolo/chamado correspondente.\n\nObservações:\n\n* Relacionado à organização Finza na Hyperflow (há outras demandas de acesso já abertas para este cliente, como \u003ccustom data-type=\"smartlink\" data-id=\"id-0\"\u003ehttps://blips-dev.atlassian.net/browse/IA2-565#icft=IA2-565\u003c/custom\u003e, mas esta demanda é especificamente para configuração de canais de e-mail e regras de tratamento).",

                      "historia":  "",
                      "contexto":  "Solicitante: Renato Riscifina (renato.riscifina@blips.com.br)  \nÁrea Solicitante: IA  \nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/1309/](https://blips.bitrix24.com.br/crm/type/1170/details/1309/)\n\nDemanda original:  \n\"É necessário que os contratos que tem um atraso superior a 91 dias sejam enviados ao funil de distrato, uma vez que ficam em aberto no funil de gestão de carteiras sem tomada de ação.\"\n\nDescrição detalhada da tarefa:  \nCriar uma automação no processo de gestão de carteiras que identifique contratos com atraso superior a 91 dias e mova (ou crie um card) automaticamente para o funil de distrato. A automação deve considerar os seguintes pontos:\n\n* Critério de seleção: contratos com idade de atraso \u003e 91 dias (a fonte do campo de atraso deve ser especificada: nome da tabela/coluna ou origem no sistema de gestão de carteiras). Se houver dúvidas sobre como é calculado o atraso, alinhar com o time de negócios para confirmar a regra (ex.: dias corridos vs. dias úteis, considerar renegociações, suspensões, etc.).\n* Ação esperada: mover o contrato do funil de gestão de carteiras para o funil de distrato ou criar um card/registro no funil de distrato, preservando histórico e campos relevantes (status, data do último contato, valor em atraso, id do contrato, responsável atual).\n* Frequência da automação: definir se a verificação será diária, horário específico ou em evento (recomendado: execução diária com janela de execução fora do horário de pico).\n* Backfill/retroatividade: decidir se a automação deve rodar inicialmente para verificar contratos já existentes com \u003e91 dias e mover conforme regra (recomendado: rodar backfill controlado com logs/rollbacks).\n* Segurança e validações: garantir que não haja movimentos automáticos indevidos (ex.: contratos com acordos ativos ou em tratativa). Incluir exceções/whitelist de contratos que não devem ser movidos automaticamente.\n* Logs e auditoria: registrar todas as ações (quem/quando/por qual rotina), possibilitar reversão manual e incluir rastreabilidade para atendimento a dúvidas.\n* Notificações: notificar o time responsável e/ou dono do contrato quando um contrato for movido para distrato (e.g., via e-mail, Slack ou comentário no card).\n* Testes e homologação: criar ambiente de testes e conjunto de casos de teste (incluindo contratos próximos de 91 dias, exatamente 91, 92, com acordos, etc.). Validar com time de negócios antes de rodar em produção.\n* Rollout: planejar implantação gradual e monitoramento nas primeiras execuções para evitar impactos indevidos.\n\nDados esperados/informações necessárias ao time técnico (insira se já disponíveis ou solicitar ao solicitante):\n\n* Onde está armazenado o indicador de atraso (tabela, coluna, API ou campo no Bitrix/CRM).\n* Regras de negócio detalhadas sobre exceções (acordos, renegociações, suspensão de cobrança, etc.).\n* Campos que devem ser preservados ou preenchidos no funil de distrato.\n* Usuários/donos que devem receber notificações.\n\nPrazo solicitado: Urgente (solicitante marcou como urgente)\n\nObservações adicionais:  \nFavor alinhar com Renato Riscifina para confirmação das fontes de dados e regras de exceção antes de iniciar a implementação.",

                      "contexto":  "### Resumo\n\nMelhorias solicitadas para a Torre de Controle 2.1 da Finza. A demanda inclui ajustes funcionais, correções operacionais e evoluções de automação/formalização.\n\n### Contexto\n\nSolicitante: João Martins    \nÁrea Solicitante: Cobrança    \nDemanda Original: Melhorias Torre 2.1    \nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/1653/](https://blips.bitrix24.com.br/crm/type/1170/details/1653/)\n\n### Critérios de aceitação\n\n* Validar falha na execução da negativação (Serasa Ideal e Finza).\n* Reavaliar caso reportado na Blips com comportamento incorreto.\n* Ajustar o fluxo de formalização por departamento.\n* Desenvolver uma IA voltada para formalização na Finza.\n* Realizar indexação da pesquisa na aba de ações.\n* Corrigir o botão de “forçar campanha já concluída”.\n* Implementar opções de cooldown 0 para envio imediato em testes.\n* Implementar cooldown infinito para impedir reenvio.\n* Verificar falha na extração de base filtrada nas abas de gestão de carteira e filtros.\n* Incluir colunas de segmento, modalidade e empresa.\n* Adicionar identificação de PNP quando o maior atraso do contrato corresponder à primeira parcela.\n* Criar validação via API para confirmação do sucesso da negativação.\n* Implementar filtro para identificar em qual régua o cliente se encontra.\n* Criar filtro para identificação de ações de integração, como notificação e negativação.\n* Alinhar preview dos templates HSM com a configuração real no META/N8N.\n* Revisar inconsistências na validação de variáveis em HSMs personalizados em todos os canais citados.\n* Incluir informação de equipamento vinculado ao contrato na variável de contratos com títulos vencidos.\n* Realizar treinamento da IA por torre de forma individualizada, citando Esperanza e Valentina.\n* Permitir definição massiva do número integrado utilizado na comunicação dentro da régua, com opção de personalização individual.\n* Permitir alteração massiva de                       "contexto":  "Solicitante: Maycon Ramos  \nÁrea Solicitante: Cobrança  \nDemanda Original: Gostaria de solicitar o apoio em relação a um processo que está impactando o fluxo de atendimento do nosso setor de Cobrança. Atualmente, os técnicos entram em contato com os atendentes para tratar sobre diversos assuntos, sendo necessário entender a demanda e posteriormente passar o contato da Kathucia para as devidas tratativas.\n\nNo entanto, identificamos que no Hyperflow não existe a opção de direcionamento para o setor de Suporte Técnico, e consequentemente o contato da responsável. Dessa forma, quando a IA realiza a filtragem dos chamados, ela não consegue direcioná-los corretamente e acaba encaminhando essas demandas para o setor de Cobrança.\n\nEsse cenário tem gerado sobrecarga no nosso atendimento, além de exigir redirecionamentos manuais frequentes.\n\nDiante disso, solicitamos, por gentileza:\n\nA criação da opção/fluxo de Suporte Técnico no Hyperflow para direcionamento correto dos chamados relacionados à técnicos;\n\nA inclusão do contato da responsável no fluxo, para facilitar o contato e encaminhamento das solicitações.  \nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/1597/](https://blips.bitrix24.com.br/crm/type/1170/details/1597/)\n\nDescrição: Demanda original: solicitação de ajuste no Hyperflow para corrigir o direcionamento de chamados relacionados a técnicos, que atualmente estão sendo encaminhados indevidamente para o setor de Cobrança.\n\nDescrição detalhada: criar uma nova opção/fluxo de Suporte Técnico no Hyperflow para que a IA consiga identificar e direcionar corretamente chamados desse tipo. Também deve ser incluído no fluxo o contato da responsável mencionada, permitindo o encaminhamento adequado das solicitações e reduzindo a sobrecarga operacional do time de Cobrança causada por redirecionamentos manuais.",

                      "contexto":  "Solicitante: João Martins  \nÁrea Solicitante: Cobrança  \nDemanda Original: Bom dia Senhores(as)\n\nNós últimos dias identificamos cliente recebendo mensagem de atendimento encerrado por inatividade por volta das 00:00 ou até mais tarde que isso.\n\nPeço que seja padronizado o envio dessa mensagem às 18:00 para os departamentos e organizações abaixo:\n\n\\--\u003e BLIPS :  \nCobrança  \nCobrança - Suprimentos  \nCobrança Email  \nCobrança Automatizada  \nFIDC  \nFallback Cobrança  \nFinanceiro Blips  \nFinanceiro Ideal  \nFormalização\n\n\\--\u003e FINZA :  \nFormalização  \nFIDC  \nLiquidação Financeira  \nRetirada de Equipamentos\n\nTemos o departamento da IA - Financeiro no qual não precisa colocar essa mensagem caso o cliente esteja pós este horário pois a IA trabalha 24/7, somente quando a IA precisar de transferir pra um departamento depois desse horário que ela deve informar que vai enviar para um de nossos especialistas porém por estar fora de horário expediente retornaremos logo no início da jornada de trabalho.\n\nAvaliem também a melhoria da mensagem pensando na experiência do cliente.\n\nOBS: Todos outros departamentos criados pela equipe de Cobrança da Jéssica também deveram entrar nessa regra.\n\nGrato J  \nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/1623/](https://blips.bitrix24.com.br/crm/type/1170/details/1623/)  \nDescrição: Demanda original: padronizar o envio da mensagem de encerramento por inatividade no Hyper para ocorrer às 18:00 nos departamentos informados de BLIPS e FINZA, evitando que clientes recebam a mensagem por volta de 00:00 ou depois.\n\nDescrição detalhada:\n\n* Ajustar a regra de horário de encerramento por inatividade para que a mensagem seja enviada às 18:00.\n* Aplicar a regra aos departamentos listados da operação de Cobrança/Financeiro em BLIPS e FINZA, incluindo também novos departamentos criados pela equipe de Cobrança da Jéssica.\n* Considerar exceção para o departamento IA - Financeiro: não enviar mensagem de encerramento por inatividade após esse horário quando o atendimento permanecer na IA, pois a operação é 24/7.\n* Quando a IA - Financeiro precisar transferir para um departamento humano fora do horário de expediente, informar ao cliente que o encaminhamento será realizado e que o retorno ocorrerá no início da próxima jornada de trabalho.\n* Avaliar e propor melhoria no texto da mensagem, considerando melhor experiência do cliente.\n* Validar se a regra deve contemplar todos os departamentos atuais e futuros vinculados à operação de Cobrança mencionada.\n\nObjetivo esperado:\n\n* Eliminar disparos tardios da mensagem de encerramento por inatividade.\n* Padronizar comunicação de encerramento fora do expediente.\n* Preservar a operação 24/7 da IA - Financeiro com tratamento adequado para transferências após o horário comercial.",

                      "contexto":  "Solicitante: Emily Ribeiro (emilly.ribeiro@blips.com.br)  \nÁrea solicitante: IA  \nDemanda Original: Retirar os avisos de cobrança, pois o boleto do cliente foi prorrogado, porém a IA ainda manda mensagens de cobrança  \nLink Bitrix (anexo): [https://blips.bitrix24.com.br/bitrix/services/main/ajax.php?action=crm.controller.item.getFile\u0026SITE_ID=s1\u0026entityTypeId=1170\u0026id=1303\u0026fieldName=UF_CRM_95_1746795386\u0026fileId=695683](https://blips.bitrix24.com.br/bitrix/services/main/ajax.php?action=crm.controller.item.getFile\u0026SITE_ID=s1\u0026entityTypeId=1170\u0026id=1303\u0026fieldName=UF_CRM_95_1746795386\u0026fileId=695683)\n\nDescrição detalhada (para Time de IA e Automação):  \nContexto:\n\n* Cliente: Eliseu Greniski (CNPJ 38.428.706/0001-21) / telefone +55 42 99975 8264\n* Protocolo: 1802267894750\n* Conversa registrada em 18/02 (mensagens e áudio). Atendimento transferido com observação de cobrança indevida.\n* Nota no atendimento: Bot registrou interação \"Feito por: Bot -18/02 - 10:10\".\n\nProblema reportado:\n\nA IA/automação continua enviando avisos de cobrança mesmo após o boleto do cliente ter sido prorrogado (ou após alteração/cancelamento do vencimento). Isso resulta em mensagens de cobrança indevidas para o cliente.\n\nObjetivo:  \nIdentificar por que o disparo de avisos de cobrança não foi suprimido após a prorrogação/alteração do boleto e aplicar correções para que, em casos de prorrogação, cancelamento ou ajuste de vencimento, a IA não envie cobranças automáticas indevidas.\n\nO que verificar / passos sugeridos:  \n1) Reproduzir o caso com o histórico do cliente (usar protocolo e timestamps do anexo) para checar o fluxo de decisão que aciona a mensagem de cobrança.  \n2) Validar origem dos dados de vencimento (sistema financeiro / base de dados) usados pelo orquestrador/engine que decide envios. Conferir se há atraso na atualização do status (prorrogado/cancelado) que pode gerar envios indevidos.  \n3) Checar regras/flags que desabilitam envios (ex.: flag \"prorrogado\", \"cancelado\", status de boleto) e se o conector/cron respeita essas flags.  \n4) Revisar templates e filas de disparo (agendamentos pendentes) para remover/atualizar envios já agendados quando houver alteração no vencimento.  \n5) Verificar logs de envio e tarefas agendadas entre 18/02 e datas relacionadas para identificar envios ocorridos indevidamente.  \n6) Implementar correção: garantir que alterações de vencimento/cancelamento provoquem cancelamento/occultamento dos avisos pendentes (sincronização imediata ou retry com debounce), ou bloquear envios se houver alteração no prazo nas últimas X horas.  \n7) Propor uma proteção adicional: sinalizar manualmente casos transferidos/abertos por atendimento para bloquear envios até que o caso seja resolvido.  \n8) Testes e rollout: criar casos de teste automatizados cobrindo alteração de vencimento e garantir rollback/monitoramento após deploy.\n\nCritérios de aceitação:\n\n* Em caso de prorrogação/alteração de vencimento/cancelamento, nenhum aviso de cobrança é enviado após a mudança para os clientes afetados.\n* Logs demonstram que o envio foi cancelado ou não disparado após a alteração.\n* Procedimento documentado para atendimento bloquear envios manualmente quando necessário.\n\nInformações adicionais (do anexo):\n\n* Imagem do chat com transferência do atendimento e observação: \"Resumo Atendimento Esperança: O cliente Eliseu está reclamando de cobranças automáticas indevidas...\" (ver link do anexo para captura completa).\n\nSolicitante sugere: Remover/pausar os avisos de cobrança para o cliente em questão até apuração. Se for necessário, permitir bloqueio manual pelo time de atendimento.\n\nPrioridade sugerida: Média (3) - não marcado como urgente pelo solicitante, porém tem impacto em experiência do cliente e deve ser resolvido com prioridade moderada.",

                      "contexto":  "Solicitante: bruno.garcia@finza.com.br  \nÁrea Solicitante: Finza  \nDemanda Original: O dash \"Análise Cancelados\" do Painel Cancelados e PDD não está mostrando a classificação dos motivos de cancelamento pela IA. Se eu filtro por Classificar: Plataforma todos os cancelamentos estão classificados. Se eu filtro por qualquer IA (IA e Nascimento, IA, Nascimento) ele apresenta um alto volume de contatos sem motivo classificado. Me parece ser que a IA não está classificando e atualizando a classificação para leitura. Por favor, verifiquem.\n\nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/1181/](https://blips.bitrix24.com.br/crm/type/1170/details/1181/)\n\nDetalhes observados (anexo): imagem do painel \"Painel Cancelados e PDD\" - filtro ativo \"Análise Cancelados\", data jan. de 2026. Treemap mostra \"Contratos por Motivo de Cancelamento\" e contador superior direito indica \"Contratos sem Motivo: 208\". Filtro de classificação na tela mostra opções: \"CLASSIFICAR: IA E N...\". Quando selecionado \"Classificar: Plataforma\" as classes aparecem normalmente; quando selecionado qualquer opção referente a IA (ex: \"IA e Nascimento\", \"IA\", \"Nascimento\") há grande volume de contratos sem motivo classificado.\n\nHipóteses iniciais a verificar:\n\n* Processo de inferência/serviço de IA pode estar com falha (modelo não recebendo mensagens, erro em job agendado, serviço offline).\n* Resultado da inferência pode não estar sendo persistido na tabela/coluna usada pelo painel (problema de escrita/atualização).\n* Pipeline de ingestão/atualização que popula o campo de classificação pode estar com erro ou bloqueado (mensagens em fila/Kafka, jobs Airflow/DBT falhando).\n* Painel (query/Looker/LookerStudio) pode estar filtrando o campo errado ou a lógica de atualização/refresh não está refletindo novos registros.\n* Questões de versão do modelo (novo modelo sem mapping antigo) ou alteração no nome do campo/valores de classificação.\n\nO que pedimos que o time verifique inicialmente:\n\n1) Reproduzir o problema localmente no ambiente de produção: aplicar filtro por Classificar=IA e comparar com Plataforma.  \n2) Checar logs do serviço de inferência/treinamento (últimas execuções, erros, throughput).  \n3) Verificar a tabela/coluna onde a classificação IA é gravada (últimos registros, timestamps, contagem de nulls) e confirmar se houve writes recentes.  \n4) Conferir jobs/ETL responsáveis por atualizar a classificação no dataset usado pelo painel (status dos jobs, erros, tempo da última execução).  \n5) Validar se houve deploy/alteração recente no modelo, no nome de campo ou no pipeline que altere valores esperados.  \n6) Se for identificação de falha na persistência ou inferência, realizar correção e, se necessário, reprocessar/backfill os contratos sem motivo (ex.: 208 casos indicados no anexo).  \n7) Informar causa raiz, ação tomada e estimativa de tempo para resolução e para eventual reprocessamento/backfill.\n\nCritérios de aceitação:\n\n* Painel \"Análise Cancelados\" exibe a classificação por IA corretamente ao aplicar filtros de Classificar=IA\\* (sem apresentar alto volume sem motivo).\n* Logs e jobs relacionados mostram sucesso nas últimas execuções relevantes.\n* Se aplicável, backfill executado e número de contratos sem motivo reduzido/reportado.\n\nAnexos/Links:\n\n* Imagem enviada no Bitrix: [https://blips.bitrix24.com.br/bitrix/services/main/ajax.php?action=crm.controller.item.getFile\u0026SITE_ID=s1\u0026entityTypeId=1170\u0026id=1181\u0026fieldName=UF_CRM_95_1746795386\u0026fileId=648023](https://blips.bitrix24.com.br/bitrix/services/main/ajax.php?action=crm.controller.item.getFile\u0026SITE_ID=s1\u0026entityTypeId=1170\u0026id=1181\u0026fieldName=UF_CRM_95_1746795386\u0026fileId=648023)\n\nSolicitante original: Bruno Fernandes Garcia (bruno.garcia@finza.com.br)",

                      "historia":  "",
                      "contexto":  "Solicitante: Roberta Gonçalves  \nÁrea solicitante: Ongoing  \nDemanda original: Transferência incorreta por estar no setor errado. Cliente em fase de pagamento de frete sendo direcionado ao time de ongoing/gestão de carteiras, na verdade precisa ser direcionado ao time de documentação.  \nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/1507/](https://blips.bitrix24.com.br/crm/type/1170/details/1507/)\n\nDescrição detalhada (contexto e requisitos):\n\n* Contexto: Usuários em processo de pagamento de frete estão sendo encaminhados ao time de Ongoing/gestão de carteiras, o que não corresponde ao fluxo esperado para casos de documentação/validação de pagamento de frete.\n* Comportamento observado: Transferência para setor incorreto (Ongoing) quando o cliente está na fase de pagamento de frete.\n* Comportamento esperado: Encaminhar automaticamente para o time de Documentação (ou fila de documentação) quando o status/intent indicar pagamento de frete/documentação pendente.\n\nReprodução (informações úteis para triagem):\n\n1) Cliente inicia fluxo no hyper e chega à etapa de pagamento de frete.  \n2) Sistema realiza roteamento atual e direciona para Ongoing/gestão de carteiras.  \n3) Resultado: atendimento alocado ao time errado.\n\nImpacto: Alto — provoca retrabalho, atrasos na conclusão do pagamento de frete e afeta experiência do cliente, além de sobrecarregar o time de Ongoing com casos de documentação.\n\nSugestão de investigação/ações iniciais:\n\n* Revisar as regras de roteamento/intent no hyper relacionadas a pagamento de frete e documentação.\n* Verificar condições/flags utilizadas para identificar \u0027fase de pagamento de frete\u0027 e garantir que o mapeamento aponte para a fila de Documentação.\n* Fornecer logs ou exemplos de tickets/UIDs para validar o fluxos (se possível, solicitar exemplos ao solicitante).\n* Implementar testes automatizados no fluxo de roteamento para evitar regressões.\n\nUrgente: Sim\n\nPrioridade sugerida: 2\n\nObservações adicionais: caso o time precise, solicitar ao(a) solicitante exemplos de atendimentos específicos para facilitar a reprodução.",

                      "historia":  "",
                      "contexto":  "Ao mudar o card de raia, os valores preenchidos nos campos da seção **Histórico de Atendimento** (Tabulação, Data acionamento, Tratativa, Motivos de Recusa, Pesquisa de Inadimplência, Especificações de acionamento, Tentativas de negociação, Observações) devem ser:\n\n1. Copiados/movidos para um **comentário** do card, preservando o histórico de atendimentos anteriores.\n2. **Apagados** dos campos originais para permitir novo preenchimento pelo analista da nova raia.\n\nDessa forma, o histórico fica empilhado nos comentários (evitando poluir o lado esquerdo do card) e cada mudança de raia começa com campos limpos, sem um atendimento sobrescrever o anterior.\n\n**Fonte:** [Documento Ajustes Bitrix Cobrança 4.0](https://docs.google.com/document/d/1bV6HAAhn2NiKVPcO6eXJA-kRTjhxVCjEdXyx--viGS0)\n\n**Consolida 3 demandas pendentes do documento:**\n\n* Campos em formato HISTÓRICO (não sobrepor)\n* Campos nos comentários (evitar poluição visual)\n* Limpar histórico ao mudar de raia\n\n---\n\n## 📝 Template para colar no campo \"Comentário\" da automação\n\nNa ação **\"Adicionar comentário ao item\"**, colar o texto abaixo no campo `Comentário`:\n\n```\n📋 Histórico de Atendimento — Raia anterior\n🕐 Mudança registrada por {=Document:ASSIGNED_BY_ID}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n• Tabulação: {=Document:UF_CRM_55_1770209027}\n• Data do acionamento: {=Document:UF_CRM_55_1769688201}\n• Tratativa: {=Document:UF_CRM_55_1770210610}\n• Negociação não realizada devido à: {=Document:UF_CRM_55_1769446757622}\n• Motivo do Atraso: {=Document:UF_CRM_55_1762452751}\n• Especificações de acionamento: {=Document:UF_CRM_55_1762871621}\n• Tentativas de negociação: {=Document:UF_CRM_55_1762871665}\n• Observações: {=Document:UF_CRM_55_1762871712}\n```\n\n### ⚙️ Recomendação de preenchimento\n\nEm vez de colar as variáveis como texto, use o botão `...` (três pontos) ao lado do campo Comentário para abrir o seletor de campos. Selecione cada campo pelo nome amigável em português — o Bitrix insere a sintaxe correta automaticamente e resolve enums em texto legível (ex: mostra \"Promessa de pagamento\" em vez de \"2461\").\n\nA lista de campos a inserir (na ordem):\n\n1. **Tabulação**\n2. **Data do acionamento**\n3. **Tratativa**\n4. **Negociação não realizada devido à** (ou \"Motivos de Recusa\")\n5. **Motivo do Atraso** (ou \"Pesquisa de Inadimplência\")\n6. **Especificações de acionamento**\n7. **Tentativas de negociação**\n8. **Observações**\n\n### 🔧 Segunda ação: \"Modificar item\"\n\nLogo após a ação de comentário, adicionar **\"Modificar item\"** e zerar os 8 campos acima (deixar todos vazios).\n\n### 📍 Raias onde aplicar\n\nAs 2 ações devem ser replicadas em **todas as raias de escalonamento** onde chegam cards com histórico do analista anterior (\\~26 raias):\n\n* Suprimentos 1 a 15, 16 a 30, 31 a 60, 61+\n* FIDC 1 a 15, 16 a 30, 31 a 60, 61 a 90\n* Blips 1 a 15, 16 a 30, 31 a 45, 46 a 60, 61 a 90\n* Ideal 1 a 15, 16 a 30, 31 a 45, 46 a 60, 61 a 90\n* Finza 1 a 15, 16 a 30, 31 a 45, 46 a 60, 61 a 90\n* Aguardando Retenção, Aguardando Suporte\n\n**NÃO aplicar em:** Nova Solicitação, Receptivo Adimplente, SUP Receptivo Adimplente, stages terminais (Pagamento Concluído, Distrato, Jurídico).\n\n**Dica:** configurar numa raia piloto, validar, depois usar \"Copiar regra\" → \"Colar\" nas demais.",

                      "historia":  "",
                      "contexto":  "Solicitante: João Martins  \nÁrea Solicitante: Cobrança  \nDemanda Original: Boa tarde Senhores(as)\n\nCliente recebeu informação por parte da Socorro provavelmente com a Esperanza em subagente no qual o cliente não possuía débitos e estava quitado.\n\nGrato J\n\nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/1919/](https://blips.bitrix24.com.br/crm/type/1170/details/1919/)  \nAnexo/Evidência: [https://blips.bitrix24.com.br/bitrix/services/main/ajax.php?action=crm.controller.item.getFile\u0026SITE_ID=s1\u0026entityTypeId=1170\u0026id=1919\u0026fieldName=UF_CRM_95_1746795386\u0026fileId=862205](https://blips.bitrix24.com.br/bitrix/services/main/ajax.php?action=crm.controller.item.getFile\u0026SITE_ID=s1\u0026entityTypeId=1170\u0026id=1919\u0026fieldName=UF_CRM_95_1746795386\u0026fileId=862205)\n\nDescrição detalhada da tarefa:  \nInvestigar possível falha na IA/agente Socorro, com provável uso da Esperanza como subagente, que informou incorretamente a uma cliente que não havia débitos pendentes e que o contrato/CNPJ estava quitado.\n\nContexto do anexo:  \nA evidência mostra uma conversa no WhatsApp Business/Blip no setor de Cobrança, posteriormente transferida de bot para atendimento humano. A cliente Daiane contesta uma nova comunicação de cobrança mostrando uma mensagem anterior enviada por “Socorro N.”, na qual foi informado que, após conferência de CNPJ e contrato, estaria “tudo pago”, sem parcelas, boletos, máquinas ou suprimentos em aberto. Essa informação aparenta estar em contradição com a cobrança atual, gerando confusão para a cliente e impacto direto no processo de cobrança.\n\nObjetivo:  \n1\\. Verificar os logs/conversa relacionados ao atendimento indicado no Bitrix ID 1919 e no anexo.  \n2\\. Identificar se a resposta incorreta partiu da IA Socorro e/ou do subagente Esperanza.  \n3\\. Validar quais fontes, ferramentas, integrações ou bases de consulta foram utilizadas para concluir que o cliente estava quitado.  \n4\\. Comparar a resposta da IA com a situação real de débitos do cliente no sistema de cobrança/CRM.  \n5\\. Corrigir a causa raiz da informação incorreta, caso seja falha de prompt, regra, consulta, integração, interpretação de retorno ou roteamento entre agentes/subagentes.  \n6\\. Sugerir ou aplicar salvaguardas para impedir que a IA confirme quitação sem evidência confiável da base oficial.  \n7\\. Registrar evidências da análise e orientar o time de Cobrança sobre o status final do caso.\n\nCritério de aceite:\n\n* Causa da informação incorreta identificada.\n* Correção aplicada ou plano de correção definido.\n* IA não deve informar que um cliente está quitado quando ainda há débitos ou quando a consulta não for conclusiva.\n* Retorno registrado para o solicitante/time de Cobrança com a conclusão da análise.",

                      "historia":  "",
                      "contexto":  "Solicitante: Rodolfo Santos (rodolfo.santos@blips.com.br)  \nÁrea Solicitante: Processos  \nDemanda Original: A automação do Bitrix na raia de Notificação Extrajudicial está enfrentando problema (enviando para clientes adimplentes e IDEAL pra BLIPS e vice-versa). A área de Processos já desativou para evitar mais casos. Conversado com Mateus, decidido que deve ser uma funcionalidade presente na Torre de Cobrança. Ao finalizar, por favor, informar Jéssica, Sara e Emely.  \nLink Bitrix: [https://blips.bitrix24.com.br/crm/type/1170/details/1347/](https://blips.bitrix24.com.br/crm/type/1170/details/1347/)\n\nDescrição detalhada (IA e Automação):  \nContexto e problema:\n\n* A automação responsável pelo envio de Notificação Extrajudicial está disparando mensagens para clientes em situação adimplente e também está trocando destinatários entre as filas/tags IDEAL \u003c-\u003e BLIPS (envio cruzado). Isso gerou a necessidade de desativar a automação para evitar contatos indevidos.\n* Decisão da área: a lógica de envio deve residir na Torre de Cobrança (centralizar a regra de definição de público/segmento antes do disparo).\n\nComportamento atual observado:\n\n* Notificações sendo enviadas a clientes adimplentes.\n* Destinatários sendo atribuídos incorretamente entre IDEAL e BLIPS.\n* Automação atualmente desativada pela área de Processos.\n\nComportamento esperado:\n\n* A automação só envie Notificação Extrajudicial para clientes que preencham critérios de inadimplência estabelecidos (definir regras com Processos).\n* A segmentação IDEAL vs BLIPS deve ser determinística e aplicada antes do envio, sem envios cruzados.\n\nImpacto:\n\n* Contatos indevidos com clientes adimplentes (reputacional e legal).\n* Paralisação da rotina de notificações, impactando cobrança.\n* Alta prioridade para restabelecer funcionamento correto com segurança.\n\nRequisitos e dados necessários:\n\n1) Regras de definição de inadimplência e critérios para Notificação Extrajudicial (solicitar definição final da área de Processos).    \n2) Exemplos/IDs de clientes que receberam notificações indevidas (se disponíveis) para reproduzir o problema.  \n3) Logs de execução da automação e histórico de disparos (timestamps, payloads, parâmetros de segmentação).    \n4) Configurações atuais do Bitrix (workflows/raias) e das integrações com IDEAL/BLIPS.  \n5) Acesso a ambientes de homologação para testes antes de reativação.\n\nProposta de ação (passos sugeridos):  \n1) Reunir com Processos (Rodolfo/Jéssica/Sara/Emely) para confirmar regras e obter exemplos.    \n2) Analisar logs e histórico para identificar causa raiz (falha na condição de segmentação, dados de cliente inconsistentes, mapeamento incorreto de filas).    \n3) Implementar correção na lógica (preferencialmente centralizada na Torre de Cobrança) que determine destinatário e condição de envio antes do disparo.    \n4) Criar testes automatizados e testes manuais com base em casos reais para validar comportamento (incluir casos limites).    \n5) Testar em ambiente de homologação e só então reativar em produção.    \n6) Monitoramento pós-reativação por X dias (sugestão: 3 dias) com rollback rápido se novos envios indevidos ocorrerem.\n\nCritérios de aceitação:\n\n* Não há envios para clientes que estejam adimplentes (confirmado por amostra de X clientes e logs).  \n* Segmentação IDEAL vs BLIPS correta em 100% dos casos testados.  \n* Processo documentado e com responsáveis definidos.  \n\nNotificações e comunicação:\n\n* Ao finalizar, informar Jéssica, Sara e Emely (nomes fornecidos pelo solicitante).  \n* Manter Rodolfo como ponto de contato da área de Processos.\n\nPrioridade: Urgente (solicitação marcada como urgente pela área) - Prioridade técnica sugerida: 1 (Altíssima).\n\nObservações adicionais:\n\n* Caso se confirme que o problema é causado por dados inconsistentes, considerar job de correção/validação de base antes de reativar.  \n* Se existirem outros fluxos que dependam dessa automação, listar e avaliar risco de impactos.",

const PRIO_ORDER = {urgente:0,alta:1,media:2,baixa:3};
const PRIO_LABELS = {urgente:'Urgente',alta:'Alta',media:'Média',baixa:'Baixa'};
let currentView='overview',currentFrente=null;
let boardMode = localStorage.getItem('backlog.board.mode') || 'kanban';
let boardFilters = {frentes:new Set(),prios:new Set(),fontes:new Set(),resps:new Set(),query:'',datePreset:'',dateStart:'',dateEnd:'',openOnly:false};
const REF_DATE = new Date((DATA.generated_at||'2026-06-02').slice(0,10)+'T00:00:00');
const OPEN_STATUSES = new Set(['a-refinar','em-refinamento','refinado','em-curso','bloqueado','validacao']);
const FONTES = [...new Set(ITEMS.map(i=>i.fonte).filter(Boolean))];
const RESPS = [...new Set(ITEMS.map(i=>i.responsavel||'—'))].sort((a,b)=>a.localeCompare(b));
function isOpenItem(it){ return OPEN_STATUSES.has(it.status); }
function parseD(s){ if(!s) return null; const d=new Date(String(s).slice(0,10)+'T00:00:00'); return isNaN(d)?null:d; }
function monthStartRef(){ return new Date(REF_DATE.getFullYear(),REF_DATE.getMonth(),1); }
function monthWindow(off){ const s=new Date(REF_DATE.getFullYear(),REF_DATE.getMonth()+off,1); const e=new Date(REF_DATE.getFullYear(),REF_DATE.getMonth()+off+1,0,23,59,59); return {s,e}; }
function isOverdueOpen(it){ const c=parseD(it.criada); return !!(c && isOpenItem(it) && c < monthStartRef()); }
function dateWindow(){
  if(boardFilters.datePreset==='este') return monthWindow(0);
  if(boardFilters.datePreset==='passado') return monthWindow(-1);
  if(boardFilters.datePreset==='anteriores') return {anteriores:true};
  if(boardFilters.dateStart||boardFilters.dateEnd){ const e=parseD(boardFilters.dateEnd); if(e) e.setHours(23,59,59); return {s:parseD(boardFilters.dateStart),e}; }
  return null;
}
let navStack = [];

function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function itemsByFrente(k){return ITEMS.filter(i=>i.frente===k)}
function itemsByStatus(s){return ITEMS.filter(i=>i.status===s)}
function itemsByPrio(p){return ITEMS.filter(i=>i.prioridade===p)}
function cssVar(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim()}
// Donut/pizza chart — paleta light do backlog.
function donut(segments,size=130){
  const segs=segments.filter(s=>s.value>0);
  const total=segs.reduce((s,x)=>s+x.value,0);
  const cx=size/2,cy=size/2,r=size/2-12,sw=18;
  if(total===0){
    return `<svg class="chart-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${cssVar('--border')}" stroke-width="${sw}"/>
      <text x="${cx}" y="${cy+4}" text-anchor="middle" fill="var(--text-muted)" font-size="11" font-weight="600">sem dados</text>
    </svg>`;
  }
  let angle=-Math.PI/2,paths='';
  segs.forEach(seg=>{
    const frac=seg.value/total;
    const a2=angle+frac*2*Math.PI;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const large=frac>0.5?1:0;
    if(frac>=0.999){paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${seg.color}" stroke-width="${sw}"/>`;}
    else{paths+=`<path d="M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}" fill="none" stroke="${seg.color}" stroke-width="${sw}" stroke-linecap="butt"/>`;}
    angle=a2;
  });
  return `<svg class="chart-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    ${paths}
    <text x="${cx}" y="${cy-1}" text-anchor="middle" fill="var(--text)" font-size="22" font-weight="700" font-family="var(--font-mono)">${total}</text>
    <text x="${cx}" y="${cy+15}" text-anchor="middle" fill="var(--text-muted)" font-size="8" font-weight="700" letter-spacing="2">ITENS</text>
  </svg>`;
}
function donutLegend(segments){
  return `<div class="chart-legend">${segments.filter(s=>s.value>0).map(s=>`
    <div class="legend-item">
      <span class="legend-dot" style="background:${s.color}"></span>
      <span class="legend-label">${esc(s.label)}</span>
      <span class="legend-value">${s.value}</span>
    </div>`).join('')}</div>`;
}

function render(view, frente){
  currentView=view;
  if(frente) currentFrente=frente;
  buildSidebar();
  const cur = document.getElementById('crumb-cur');
  const v = document.getElementById('view');
  if(view==='overview'){cur.textContent='Overview';v.innerHTML=renderOverview();}
  else if(view==='board'){cur.textContent='Board';v.innerHTML=renderBoard();attachBoardEvents();}
  else if(view==='analise'){cur.textContent='Análise';v.innerHTML=renderAnalise();}
  else if(view==='frente'){cur.textContent=FRENTES[frente].label;v.innerHTML=renderFrente(frente);}

  if(window.innerWidth<=760) document.getElementById('sidebar').classList.remove('open');
}

function filteredItems(){
  const dw = dateWindow();
  return ITEMS.filter(i=>{
    if(boardFilters.frentes.size>0 && !boardFilters.frentes.has(i.frente)) return false;
    if(boardFilters.prios.size>0 && !boardFilters.prios.has(i.prioridade)) return false;
    if(boardFilters.fontes.size>0 && !boardFilters.fontes.has(i.fonte)) return false;
    if(boardFilters.resps.size>0 && !boardFilters.resps.has(i.responsavel||'—')) return false;
    if(boardFilters.openOnly && !isOpenItem(i)) return false;
    if(dw){
      if(dw.anteriores){ if(!isOverdueOpen(i)) return false; }
      else { const c=parseD(i.criada); if(!c) return false; if(dw.s && c<dw.s) return false; if(dw.e && c>dw.e) return false; }
    }
    if(boardFilters.query){
      const q = boardFilters.query.toLowerCase();
      if(!i.title.toLowerCase().includes(q) && !i.id.toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function renderKanban(items){
  return `<div class="kanban-wrap"><div class="kanban">${STATUSES.map(s=>{
    const its = items.filter(i=>i.status===s).sort((a,b)=>(PRIO_ORDER[a.prioridade]||9)-(PRIO_ORDER[b.prioridade]||9));
    return `<div class="kcol"><div class="kcol-head"><div class="ttl"><span class="sd" style="background:var(--st-${s})"></span>${STATUS_LABELS[s]}</div><span class="ct">${its.length}</span></div>${its.map(itemCard).join('')||'<div class="empty" style="padding:14px 8px">—</div>'}</div>`;
  }).join('')}</div></div>`;
}

function renderGantt(items){
  const semPrazo = items.filter(i=>!i.deadline_alvo).sort((a,b)=>(PRIO_ORDER[a.prioridade]||9)-(PRIO_ORDER[b.prioridade]||9));
  return `${semPrazo.length?`<div class="gantt-noprazo"><div class="gnt-head"><span>Sem prazo definido</span><span>${semPrazo.length} itens · preencha deadline_alvo no refinement para aparecer na timeline</span></div><div class="gnt-list">${semPrazo.map(i=>{const f=FRENTES[i.frente];return `<div class="gnt-it" onclick="openItem('${i.id}')"><div class="id">${i.id} · <span style="color:${f.color}">${esc(f.label.split('·')[0].trim())}</span> · <span class="badge ${i.prioridade}" style="font-size:9px">${PRIO_LABELS[i.prioridade]}</span></div><div style="margin-top:4px">${esc(i.title)}</div></div>`}).join('')}</div></div>`:'<div class="empty"><div class="icon">○</div>Nenhum item nos filtros atuais</div>'}`;
}

function setBoardMode(m){
  boardMode = m;
  localStorage.setItem('backlog.board.mode',m);
  render('board');
}

function attachBoardEvents(){
  document.querySelectorAll('.chip-filter[data-frente]').forEach(c=>{
    c.onclick=()=>{const k=c.dataset.frente;if(boardFilters.frentes.has(k))boardFilters.frentes.delete(k);else boardFilters.frentes.add(k);render('board');};
  });
  document.querySelectorAll('.chip-filter[data-prio]').forEach(c=>{
    c.onclick=()=>{const k=c.dataset.prio;if(boardFilters.prios.has(k))boardFilters.prios.delete(k);else boardFilters.prios.add(k);render('board');};
  });
  document.querySelectorAll('.chip-filter[data-fonte]').forEach(c=>{
    c.onclick=()=>{const k=c.dataset.fonte;if(boardFilters.fontes.has(k))boardFilters.fontes.delete(k);else boardFilters.fontes.add(k);render('board');};
  });
  document.querySelectorAll('.chip-filter[data-resp]').forEach(c=>{
    c.onclick=()=>{const k=c.dataset.resp;if(boardFilters.resps.has(k))boardFilters.resps.delete(k);else boardFilters.resps.add(k);render('board');};
  });
  document.querySelectorAll('.chip-filter[data-dpreset]').forEach(c=>{
    c.onclick=()=>{const k=c.dataset.dpreset;boardFilters.datePreset=(boardFilters.datePreset===k?'':k);boardFilters.dateStart='';boardFilters.dateEnd='';render('board');};
  });
  const tg=document.querySelector('.chip-filter[data-toggle="open"]'); if(tg) tg.onclick=()=>{boardFilters.openOnly=!boardFilters.openOnly;render('board');};
  const ds=document.getElementById('dt-start'); if(ds) ds.onchange=()=>{boardFilters.dateStart=ds.value;boardFilters.datePreset='';render('board');};
  const de=document.getElementById('dt-end'); if(de) de.onchange=()=>{boardFilters.dateEnd=de.value;boardFilters.datePreset='';render('board');};
  const dc=document.getElementById('dt-clear'); if(dc) dc.onclick=()=>{boardFilters.datePreset='';boardFilters.dateStart='';boardFilters.dateEnd='';render('board');};
  const si = document.getElementById('board-search');
  if(si){let t;si.oninput=()=>{clearTimeout(t);t=setTimeout(()=>{boardFilters.query=si.value;document.getElementById('board-content').innerHTML=boardMode==='kanban'?renderKanban(filteredItems()):renderGantt(filteredItems());},200)};}
}

function renderFrente(key){

  if(its.length===0){
    return `<div class="frente-head" style="--c-frente:${f.color}"><div class="lab">Frente · ${f.prefix}##</div><h2><span class="accent">${esc(f.label)}</span></h2><div class="desc">${esc(f.desc)}</div><div class="extra"><div><strong>Sponsor</strong> · ${esc(f.sponsor)}</div><div><strong>Plataforma</strong> · ${esc(f.plataforma||'—')}</div><div><strong>Prefix</strong> · <span class="mono">${esc(f.prefix)}##</span></div></div></div><div class="empty"><div class="icon">○</div><strong style="display:block;margin-bottom:6px">Frente sem itens iniciais</strong>Adicione via <span class="mono">/backlog add</span> ou <span class="mono">/backlog from-solicitacao &lt;arquivo&gt;</span>.</div>`;

function openItem(id){
  const item = ITEMS.find(i=>i.id===id);
  if(!item) return;
  navStack.push({type:'item',id});
  renderDrawer();
}

function openSubtarefa(itemId,stId){
  navStack.push({type:'subtarefa',itemId,stId});
  renderDrawer();
}

function popNav(){
  navStack.pop();
  if(navStack.length===0) closeDrawer();
  else renderDrawer();
}

function renderDrawer(){
  const last = navStack[navStack.length-1];
  if(!last){closeDrawer();return;}
  const d = document.getElementById('drawer');
  d.innerHTML = last.type==='item' ? drawerItemHtml(last.id) : drawerSubtarefaHtml(last.itemId,last.stId);
  d.classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  document.body.style.overflow='hidden';
  d.scrollTop=0;
}

function navHtml(){
  if(navStack.length<=1) return '';
  const crumbs = navStack.map((n,i)=>{
    const cur = i===navStack.length-1;
    const lbl = n.type==='item'?n.id:`${n.itemId}/${n.stId}`;
    return `<span class="${cur?'cur':''}">${lbl}</span>`;
  }).join('<span class="sep">›</span>');
  return `<div class="drawer-nav"><button class="back" onclick="popNav()">← Voltar</button><div class="crumbs">${crumbs}</div></div>`;
}

      ${item.premissas?.length?`<div class="drawer-section"><h4>Premissas</h4><ul>${item.premissas.map(p=>`<li>${esc(p)}</li>`).join('')}</ul></div>`:''}
      <div class="drawer-section"><h4>Histórico</h4>${(item.historico||[]).map(h=>`<div class="hist-row"><div class="d">${h.data}</div><div>${esc(h.texto)}</div></div>`).join('')||'<p class="muted" style="font-size:12px">—</p>'}</div>
      ${item.notas?`<div class="drawer-section"><h4>Notas</h4><p style="font-style:italic;color:var(--text-muted)">${esc(item.notas)}</p></div>`:''}
      ${item.tags?.length?`<div class="drawer-section"><h4>Tags</h4><div style="display:flex;flex-wrap:wrap;gap:5px">${item.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>`:''}
    </div>`;
}

function drawerSubtarefaHtml(itemId,stId){
  const item = ITEMS.find(i=>i.id===itemId);
  const st = item?.subtarefas?.find(s=>s.id===stId);
  if(!st) return '';
  return `
    <div class="drawer-head">
      ${navHtml()}
      <div class="meta-top">
        <span class="id">${st.id}</span>
        <span class="badge ${st.status||'a-refinar'}">${STATUS_LABELS[st.status]||'A refinar'}</span>
        ${st.esforco?`<span class="badge baixa">${st.esforco}</span>`:''}
      </div>
      <h2>${esc(st.title)}</h2>
      <button class="close" onclick="closeDrawer()" aria-label="Fechar">×</button>
    </div>
    <div class="drawer-body">
      <div class="drawer-section"><h4>Item-pai</h4><div class="deps"><span class="dep-chip" onclick="openItem('${item.id}')">↑ ${item.id} — ${esc(item.title.substring(0,60))}${item.title.length>60?'...':''}</span></div></div>
      <div class="drawer-section"><h4>Descrição</h4>${st.description?`<p>${esc(st.description)}</p>`:`<p class="muted" style="font-size:12.5px">— Descrição não preenchida. Adicionar em refinement.</p>`}</div>
      <div class="drawer-section"><h4>Metadados</h4><div class="meta-grid">
        <div class="mg-row"><div class="mg-lab">Responsável</div><div class="mg-val ${st.responsavel?'':'muted'}">${st.responsavel||'— a definir'}</div></div>
        <div class="mg-row"><div class="mg-lab">Esforço</div><div class="mg-val ${st.esforco?'':'muted'}">${st.esforco||'— a definir'}</div></div>
        <div class="mg-row"><div class="mg-lab">Prazo</div><div class="mg-val ${st.prazo?'mono':'muted'}">${st.prazo||'— a definir'}</div></div>
        <div class="mg-row"><div class="mg-lab">Status</div><div class="mg-val">${STATUS_LABELS[st.status]||'A refinar'}</div></div>
      </div></div>
      ${st.dependencias?.length?`<div class="drawer-section"><h4>Dependências internas</h4><div class="deps">${st.dependencias.map(d=>`<span class="dep-chip" onclick="openSubtarefa('${item.id}','${d}')">${d}</span>`).join('')}</div></div>`:''}
      <div class="drawer-section"><h4>Histórico</h4>${(st.historico||[]).map(h=>`<div class="hist-row"><div class="d">${h.data}</div><div>${esc(h.texto)}</div></div>`).join('')||'<p class="muted" style="font-size:12px">—</p>'}</div>
    </div>`;
}

function formatHistoria(h){
  if(!h) return '<span class="muted">— A definir em refinement.</span>';
  return esc(h).replace(/^Como\s+([^,]+),/,'<strong>Como</strong> $1,').replace(/quero\s+/,'<strong>quero</strong> ').replace(/,\s*para\s+/,', <strong>para</strong> ');
}

function closeDrawer(){
  navStack=[];
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  document.body.style.overflow='';
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(navStack.length>1) popNav();
    else closeDrawer();
  }
});

render('overview');
</script>
</body>
</html>
