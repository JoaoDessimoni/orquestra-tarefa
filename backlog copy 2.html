<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Backlog IAF · Squad Finza</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --finza-blue:#1A1AFF;--finza-blue-deep:#0F0F8C;--finza-blue-soft:#E8E8FF;--finza-dark:#0A0A2E;
  --bg:#F2F2F2;--surface:#FFFFFF;--surface-hover:#FAFAFC;--ghost:#C8C8D4;
  --text:#0A0A2E;--text-muted:#5C5C7A;--text-subtle:#9090A8;
  --border:#D8D8E5;--border-soft:#ECECF2;
  --success:#10B981;--success-soft:#D1FAE5;--warning:#F59E0B;--warning-soft:#FEF3C7;
  --danger:#EF4444;--danger-soft:#FEE2E2;--info:#0EA5E9;--info-soft:#E0F2FE;
  --urgent:#DC2626;--urgent-soft:#FEE2E2;
  --f-bitrix:#FF6B35;--f-torre:#1A1AFF;--f-clara:#00B8D4;--f-esperanza:#0F0F8C;
  --f-valentina:#6B5BFF;--f-livia:#D946EF;--f-estrategica:#8B5CF6;
  --st-a-refinar:#9CA3AF;--st-em-refinamento:#F59E0B;--st-refinado:#0EA5E9;
  --st-em-curso:#1A1AFF;--st-bloqueado:#EF4444;--st-cancelado:#6B7280;--st-entregue:#10B981;
  --font-sans:'Inter',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace;
  --sidebar-w:252px;--topbar-h:54px;
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;
  --shadow-sm:0 1px 2px rgba(10,10,46,.06);--shadow-md:0 4px 12px rgba(10,10,46,.08);--shadow-lg:0 20px 40px rgba(10,10,46,.18);
}
*,*::before,*::after{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:var(--font-sans);font-size:13.5px;line-height:1.55;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}
input,select{font:inherit;color:inherit}
a{color:var(--finza-blue);text-decoration:none;cursor:pointer}
a:hover{text-decoration:underline}
:focus-visible{outline:2px solid var(--finza-blue);outline-offset:2px;border-radius:4px}

.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;background:var(--finza-dark);color:#fff;display:flex;flex-direction:column;padding:18px 12px;overflow-y:auto;z-index:10}
.brand{display:flex;align-items:baseline;gap:8px;padding:6px 10px 20px}
.brand .mark{color:var(--finza-blue);font-size:14px;font-weight:700}
.brand .name{font-size:14px;font-weight:700;color:#fff;letter-spacing:.04em}
.brand .tag{margin-left:auto;font-family:var(--font-mono);font-size:9px;color:rgba(255,255,255,.42);letter-spacing:.08em;text-transform:uppercase}
.side-section{font-size:10px;letter-spacing:.14em;color:rgba(255,255,255,.42);text-transform:uppercase;padding:14px 12px 6px;font-weight:700}
.side-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;color:rgba(255,255,255,.74);font-size:13px;width:100%;text-align:left;transition:background .12s,color .12s;margin-bottom:1px}
.side-item:hover{background:rgba(255,255,255,.06);color:#fff}
.side-item.active{background:var(--finza-blue);color:#fff;font-weight:500}
.side-item .ico{font-size:11px;width:14px;text-align:center}
.side-item .lbl{flex:1}
.side-item .count{font-family:var(--font-mono);font-size:10px;background:rgba(255,255,255,.1);padding:1px 6px;border-radius:99px;color:rgba(255,255,255,.7);min-width:22px;text-align:center}
.side-item.active .count{background:rgba(255,255,255,.22);color:#fff}
.side-item .dot-frente{width:8px;height:8px;border-radius:50%}
.sidebar-footer{margin-top:auto;padding:14px 10px 4px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:rgba(255,255,255,.5)}
.sidebar-footer .who strong{color:#fff;font-weight:500;display:block;font-size:12px;margin-bottom:2px}
.main{min-width:0;display:flex;flex-direction:column;position:relative}
.topbar{position:sticky;top:0;height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 28px;z-index:20}
.crumb{display:flex;align-items:center;gap:8px;font-size:13px}
.crumb .seg{color:var(--text-muted)}
.crumb .seg.cur{color:var(--text);font-weight:500}
.crumb .sep{color:var(--text-subtle);font-size:10px}
.topbar-spacer{flex:1}
.topbar-action{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text-muted)}
.topbar-action:hover{border-color:var(--text-subtle);color:var(--text);cursor:pointer}
.iaf-mark{position:absolute;top:18px;right:28px;font-size:11px;font-weight:700;color:var(--finza-blue);letter-spacing:.1em;z-index:5}
.hamburger{display:none;padding:4px 8px;border-radius:4px;font-size:18px;color:var(--text-muted)}
.view{padding:32px 36px 96px;width:100%;max-width:1600px;margin:0 auto;position:relative}
.ghost{font-weight:300;color:var(--ghost);font-size:38px;line-height:1.08;letter-spacing:-.015em;margin:0 0 6px}
.ghost .accent{font-weight:700;color:var(--finza-blue)}
.sub{color:var(--text-muted);font-size:14px;margin:0 0 26px;max-width:760px;line-height:1.55}
.section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--text-muted);margin:26px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;justify-content:space-between}
.section-title .extra{font-size:11px;font-weight:500;letter-spacing:0;text-transform:none;color:var(--text-muted)}
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--surface);border:2px dotted var(--finza-blue);border-radius:var(--radius-md);padding:14px 16px;transition:transform .12s}
.kpi:hover{transform:translateY(-1px)}
.kpi .lab{font-size:10px;letter-spacing:.12em;color:var(--text-muted);text-transform:uppercase;font-weight:700;margin-bottom:6px}
.kpi .num{font-size:30px;font-weight:700;color:var(--finza-blue);line-height:1;font-family:var(--font-mono)}
.kpi .delta{font-size:11px;color:var(--text-muted);margin-top:5px}
.kpi.urgent .num{color:var(--urgent)}
.kpi.warning .num{color:var(--warning)}
.kpi.success .num{color:var(--success)}
.kpi.muted .num{color:var(--text-subtle)}
.kpi.info .num{color:var(--info)}
.hero-dark{background:var(--finza-dark);color:#fff;padding:26px 30px;border-radius:var(--radius-lg);box-shadow:var(--shadow-md);margin-bottom:22px;position:relative;overflow:hidden}
.hero-dark::after{content:'';position:absolute;top:-30%;right:-10%;width:380px;height:380px;background:radial-gradient(circle,rgba(26,26,255,.32) 0%,transparent 70%);pointer-events:none}
.hero-dark .label{font-size:10px;letter-spacing:.18em;color:rgba(255,255,255,.5);text-transform:uppercase;font-weight:700;margin-bottom:8px}
.hero-dark .title{font-size:26px;font-weight:300;color:#fff;line-height:1.2;margin:0 0 18px;position:relative}
.hero-dark .title .accent{color:var(--finza-blue-soft);font-weight:700}
.hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;position:relative}
.hero-stats.six{grid-template-columns:repeat(6,1fr);gap:18px}
.hero-stat .num{font-size:30px;font-weight:700;color:#fff;line-height:1;font-family:var(--font-mono)}
.hero-stat .num .u{font-size:13px;color:rgba(255,255,255,.6);font-weight:400;margin-left:4px;font-family:var(--font-sans)}
.hero-stat .lab{font-size:11px;color:rgba(255,255,255,.65);margin-top:6px;line-height:1.4}
.hero-stat.urgent .num{color:#FCA5A5}
.hero-stat.info .num{color:#93C5FD}
.hero-stat.warning .num{color:#FCD34D}
.hero-stat.success .num{color:#86EFAC}
@media (max-width:1100px){.hero-stats.six{grid-template-columns:repeat(3,1fr)}}
@media (max-width:760px){.hero-stats.six{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--surface);border:2px dotted var(--finza-blue);border-radius:var(--radius-md);padding:18px;transition:transform .12s,box-shadow .12s;position:relative}
.card.compact{padding:14px 16px}
.item-card{background:var(--surface);border:2px dotted var(--finza-blue);border-radius:var(--radius-md);padding:14px;cursor:pointer;transition:transform .12s,box-shadow .12s;position:relative;display:flex;flex-direction:column;gap:8px;min-height:120px}
.item-card:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(26,26,255,.08)}
.item-card.urgent{border-left:4px solid var(--urgent);padding-left:14px}
.item-card.cancelado{opacity:.7;background:repeating-linear-gradient(45deg,#FAFAFC,#FAFAFC 8px,#F0F0F4 8px,#F0F0F4 16px)}
.item-card.cancelado .ic-title{text-decoration:line-through;color:var(--text-muted)}
.item-card .ic-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.item-card .ic-id{font-family:var(--font-mono);font-size:11px;color:var(--text-subtle);font-weight:700}
.item-card .ic-title{font-size:13.5px;font-weight:600;line-height:1.35;color:var(--text)}
.item-card .ic-foot{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-top:auto;font-size:10px}
.item-card .ic-st{font-family:var(--font-mono);color:var(--text-subtle);font-size:10px;margin-left:auto}
.badge{display:inline-flex;align-items:center;padding:2px 8px;font-size:10px;font-weight:700;border-radius:4px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.badge.urgente{background:var(--urgent-soft);color:var(--urgent)}
.badge.alta{background:#FED7AA;color:#9A3412}
.badge.media{background:var(--warning-soft);color:#92400E}
.badge.baixa{background:#F3F4F6;color:#6B7280}
.badge.a-refinar{background:#F3F4F6;color:#6B7280}
.badge.em-refinamento{background:var(--warning-soft);color:#92400E}
.badge.refinado{background:var(--info-soft);color:#075985}
.badge.em-curso{background:var(--finza-blue-soft);color:var(--finza-blue);animation:pulse 2s infinite}
.badge.bloqueado{background:var(--danger-soft);color:#991B1B}
.badge.cancelado{background:#E5E7EB;color:#374151}
.badge.entregue{background:var(--success-soft);color:#065F46}
.badge.arquivado{background:#F3F4F6;color:#9CA3AF}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.frente-pill{display:inline-flex;align-items:center;gap:5px;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.frente-pill .dt{width:6px;height:6px;border-radius:50%}
.frente-pill.bitrix-automacoes{background:rgba(255,107,53,.14);color:#C24A1C}.frente-pill.bitrix-automacoes .dt{background:var(--f-bitrix)}
.frente-pill.torre{background:rgba(26,26,255,.12);color:var(--finza-blue)}.frente-pill.torre .dt{background:var(--f-torre)}
.frente-pill.clara{background:rgba(0,184,212,.14);color:#0080A0}.frente-pill.clara .dt{background:var(--f-clara)}
.frente-pill.esperanza{background:rgba(15,15,140,.12);color:var(--finza-blue-deep)}.frente-pill.esperanza .dt{background:var(--f-esperanza)}
.frente-pill.valentina{background:rgba(107,91,255,.14);color:#5040D0}.frente-pill.valentina .dt{background:var(--f-valentina)}
.frente-pill.livia{background:rgba(217,70,239,.14);color:#A21CAF}.frente-pill.livia .dt{background:var(--f-livia)}
.frente-pill.estrategica{background:rgba(139,92,246,.14);color:#6D32B5}.frente-pill.estrategica .dt{background:var(--f-estrategica)}
.tag{display:inline-flex;align-items:center;padding:1px 7px;background:var(--finza-blue-soft);color:var(--finza-blue);border-radius:4px;font-size:10px;font-weight:600;text-transform:lowercase}
.barchart{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.barchart .row{display:grid;grid-template-columns:160px 1fr 80px;align-items:center;gap:12px;font-size:12px}
.barchart .row .lab{color:var(--text);font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.barchart .row .bar{height:14px;background:var(--bg);border-radius:7px;overflow:hidden}
.barchart .row .fill{height:100%;border-radius:7px;transition:width .4s ease;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;color:#fff;font-family:var(--font-mono);background:var(--finza-blue)}
.barchart .row .num{text-align:right;font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--text)}
.kanban-wrap{overflow-x:auto;padding-bottom:8px}
.kanban{display:grid;grid-template-columns:repeat(7,minmax(220px,1fr));gap:10px;min-width:1540px}
.kcol{background:#FAFAFC;border:1px solid var(--border);border-radius:var(--radius-md);padding:10px;min-height:120px}
.kcol-head{display:flex;align-items:center;justify-content:space-between;padding:0 4px 10px;border-bottom:1px solid var(--border-soft);margin-bottom:10px}
.kcol-head .ttl{display:flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)}
.kcol-head .ttl .sd{width:8px;height:8px;border-radius:50%}
.kcol-head .ct{font-family:var(--font-mono);font-size:10px;background:var(--surface);padding:1px 7px;border-radius:99px;color:var(--text-muted);border:1px solid var(--border)}
.kcol .item-card{padding:10px 12px;min-height:auto;border-radius:6px;margin-bottom:6px}
.kcol .item-card .ic-title{font-size:12.5px}
.gantt-wrap{overflow-x:auto;padding-bottom:8px}
.gantt-noprazo{background:#FAFAFC;border:1px dashed var(--border);border-radius:var(--radius-md);padding:14px;margin-bottom:14px}
.gantt-noprazo .gnt-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--warning);margin-bottom:8px;display:flex;justify-content:space-between}
.gantt-noprazo .gnt-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px}
.gantt-noprazo .gnt-it{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:12px;cursor:pointer}
.gantt-noprazo .gnt-it:hover{border-color:var(--finza-blue)}
.gantt-noprazo .gnt-it .id{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);font-weight:700}
.board-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:18px;align-items:center}
.board-tab{padding:9px 16px;font-size:13px;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;display:flex;align-items:center;gap:6px}
.board-tab:hover{color:var(--text)}
.board-tab.on{color:var(--text);font-weight:500;border-bottom-color:var(--finza-blue)}
.board-tab .ct{font-family:var(--font-mono);font-size:10px;color:var(--text-subtle);margin-left:5px}
.board-filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
.chip-filter{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;background:var(--surface);border:1px solid var(--border);border-radius:99px;font-size:12px;cursor:pointer;transition:all .12s;font-weight:500;user-select:none}
.chip-filter:hover{border-color:var(--finza-blue)}
.chip-filter.on{background:var(--finza-blue);color:#fff;border-color:var(--finza-blue)}
.chip-filter .dt{width:7px;height:7px;border-radius:50%}
.search-inp{padding:5px 11px 5px 32px;border:1px solid var(--border);border-radius:99px;font-size:12px;background:var(--surface) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%235C5C7A' stroke-width='2.5' stroke-linecap='round'><circle cx='11' cy='11' r='7'/><path d='m21 21-4.3-4.3'/></svg>") no-repeat 10px center;width:220px;outline:none}
.search-inp:focus{border-color:var(--finza-blue)}
.frente-head{background:var(--surface);border:2px dotted var(--finza-blue);border-radius:var(--radius-md);padding:20px 24px;margin-bottom:20px;position:relative;overflow:hidden}
.frente-head::before{content:'';position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--c-frente,var(--finza-blue))}
.frente-head .lab{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--text-muted);font-weight:700;margin-bottom:6px}
.frente-head h2{font-size:22px;font-weight:300;color:var(--ghost);margin:0 0 4px;line-height:1.2}
.frente-head h2 .accent{font-weight:700;color:var(--c-frente,var(--finza-blue))}
.frente-head .desc{font-size:13px;color:var(--text-muted);margin-top:8px;max-width:760px}
.frente-head .stats{display:flex;gap:22px;margin-top:14px;flex-wrap:wrap}
.frente-head .stat{display:flex;flex-direction:column;gap:2px}
.frente-head .stat .v{font-size:20px;font-weight:700;color:var(--c-frente,var(--finza-blue));font-family:var(--font-mono);line-height:1}
.frente-head .stat .l{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);font-weight:600}
.frente-head .extra{margin-top:12px;display:flex;gap:18px;flex-wrap:wrap;font-size:12px;color:var(--text-muted)}
.frente-head .extra strong{color:var(--text);font-weight:600}
.alert-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:10px}
.alert-card .ah{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.alert-card .ah .ico{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.alert-card .ah .ico.warn{background:var(--warning-soft);color:#92400E}
.alert-card .ah .ico.crit{background:var(--danger-soft);color:#991B1B}
.alert-card .ah .ico.info{background:var(--info-soft);color:#075985}
.alert-card .ah .t{font-size:13px;font-weight:600;color:var(--text);flex:1}
.alert-card .ah .ct{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);background:var(--bg);padding:2px 8px;border-radius:99px}
.alert-card .body{font-size:12.5px;color:var(--text-muted);line-height:1.5}
.drawer-overlay{position:fixed;inset:0;background:rgba(10,10,46,.4);backdrop-filter:blur(3px);z-index:50;display:none}
.drawer-overlay.open{display:block}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(760px,100%);background:var(--surface);box-shadow:var(--shadow-lg);z-index:60;transform:translateX(100%);transition:transform .25s cubic-bezier(.16,1,.3,1);overflow-y:auto;display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-head{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--border-soft);padding:16px 24px;z-index:2}
.drawer-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:11px;color:var(--text-muted)}
.drawer-nav .back{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:99px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;font-weight:500;color:var(--text)}
.drawer-nav .back:hover{background:var(--bg);border-color:var(--finza-blue)}
.drawer-nav .crumbs{display:flex;align-items:center;gap:5px;color:var(--text-subtle);font-family:var(--font-mono);font-size:10.5px}
.drawer-nav .crumbs .sep{opacity:.5}
.drawer-nav .crumbs .cur{color:var(--text-muted);font-weight:700}
.drawer-head .meta-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.drawer-head .id{font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--text-muted);letter-spacing:.04em}
.drawer-head h2{font-size:18px;font-weight:600;line-height:1.3;margin:0;color:var(--text);padding-right:36px}
.drawer-head .close{position:absolute;top:14px;right:18px;font-size:22px;color:var(--text-subtle);padding:4px 10px;border-radius:6px;cursor:pointer}
.drawer-head .close:hover{background:var(--bg);color:var(--text)}
.drawer-body{padding:20px 24px;flex:1}
.drawer-section{margin-bottom:22px}
.drawer-section h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--finza-blue);margin:0 0 10px;padding-bottom:6px;border-bottom:1px dotted var(--finza-blue)}
.drawer-section p{font-size:13.5px;line-height:1.6;color:var(--text);margin:0 0 8px}
.drawer-section .historia{background:var(--finza-blue-soft);border-left:3px solid var(--finza-blue);padding:12px 16px;border-radius:4px;font-size:13.5px;line-height:1.6}
.drawer-section .historia strong{color:var(--finza-blue-deep);font-weight:700}
.drawer-section ul{margin:0;padding-left:20px}
.drawer-section ul li{font-size:13px;line-height:1.6;margin-bottom:4px}
.ca-list{display:flex;flex-direction:column;gap:8px}
.ca-item{background:#FAFAFC;border:1px solid var(--border);border-left:3px solid var(--success);border-radius:6px;padding:10px 14px;font-size:12.5px;line-height:1.55}
.ca-item strong{display:inline-block;background:var(--success-soft);color:#065F46;padding:1px 7px;border-radius:3px;font-size:10px;font-weight:700;margin-right:6px;font-family:var(--font-mono);letter-spacing:.04em}
.st-list{display:flex;flex-direction:column;gap:5px}
.st-item{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;background:#FAFAFC;border:1px solid var(--border);border-radius:6px;padding:9px 12px;font-size:12.5px;line-height:1.4;cursor:pointer;transition:all .12s}
.st-item:hover{border-color:var(--finza-blue);background:var(--surface)}
.st-item .chk{width:14px;height:14px;border:1.5px solid var(--text-subtle);border-radius:3px;flex-shrink:0}
.st-item.concluida .chk{background:var(--success);border-color:var(--success)}
.st-item .stid{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--finza-blue);margin-right:6px}
.st-item .stmeta{font-family:var(--font-mono);font-size:10px;color:var(--text-subtle);white-space:nowrap}
.meta-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.mg-row{display:flex;flex-direction:column;gap:3px}
.mg-lab{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)}
.mg-val{font-size:13px;color:var(--text);font-weight:500}
.mg-val.mono{font-family:var(--font-mono);font-size:12px}
.mg-val.muted{color:var(--text-muted);font-weight:400}
.rice-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.rice-cell{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center}
.rice-cell.score{background:var(--finza-blue);color:#fff;border-color:var(--finza-blue)}
.rice-cell .lab{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);font-weight:700}
.rice-cell.score .lab{color:rgba(255,255,255,.7)}
.rice-cell .v{font-size:17px;font-weight:700;color:var(--finza-blue);font-family:var(--font-mono);margin-top:4px}
.rice-cell.score .v{color:#fff;font-size:19px}
.deps{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.dep-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--bg);border:1px solid var(--border);border-radius:99px;font-size:11px;font-family:var(--font-mono);font-weight:700;color:var(--text);cursor:pointer;transition:all .12s}
.dep-chip:hover{background:var(--finza-blue);color:#fff;border-color:var(--finza-blue)}
.hist-row{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border-soft);font-size:12.5px}
.hist-row:last-child{border-bottom:0}
.hist-row .d{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);min-width:90px;flex-shrink:0}
.cancel-banner{background:#FEF3C7;border:1px solid #F59E0B;border-radius:8px;padding:10px 14px;margin-bottom:18px;font-size:12.5px;color:#92400E}
.cancel-banner strong{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.empty{text-align:center;padding:36px 18px;color:var(--text-muted);font-size:12px}
.empty .icon{font-size:28px;margin-bottom:8px;opacity:.5}
@media (max-width:1300px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
@media (max-width:1100px){.hero-stats{grid-template-columns:repeat(2,1fr)}.rice-grid{grid-template-columns:repeat(2,1fr)}}
@media (max-width:760px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;width:var(--sidebar-w);transform:translateX(-100%);transition:transform .25s ease;box-shadow:var(--shadow-lg)}
  .sidebar.open{transform:translateX(0)}
  .hamburger{display:inline-flex;align-items:center}
  .view{padding:22px 16px 80px}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .hero-stats{grid-template-columns:repeat(2,1fr)}
  .iaf-mark{top:14px;right:14px;font-size:10px}
  .ghost{font-size:26px}
  .drawer{width:100%}
  .meta-grid{grid-template-columns:1fr}
  .frente-head{padding:16px 18px}
  .barchart .row{grid-template-columns:90px 1fr 50px}
}
.mono{font-family:var(--font-mono)}
.muted{color:var(--text-muted)}

/* ===== Foco da squad (Overview executivo) ===== */
.foco-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px}
.foco-card{background:var(--surface);border:2px dotted var(--c-foco,var(--finza-blue));border-radius:var(--radius-lg);padding:24px 26px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm)}
.foco-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--c-foco,var(--finza-blue))}
.foco-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.foco-flag{font-size:10px;text-transform:uppercase;letter-spacing:.14em;font-weight:700;color:var(--c-foco,var(--finza-blue))}
.foco-prio{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;color:var(--text-muted);font-weight:700;background:var(--bg);padding:4px 11px;border-radius:99px;text-transform:uppercase}
.foco-title{font-size:21px;font-weight:600;color:var(--text);line-height:1.28;margin:0 0 8px}
.foco-desc{font-size:13px;line-height:1.55;color:var(--text-muted);margin:0 0 16px}
.foco-item-principal{background:linear-gradient(135deg,#FAFAFC 0%,var(--surface) 100%);border:1.5px solid var(--c-foco,var(--finza-blue));border-radius:var(--radius-md);padding:14px 16px;cursor:pointer;transition:transform .12s,box-shadow .12s}
.foco-item-principal:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(26,26,255,.12)}
.foco-it-tag{font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--c-foco,var(--finza-blue));font-weight:700;margin-bottom:5px}
.foco-it-id{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);font-weight:700;margin-bottom:3px}
.foco-it-title{font-size:14px;font-weight:600;line-height:1.32;color:var(--text);margin-bottom:9px}
.foco-it-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:10px}
.foco-it-meta .pz{font-family:var(--font-mono);font-size:10px;color:var(--c-foco,var(--finza-blue));background:var(--bg);padding:2px 8px;border-radius:4px;font-weight:700;border:1px solid var(--c-foco,var(--finza-blue))}
.foco-apoio-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);font-weight:700;margin:18px 0 8px;padding-top:14px;border-top:1px dotted var(--border)}
.foco-apoio{display:flex;flex-direction:column;gap:5px}
.foco-apoio-it{display:flex;align-items:center;gap:9px;padding:6px 10px;background:var(--bg);border-radius:6px;cursor:pointer;font-size:11.5px;transition:background .12s,transform .08s}
.foco-apoio-it:hover{background:var(--finza-blue-soft);transform:translateX(2px)}
.foco-apoio-it .id{font-family:var(--font-mono);font-size:10px;color:var(--c-foco,var(--finza-blue));font-weight:700;min-width:50px}
.foco-apoio-it .badge{font-size:9px;padding:1px 6px}
.foco-apoio-it .tt{flex:1;color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media (max-width:1100px){.foco-grid{grid-template-columns:1fr}}
@media (max-width:760px){.foco-card{padding:18px 18px}.foco-title{font-size:18px}}

/* ===== Norte da Squad — chip Diretoria ===== */
.norte-banner{background:linear-gradient(135deg,var(--finza-dark) 0%,#1a1a4a 100%);color:#fff;padding:18px 24px;border-radius:var(--radius-md);margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.norte-banner .ico{font-size:22px;color:var(--finza-blue-soft)}
.norte-banner .txt{flex:1;font-size:13px;line-height:1.55;color:rgba(255,255,255,.88)}
.norte-banner .txt strong{color:#fff;font-weight:700}
.norte-banner .tag-dir{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;background:rgba(255,255,255,.12);padding:5px 11px;border-radius:99px;text-transform:uppercase;font-weight:700;color:var(--finza-blue-soft)}

<script>
const DATA = JSON.parse(document.getElementById('backlog-data').textContent);
const FRENTES = Object.fromEntries(DATA.frentes.map(f=>[f.key,f]));
const ITEMS = DATA.items;
const STATUSES = ['a-refinar','em-refinamento','refinado','em-curso','bloqueado','cancelado','entregue'];
const STATUS_LABELS = {'a-refinar':'A refinar','em-refinamento':'Em refinamento','refinado':'Refinado','em-curso':'Em curso','bloqueado':'Bloqueado','cancelado':'Cancelado','entregue':'Entregue','arquivado':'Arquivado'};
const PRIO_ORDER = {urgente:0,alta:1,media:2,baixa:3};
const PRIO_LABELS = {urgente:'Urgente',alta:'Alta',media:'Média',baixa:'Baixa'};
let currentView='overview',currentFrente=null;
let boardMode = localStorage.getItem('backlog.board.mode') || 'kanban';
let boardFilters = {frentes:new Set(),prios:new Set(),query:''};
let navStack = [];

function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function itemsByFrente(k){return ITEMS.filter(i=>i.frente===k)}
function itemsByStatus(s){return ITEMS.filter(i=>i.status===s)}
function itemsByPrio(p){return ITEMS.filter(i=>i.prioridade===p)}

function buildSidebar(){
  const sb = document.getElementById('sidebar');
  const counts = {};
  DATA.frentes.forEach(f=>counts[f.key]=itemsByFrente(f.key).length);
  sb.innerHTML = `
    <div class="brand"><span class="mark">◆</span><span class="name">backlog</span><span class="tag">iaf</span></div>
    <div class="side-section">Visões</div>
    <button class="side-item ${currentView==='overview'?'active':''}" onclick="render('overview')"><span class="ico">⊞</span><span class="lbl">Overview</span></button>
    <button class="side-item ${currentView==='board'?'active':''}" onclick="render('board')"><span class="ico">⊟</span><span class="lbl">Board</span></button>
    <button class="side-item ${currentView==='analise'?'active':''}" onclick="render('analise')"><span class="ico">⚐</span><span class="lbl">Análise</span></button>
    <div class="side-section">Frentes</div>
    ${DATA.frentes.map(f=>`<button class="side-item ${currentView==='frente'&&currentFrente===f.key?'active':''}" onclick="render('frente','${f.key}')"><span class="dot-frente" style="background:${f.color}"></span><span class="lbl">${esc(f.label)}</span><span class="count">${counts[f.key]}</span></button>`).join('')}
    <div class="sidebar-footer"><div class="who"><strong>João Vinícius</strong>Supervisor IAF · Finza</div></div>`;
}

function render(view, frente){
  currentView=view;
  if(frente) currentFrente=frente;
  buildSidebar();
  const cur = document.getElementById('crumb-cur');
  const v = document.getElementById('view');
  if(view==='overview'){cur.textContent='Overview';v.innerHTML=renderOverview();}
  else if(view==='board'){cur.textContent='Board';v.innerHTML=renderBoard();attachBoardEvents();}
  else if(view==='analise'){cur.textContent='Análise';v.innerHTML=renderAnalise();}
  else if(view==='frente'){cur.textContent=FRENTES[frente].label;v.innerHTML=renderFrente(frente);}
  window.scrollTo({top:0,behavior:'instant'});
  if(window.innerWidth<=760) document.getElementById('sidebar').classList.remove('open');
}

function itemCard(item){
  const f = FRENTES[item.frente];
  const stCount = (item.subtarefas||[]).length;
  return `<article class="item-card ${item.prioridade==='urgente'?'urgent':''} ${item.status==='cancelado'?'cancelado':''}" onclick="openItem('${item.id}')">
    <div class="ic-head"><span class="ic-id">${item.id}</span><span class="badge ${item.prioridade}">${PRIO_LABELS[item.prioridade]||item.prioridade}</span></div>
    <div class="ic-title">${esc(item.title)}</div>
    <div class="ic-foot">
      <span class="frente-pill ${item.frente}"><span class="dt"></span>${esc(f.label.split('·')[0].trim())}</span>
      <span class="badge ${item.status}">${STATUS_LABELS[item.status]}</span>
      ${stCount?`<span class="ic-st">${stCount} ST</span>`:''}
    </div>
  </article>`;
}

function renderOverview(){
  const total=ITEMS.length;
  const ativos=ITEMS.filter(i=>i.status!=='cancelado'&&i.status!=='arquivado');
  const aRefinar=itemsByStatus('a-refinar');
  const emRefinamento=itemsByStatus('em-refinamento');
  const emCurso=itemsByStatus('em-curso');
  const entregues=itemsByStatus('entregue');
  const urgentes=itemsByPrio('urgente');
  const frenteStats=DATA.frentes.map(f=>{const it=itemsByFrente(f.key);return {f,total:it.length,active:it.filter(i=>i.status!=='cancelado'&&i.status!=='arquivado').length,emCurso:it.filter(i=>i.status==='em-curso').length}});

  // Foco — Torre + Esperanza
  const btr02=ITEMS.find(i=>i.id==='BTR02');
  const bes03=ITEMS.find(i=>i.id==='BES03');
  const bes01=ITEMS.find(i=>i.id==='BES01');
  const torreItems=itemsByFrente('torre');
  const esperancaItems=itemsByFrente('esperanza');
  const torreApoio=torreItems.filter(i=>i.id!=='BTR02'&&(i.status==='em-curso'||i.status==='em-refinamento'));
  const espApoio=esperancaItems.filter(i=>i.id!=='BES03'&&i.id!=='BES01'&&(i.status==='em-curso'||i.status==='em-refinamento'||i.status==='entregue'));

  const today=new Date(DATA.generated_at);
  let daysToDeadline=null;
  if(btr02&&btr02.deadline_alvo){
    const dl=new Date(btr02.deadline_alvo);
    daysToDeadline=Math.ceil((dl-today)/(1000*60*60*24));
  }

  const apoioItem=(i)=>{const f=FRENTES[i.frente];return `<div class="foco-apoio-it" onclick="openItem('${i.id}')"><span class="id">${i.id}</span><span class="badge ${i.status}">${STATUS_LABELS[i.status]}</span><span class="tt">${esc(i.title)}</span></div>`};

  return `
    <h1 class="ghost">Backlog Squad IAF — <span class="accent">Norte da squad</span></h1>
    <p class="sub">${total} itens em 7 frentes. Foco do time concentrado em <strong style="color:var(--f-torre)">Torre de Controle</strong> e <strong style="color:var(--f-esperanza)">Esperanza</strong>.</p>


    <div class="hero-dark">
      <div class="label">Foco prioritário · IAF — Inteligência Artificial Finza</div>
      <div class="title">As duas frentes prioritárias: <span class="accent">Torre + Esperanza</span></div>
      <div class="hero-stats six">
        <div class="hero-stat"><div class="num">${ativos.length}<span class="u">total</span></div><div class="lab">itens vivos no backlog</div></div>
        <div class="hero-stat info"><div class="num">${emCurso.length}<span class="u">ativos</span></div><div class="lab">em curso agora</div></div>
        <div class="hero-stat warning"><div class="num">${emRefinamento.length}<span class="u">refin</span></div><div class="lab">em refinamento</div></div>
        <div class="hero-stat"><div class="num">${aRefinar.length}<span class="u">a refin</span></div><div class="lab">a refinar</div></div>
        <div class="hero-stat success"><div class="num">${entregues.length}<span class="u">ent</span></div><div class="lab">entregues no ciclo</div></div>
        <div class="hero-stat urgent"><div class="num">${urgentes.length}<span class="u">urg</span></div><div class="lab">urgentes · prazo declarado</div></div>
      </div>
    </div>

    <div class="section-title">Distribuição por frente <span class="extra">total · em curso na frente</span></div>
    <div class="card compact" style="padding:16px 20px">
      <div class="barchart">${frenteStats.map(({f,total,emCurso})=>`<div class="row"><div class="lab">${esc(f.label.split('·')[0].trim())}</div><div class="bar"><div class="fill" style="width:${total?Math.max((total/8)*100,4):4}%;background:${f.color}">${total||'—'}</div></div><div class="num">${emCurso} em curso</div></div>`).join('')}</div>
    </div>

    <div class="section-title">Foco da squad <span class="extra">prioridades estratégicas declaradas</span></div>
    <div class="foco-grid">
      <div class="foco-card" style="--c-foco:var(--f-torre)">
        <div class="foco-hdr">
          <div class="foco-flag">Torre de Controle</div>
          <div class="foco-prio">prioridade 1 · ${daysToDeadline!==null?daysToDeadline+' dias':'prazo crítico'}</div>
        </div>
        <h3 class="foco-title">Destravar carteira Rhino via multi-org</h3>
        <p class="foco-desc">Multi-org é o item técnico que libera a operação Rhino na Torre e abre caminho para futuros originadores. Entrega-chave da frente neste ciclo, com prazo declarado <strong>até 09/06</strong>. Outros itens da Torre entram em refinamento e validação contínua em paralelo.</p>
        ${btr02?`<div class="foco-item-principal" onclick="openItem('BTR02')">
          <div class="foco-it-tag">item-chave · em curso</div>
          <div class="foco-it-id">BTR02</div>
          <div class="foco-it-title">${esc(btr02.title)}</div>
          <div class="foco-it-meta"><span class="badge urgente">Urgente</span><span class="badge em-curso">Em curso</span><span class="pz">entrega · 2026-06-09</span></div>
        </div>`:''}
        ${torreApoio.length?`<div class="foco-apoio-lbl">Itens de apoio · ${torreApoio.length}</div><div class="foco-apoio">${torreApoio.map(apoioItem).join('')}</div>`:''}
      </div>

      <div class="foco-card" style="--c-foco:var(--f-esperanza)">
        <div class="foco-hdr">
          <div class="foco-flag">Esperanza · Renegociação</div>
          <div class="foco-prio">prioridade 2 · 2 frentes em paralelo</div>
        </div>
        <h3 class="foco-title">Subir monitoramento e retomar automação da renegociação</h3>
        <p class="foco-desc">Esperanza opera em duas frentes ativas neste ciclo: (1) infraestrutura de monitoramento e relatórios de uso — base para sustentação contínua e narrativa de impacto; (2) retomar melhorias de automação da renegociação, antes deixadas em segundo plano pela priorização Torre.</p>
        ${bes03?`<div class="foco-item-principal" onclick="openItem('BES03')">
          <div class="foco-it-tag">monitoramento · em curso</div>
          <div class="foco-it-id">BES03</div>
          <div class="foco-it-title">${esc(bes03.title)}</div>
          <div class="foco-it-meta"><span class="badge alta">Alta</span><span class="badge em-curso">Em curso</span></div>
        </div>`:''}
        ${bes01?`<div class="foco-item-principal" onclick="openItem('BES01')" style="margin-top:10px">
          <div class="foco-it-tag">automação renegociação · próximo</div>
          <div class="foco-it-id">BES01</div>
          <div class="foco-it-title">${esc(bes01.title)}</div>
          <div class="foco-it-meta"><span class="badge alta">Alta</span><span class="badge a-refinar">A refinar</span></div>
        </div>`:''}
        ${espApoio.length?`<div class="foco-apoio-lbl">Itens de apoio · ${espApoio.length}</div><div class="foco-apoio">${espApoio.map(apoioItem).join('')}</div>`:''}
      </div>
    </div>

    <div class="section-title">Próximas entregas <span class="extra">em curso + em refinamento — itens mais perto da entrega</span></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px">${emCurso.concat(emRefinamento).map(itemCard).join('')}</div>
  `;
}

function renderBoard(){
  return `
    <h1 class="ghost">Board global — <span class="accent">todas as frentes</span></h1>
    <p class="sub">Visão consolidada cruzando as 7 frentes. Toggle entre Kanban (colunas por status) e Gantt (timeline). Filtros aplicam aos dois modos.</p>
    <div class="board-tabs">
      <div class="board-tab ${boardMode==='kanban'?'on':''}" onclick="setBoardMode('kanban')">⊟ Kanban<span class="ct">${ITEMS.length}</span></div>
      <div class="board-tab ${boardMode==='gantt'?'on':''}" onclick="setBoardMode('gantt')">↦ Gantt</div>
    </div>
    <div class="board-filters">
      <input class="search-inp" id="board-search" placeholder="buscar por título…" value="${esc(boardFilters.query)}">
      ${DATA.frentes.map(f=>`<div class="chip-filter ${boardFilters.frentes.has(f.key)?'on':''}" data-frente="${f.key}"><span class="dt" style="background:${f.color}"></span>${esc(f.label.split('·')[0].trim())}</div>`).join('')}
      <span style="width:1px;height:18px;background:var(--border)"></span>
      ${['urgente','alta','media','baixa'].map(p=>`<div class="chip-filter ${boardFilters.prios.has(p)?'on':''}" data-prio="${p}">${PRIO_LABELS[p]}</div>`).join('')}
    </div>
    <div id="board-content">${boardMode==='kanban'?renderKanban(filteredItems()):renderGantt(filteredItems())}</div>`;
}

function filteredItems(){
  return ITEMS.filter(i=>{
    if(boardFilters.frentes.size>0 && !boardFilters.frentes.has(i.frente)) return false;
    if(boardFilters.prios.size>0 && !boardFilters.prios.has(i.prioridade)) return false;
    if(boardFilters.query){
      const q = boardFilters.query.toLowerCase();
      if(!i.title.toLowerCase().includes(q) && !i.id.toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function renderKanban(items){
  return `<div class="kanban-wrap"><div class="kanban">${STATUSES.map(s=>{
    const its = items.filter(i=>i.status===s).sort((a,b)=>(PRIO_ORDER[a.prioridade]||9)-(PRIO_ORDER[b.prioridade]||9));
    return `<div class="kcol"><div class="kcol-head"><div class="ttl"><span class="sd" style="background:var(--st-${s})"></span>${STATUS_LABELS[s]}</div><span class="ct">${its.length}</span></div>${its.map(itemCard).join('')||'<div class="empty" style="padding:14px 8px">—</div>'}</div>`;
  }).join('')}</div></div>`;
}

function renderGantt(items){
  const semPrazo = items.filter(i=>!i.deadline_alvo).sort((a,b)=>(PRIO_ORDER[a.prioridade]||9)-(PRIO_ORDER[b.prioridade]||9));
  return `${semPrazo.length?`<div class="gantt-noprazo"><div class="gnt-head"><span>Sem prazo definido</span><span>${semPrazo.length} itens · preencha deadline_alvo no refinement para aparecer na timeline</span></div><div class="gnt-list">${semPrazo.map(i=>{const f=FRENTES[i.frente];return `<div class="gnt-it" onclick="openItem('${i.id}')"><div class="id">${i.id} · <span style="color:${f.color}">${esc(f.label.split('·')[0].trim())}</span> · <span class="badge ${i.prioridade}" style="font-size:9px">${PRIO_LABELS[i.prioridade]}</span></div><div style="margin-top:4px">${esc(i.title)}</div></div>`}).join('')}</div></div>`:'<div class="empty"><div class="icon">○</div>Nenhum item nos filtros atuais</div>'}`;
}

function setBoardMode(m){
  boardMode = m;
  localStorage.setItem('backlog.board.mode',m);
  render('board');
}

function attachBoardEvents(){
  document.querySelectorAll('.chip-filter[data-frente]').forEach(c=>{
    c.onclick=()=>{const k=c.dataset.frente;if(boardFilters.frentes.has(k))boardFilters.frentes.delete(k);else boardFilters.frentes.add(k);render('board');};
  });
  document.querySelectorAll('.chip-filter[data-prio]').forEach(c=>{
    c.onclick=()=>{const k=c.dataset.prio;if(boardFilters.prios.has(k))boardFilters.prios.delete(k);else boardFilters.prios.add(k);render('board');};
  });
  const si = document.getElementById('board-search');
  if(si){let t;si.oninput=()=>{clearTimeout(t);t=setTimeout(()=>{boardFilters.query=si.value;document.getElementById('board-content').innerHTML=boardMode==='kanban'?renderKanban(filteredItems()):renderGantt(filteredItems());},200)};}
}

function renderFrente(key){
  const f = FRENTES[key];
  const its = itemsByFrente(key);
  if(its.length===0){
    return `<div class="frente-head" style="--c-frente:${f.color}"><div class="lab">Frente · ${f.prefix}##</div><h2><span class="accent">${esc(f.label)}</span></h2><div class="desc">${esc(f.desc)}</div><div class="extra"><div><strong>Sponsor</strong> · ${esc(f.sponsor)}</div><div><strong>Plataforma</strong> · ${esc(f.plataforma||'—')}</div><div><strong>Prefix</strong> · <span class="mono">${esc(f.prefix)}##</span></div></div></div><div class="empty"><div class="icon">○</div><strong style="display:block;margin-bottom:6px">Frente sem itens iniciais</strong>Adicione via <span class="mono">/backlog add</span> ou <span class="mono">/backlog from-solicitacao &lt;arquivo&gt;</span>.</div>`;
  }
  const prios = ['urgente','alta','media','baixa'].map(p=>({p,n:its.filter(i=>i.prioridade===p).length})).filter(x=>x.n>0);
  return `
    <div class="frente-head" style="--c-frente:${f.color}">
      <div class="lab">Frente · ${f.prefix}##</div>
      <h2><span class="accent">${esc(f.label)}</span></h2>
      <div class="desc">${esc(f.desc)}</div>
      <div class="stats">
        <div class="stat"><div class="v">${its.length}</div><div class="l">itens</div></div>
        ${prios.map(({p,n})=>`<div class="stat"><div class="v">${n}</div><div class="l">${PRIO_LABELS[p]}</div></div>`).join('')}
      </div>
      <div class="extra">
        <div><strong>Sponsor</strong> · ${esc(f.sponsor)}</div>
        <div><strong>Plataforma</strong> · ${esc(f.plataforma||'—')}</div>
        <div><strong>Prefix</strong> · <span class="mono">${esc(f.prefix)}##</span></div>
      </div>
    </div>
    <div class="section-title">Kanban da frente <span class="extra">7 colunas · cards ordenados por prioridade</span></div>
    ${renderKanban(its)}`;
}

function renderAnalise(){
  const bloqueadores = ITEMS.filter(i=>i.bloqueia&&i.bloqueia.length>0).sort((a,b)=>b.bloqueia.length-a.bloqueia.length);
  const urgenteItems = itemsByPrio('urgente');
  const diretoriaItems = ITEMS.filter(i=>i.sponsor==='Diretoria');
  const cancelados = itemsByStatus('cancelado');
  const refinementStats = DATA.frentes.map(f=>{const its=itemsByFrente(f.key);const ref=its.filter(i=>i.status==='refinado'||i.status==='em-curso'||i.status==='entregue').length;return {f,total:its.length,ref}});
  const prioStats = ['urgente','alta','media','baixa'].map(p=>({p,n:itemsByPrio(p).length}));
  return `
    <h1 class="ghost">Análise — <span class="accent">dependências, alertas e gaps</span></h1>
    <p class="sub">Visão analítica do backlog. Detecta itens que destravam outros, frentes negligenciadas, sobreposições, atenção executiva.</p>
    <div class="section-title">Itens urgentes <span class="extra">${urgenteItems.length} item(s) — atenção máxima</span></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px">${urgenteItems.map(itemCard).join('')||'<div class="empty">Nenhum urgente</div>'}</div>
    <div class="section-title">Itens que destravam outros <span class="extra">priorize estes</span></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px">${bloqueadores.map(i=>{const f=FRENTES[i.frente];return `<div class="item-card ${i.prioridade==='urgente'?'urgent':''}" onclick="openItem('${i.id}')"><div class="ic-head"><span class="ic-id">${i.id}</span><span class="badge ${i.prioridade}">${PRIO_LABELS[i.prioridade]}</span></div><div class="ic-title">${esc(i.title)}</div><div class="ic-foot"><span class="frente-pill ${i.frente}"><span class="dt"></span>${esc(f.label.split('·')[0].trim())}</span><span class="badge ${i.status}">${STATUS_LABELS[i.status]}</span><span style="background:var(--danger-soft);color:#991B1B;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700">bloqueia ${i.bloqueia.length}: ${i.bloqueia.join(', ')}</span></div></div>`}).join('')}</div>
    <div class="section-title">Distribuição por prioridade</div>
    <div class="card compact"><div class="barchart">${prioStats.map(({p,n})=>`<div class="row"><div class="lab">${PRIO_LABELS[p]}</div><div class="bar"><div class="fill" style="width:${(n/ITEMS.length)*100}%;background:${p==='urgente'?'var(--urgent)':p==='alta'?'#F97316':p==='media'?'var(--warning)':'var(--text-subtle)'}">${n}</div></div><div class="num">${Math.round((n/ITEMS.length)*100)}%</div></div>`).join('')}</div></div>
    <div class="section-title">Refinement por frente <span class="extra">% de itens refinados/em-curso/entregues</span></div>
    <div class="card compact"><div class="barchart">${refinementStats.map(({f,total,ref})=>`<div class="row"><div class="lab">${esc(f.label.split('·')[0].trim())}</div><div class="bar"><div class="fill" style="width:${total?(ref/total)*100:0}%;background:${f.color}">${ref}/${total}</div></div><div class="num">${total?Math.round((ref/total)*100):0}%</div></div>`).join('')}</div></div>
    ${cancelados.length?`<div class="section-title">Cancelados <span class="extra">${cancelados.length} item(s) com motivo registrado</span></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px">${cancelados.map(itemCard).join('')}</div>`:''}
    <div class="section-title">Atenção executiva · sponsor Diretoria <span class="extra">${diretoriaItems.length} itens</span></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px">${diretoriaItems.map(itemCard).join('')}</div>
    <div class="section-title">Alertas estruturais <span class="extra">atenção executiva</span></div>
    <div class="alert-card"><div class="ah"><div class="ico crit">!</div><div class="t">BTR02 (Multi-Org) em curso com prazo 09/06 — coordenação crítica</div><div class="ct">urgente · em curso</div></div><div class="body">Único item urgente do backlog. Entrega declarada para destravar carteira Rhino e abrir caminho a futuros originadores. Risco de prazo é o principal vetor de atenção do ciclo — coordenação técnica entre Plataformas, Torre e validação Jéssica é obrigatória nas próximas 2 semanas. <a onclick="openItem('BTR02')">Abrir BTR02 →</a></div></div>
    <div class="alert-card"><div class="ah"><div class="ico crit">!</div><div class="t">BTR07 (Refatoração Torre) é XL e em refinamento — não iniciar sem subdivisão</div><div class="ct">esforço XL</div></div><div class="body">Reescrita backend Supabase→FastAPI + frontend + fila enterprise + observabilidade. Item provavelmente precisa quebrar em itens-filhos (BTR07a backend, BTR07b frontend, BTR07c fila, BTR07d observabilidade) durante refinement com João Lucas antes de qualquer execução. Sinergia técnica com BTR02 — coordenar. <a onclick="openItem('BTR07')">Abrir BTR07 →</a></div></div>
    <div class="alert-card"><div class="ah"><div class="ico warn">!</div><div class="t">BES05 em refinamento — ainda destrava 4 outros itens da Esperanza</div><div class="ct">desbloqueador</div></div><div class="body">Discovery Esperanza bloqueia BES01, BES02, BES03, BES04. Já em refinamento (sessões com lead técnico Esperanza começaram). Concluir antes de subir a automação de renegociação prevista para o ciclo. <a onclick="openItem('BES05')">Abrir BES05 →</a></div></div>
    <div class="alert-card"><div class="ah"><div class="ico warn">!</div><div class="t">Esperanza com 1 entrega + 3 em refinamento — frente mais madura do ciclo</div><div class="ct">esperanza</div></div><div class="body">BES06 entregue (relatório pré-Torre resgatado), BES03 em curso (monitoramento), BES04+BES05 em refinamento. Esperanza é a frente com maior densidade de progresso — vetor para narrativa de impacto à diretoria.</div></div>
    <div class="alert-card"><div class="ah"><div class="ico info">i</div><div class="t">BST04 + BST05 — base de governança IA para diretoria</div><div class="ct">narrativa</div></div><div class="body">Dois itens novos da frente Estratégica: BST04 documenta o que cada agente IA resolve e não resolve; BST05 sobe monitoramento global dos agentes com relatório semanal à diretoria. Juntos formam a base de governança e narrativa institucional. <a onclick="openItem('BST04')">Abrir BST04 →</a> · <a onclick="openItem('BST05')">Abrir BST05 →</a></div></div>
    <div class="alert-card"><div class="ah"><div class="ico info">i</div><div class="t">Sinergia técnica BTR02 ↔ BTR07 — coordenar projetos</div><div class="ct">coordenação</div></div><div class="body">Multi-org se beneficia muito de ser desenhado junto com a reescrita FastAPI/Postgres. Mesmo com BTR07 ainda em refinamento, tratar como projeto coordenado nas decisões arquiteturais do BTR02.</div></div>
    <div class="alert-card"><div class="ah"><div class="ico info">i</div><div class="t">Frente Lívia vazia — discovery pendente</div><div class="ct">próximo passo</div></div><div class="body">Recém-criada (22/05/2026). Recomendado criar BLV01 = "Discovery Lívia" (análogo ao BES05) antes de popular com itens funcionais. Frente entra no pipe pós-junho.</div></div>`;
}

function openItem(id){
  const item = ITEMS.find(i=>i.id===id);
  if(!item) return;
  navStack.push({type:'item',id});
  renderDrawer();
}

function openSubtarefa(itemId,stId){
  navStack.push({type:'subtarefa',itemId,stId});
  renderDrawer();
}

function popNav(){
  navStack.pop();
  if(navStack.length===0) closeDrawer();
  else renderDrawer();
}

function renderDrawer(){
  const last = navStack[navStack.length-1];
  if(!last){closeDrawer();return;}
  const d = document.getElementById('drawer');
  d.innerHTML = last.type==='item' ? drawerItemHtml(last.id) : drawerSubtarefaHtml(last.itemId,last.stId);
  d.classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  document.body.style.overflow='hidden';
  d.scrollTop=0;
}

function navHtml(){
  if(navStack.length<=1) return '';
  const crumbs = navStack.map((n,i)=>{
    const cur = i===navStack.length-1;
    const lbl = n.type==='item'?n.id:`${n.itemId}/${n.stId}`;
    return `<span class="${cur?'cur':''}">${lbl}</span>`;
  }).join('<span class="sep">›</span>');
  return `<div class="drawer-nav"><button class="back" onclick="popNav()">← Voltar</button><div class="crumbs">${crumbs}</div></div>`;
}

function drawerItemHtml(id){
  const item = ITEMS.find(i=>i.id===id);
  if(!item) return '';
  const f = FRENTES[item.frente];
  const origem = item.origem||{};
  const cancelBanner = item.status==='cancelado'?`<div class="cancel-banner"><strong>Item cancelado</strong>${item.absorvido_por?`Escopo absorvido por <a onclick="openItem('${item.absorvido_por}')"><strong style="font-family:var(--font-mono)">${item.absorvido_por}</strong></a>. `:''}Mantido no backlog para rastreabilidade.</div>`:'';
  return `
    <div class="drawer-head">
      ${navHtml()}
      <div class="meta-top">
        <span class="id">${item.id}</span>
        <span class="frente-pill ${item.frente}"><span class="dt"></span>${esc(f.label)}</span>
        <span class="badge ${item.status}">${STATUS_LABELS[item.status]}</span>
        <span class="badge ${item.prioridade}">${PRIO_LABELS[item.prioridade]||item.prioridade}</span>
        ${item.esforco?`<span class="badge baixa">${item.esforco}</span>`:''}
      </div>
      <h2>${esc(item.title)}</h2>
      <button class="close" onclick="closeDrawer()" aria-label="Fechar">×</button>
    </div>
    <div class="drawer-body">
      ${cancelBanner}
      ${item.motivo_cancelamento?`<div class="drawer-section"><h4>Motivo do cancelamento</h4><p>${esc(item.motivo_cancelamento)}</p></div>`:''}
      <div class="drawer-section"><h4>História de usuário</h4><div class="historia">${formatHistoria(item.historia)}</div></div>
      <div class="drawer-section"><h4>Contexto</h4><p>${esc(item.contexto)}</p></div>
      <div class="drawer-section"><h4>Critérios de aceite</h4><div class="ca-list">${(item.criterios_aceite||[]).map(c=>`<div class="ca-item"><strong>${c.id}</strong>${esc(c.texto)}</div>`).join('')||'<p class="muted" style="font-size:12px">— A definir em refinement.</p>'}</div></div>
      <div class="drawer-section"><h4>Subtarefas <span style="font-weight:400;text-transform:none;color:var(--text-muted);letter-spacing:0;float:right">click para detalhar</span></h4><div class="st-list">${(item.subtarefas||[]).map(st=>`<div class="st-item ${st.status==='concluida'?'concluida':''}" onclick="openSubtarefa('${item.id}','${st.id}')"><span class="chk"></span><div><span class="stid">${st.id}</span>${esc(st.title)}</div><span class="stmeta">${st.esforco||'—'} · ${st.responsavel||'—'}</span></div>`).join('')||'<p class="muted" style="font-size:12px">— A definir em refinement.</p>'}</div></div>
      ${(item.dependencias?.length||item.bloqueia?.length)?`<div class="drawer-section"><h4>Dependências cruzadas</h4>${item.dependencias?.length?`<div style="font-size:11px;color:var(--text-muted);margin-bottom:6px;font-weight:600">Depende de:</div><div class="deps">${item.dependencias.map(d=>`<span class="dep-chip" onclick="openItem('${d}')">${d}</span>`).join('')}</div>`:''}${item.bloqueia?.length?`<div style="font-size:11px;color:var(--text-muted);margin-top:14px;margin-bottom:6px;font-weight:600">Bloqueia:</div><div class="deps">${item.bloqueia.map(d=>`<span class="dep-chip" onclick="openItem('${d}')">${d}</span>`).join('')}</div>`:''}</div>`:''}
      <div class="drawer-section"><h4>Metadados</h4><div class="meta-grid">
        <div class="mg-row"><div class="mg-lab">Sponsor</div><div class="mg-val">${esc(item.sponsor)}</div></div>
        <div class="mg-row"><div class="mg-lab">Owner</div><div class="mg-val">${esc(item.owner)}</div></div>
        <div class="mg-row"><div class="mg-lab">Implementador</div><div class="mg-val ${item.implementador?'':'muted'}">${item.implementador||'— a definir'}</div></div>
        <div class="mg-row"><div class="mg-lab">Valor de negócio</div><div class="mg-val">${esc(item.valor_negocio||'—')}</div></div>
        <div class="mg-row"><div class="mg-lab">Esforço (camiseta)</div><div class="mg-val ${item.esforco?'':'muted'}">${item.esforco||'— refinar'}</div></div>
        <div class="mg-row"><div class="mg-lab">Deadline alvo</div><div class="mg-val ${item.deadline_alvo?'mono':'muted'}">${item.deadline_alvo||'— a definir'}</div></div>
        <div class="mg-row"><div class="mg-lab">Criada</div><div class="mg-val mono">${esc(item.criada)}</div></div>
        <div class="mg-row"><div class="mg-lab">Refinada</div><div class="mg-val ${item.refinada?'mono':'muted'}">${item.refinada||'— pendente'}</div></div>
        <div class="mg-row"><div class="mg-lab">Roadmap vinculado</div><div class="mg-val mono">${item.roadmap_vinculado||'—'}</div></div>
        <div class="mg-row"><div class="mg-lab">Frente · Prefix</div><div class="mg-val mono">${esc(f.prefix)}##</div></div>
      </div></div>
      <div class="drawer-section"><h4>RICE</h4>${item.rice&&item.rice.score?`<div class="rice-grid"><div class="rice-cell"><div class="lab">Reach</div><div class="v">${item.rice.reach||'—'}</div></div><div class="rice-cell"><div class="lab">Impact</div><div class="v">${item.rice.impact||'—'}</div></div><div class="rice-cell"><div class="lab">Confidence</div><div class="v">${item.rice.confidence||'—'}</div></div><div class="rice-cell"><div class="lab">Effort</div><div class="v">${item.rice.effort||'—'}</div></div><div class="rice-cell score"><div class="lab">Score</div><div class="v">${item.rice.score}</div></div></div>`:`<p class="muted" style="font-size:12.5px">RICE não preenchido — calcular via <span class="mono">/backlog refine ${item.id}</span>. Escala 1-10 em cada eixo; banda derivada do score: ≥7.0 urgente (com confirmação sponsor) · 5.0–7.0 alta · 2.0–5.0 média · &lt;2.0 baixa.</p>`}</div>
      ${origem.pendencias?.length?`<div class="drawer-section"><h4>Origem · pendências</h4><div class="deps">${origem.pendencias.map(p=>`<span class="dep-chip">${p}</span>`).join('')}</div></div>`:''}
      ${item.premissas?.length?`<div class="drawer-section"><h4>Premissas</h4><ul>${item.premissas.map(p=>`<li>${esc(p)}</li>`).join('')}</ul></div>`:''}
      <div class="drawer-section"><h4>Histórico</h4>${(item.historico||[]).map(h=>`<div class="hist-row"><div class="d">${h.data}</div><div>${esc(h.texto)}</div></div>`).join('')||'<p class="muted" style="font-size:12px">—</p>'}</div>
      ${item.notas?`<div class="drawer-section"><h4>Notas</h4><p style="font-style:italic;color:var(--text-muted)">${esc(item.notas)}</p></div>`:''}
      ${item.tags?.length?`<div class="drawer-section"><h4>Tags</h4><div style="display:flex;flex-wrap:wrap;gap:5px">${item.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>`:''}
    </div>`;
}

function drawerSubtarefaHtml(itemId,stId){
  const item = ITEMS.find(i=>i.id===itemId);
  const st = item?.subtarefas?.find(s=>s.id===stId);
  if(!st) return '';
  return `
    <div class="drawer-head">
      ${navHtml()}
      <div class="meta-top">
        <span class="id">${st.id}</span>
        <span class="badge ${st.status||'a-refinar'}">${STATUS_LABELS[st.status]||'A refinar'}</span>
        ${st.esforco?`<span class="badge baixa">${st.esforco}</span>`:''}
      </div>
      <h2>${esc(st.title)}</h2>
      <button class="close" onclick="closeDrawer()" aria-label="Fechar">×</button>
    </div>
    <div class="drawer-body">
      <div class="drawer-section"><h4>Item-pai</h4><div class="deps"><span class="dep-chip" onclick="openItem('${item.id}')">↑ ${item.id} — ${esc(item.title.substring(0,60))}${item.title.length>60?'...':''}</span></div></div>
      <div class="drawer-section"><h4>Descrição</h4>${st.description?`<p>${esc(st.description)}</p>`:`<p class="muted" style="font-size:12.5px">— Descrição não preenchida. Adicionar em refinement.</p>`}</div>
      <div class="drawer-section"><h4>Metadados</h4><div class="meta-grid">
        <div class="mg-row"><div class="mg-lab">Responsável</div><div class="mg-val ${st.responsavel?'':'muted'}">${st.responsavel||'— a definir'}</div></div>
        <div class="mg-row"><div class="mg-lab">Esforço</div><div class="mg-val ${st.esforco?'':'muted'}">${st.esforco||'— a definir'}</div></div>
        <div class="mg-row"><div class="mg-lab">Prazo</div><div class="mg-val ${st.prazo?'mono':'muted'}">${st.prazo||'— a definir'}</div></div>
        <div class="mg-row"><div class="mg-lab">Status</div><div class="mg-val">${STATUS_LABELS[st.status]||'A refinar'}</div></div>
      </div></div>
      ${st.dependencias?.length?`<div class="drawer-section"><h4>Dependências internas</h4><div class="deps">${st.dependencias.map(d=>`<span class="dep-chip" onclick="openSubtarefa('${item.id}','${d}')">${d}</span>`).join('')}</div></div>`:''}
      <div class="drawer-section"><h4>Histórico</h4>${(st.historico||[]).map(h=>`<div class="hist-row"><div class="d">${h.data}</div><div>${esc(h.texto)}</div></div>`).join('')||'<p class="muted" style="font-size:12px">—</p>'}</div>
    </div>`;
}

function formatHistoria(h){
  if(!h) return '<span class="muted">— A definir em refinement.</span>';
  return esc(h).replace(/^Como\s+([^,]+),/,'<strong>Como</strong> $1,').replace(/quero\s+/,'<strong>quero</strong> ').replace(/,\s*para\s+/,', <strong>para</strong> ');
}

function closeDrawer(){
  navStack=[];
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  document.body.style.overflow='';
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(navStack.length>1) popNav();
    else closeDrawer();
  }
});

render('overview');
</script>
</body>
</html>
