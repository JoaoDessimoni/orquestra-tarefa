<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mapa Mental · Backlog Squad IAF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --finza-blue:#1A1AFF;--finza-deep:#0F0F8C;--finza-soft:#E8E8FF;--finza-dark:#0A0A2E;
  --bg:#F4F4F7;--surface:#FFFFFF;--surface-2:#FAFAFC;
  --border:#E4E4ED;--border-strong:#D5D5E0;
  --text:#0A0A2E;--text-muted:#5C5C7A;--text-subtle:#8A8AA0;
  --urgent:#DC2626;--warning:#F59E0B;--success:#10B981;--info:#0EA5E9;
  --font-sans:'Inter',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:13px;letter-spacing:-0.005em;-webkit-font-smoothing:antialiased}

/* ===== Topbar ===== */
.topbar{position:fixed;left:0;top:0;right:0;height:54px;background:var(--surface);border-bottom:1px solid var(--border);padding:0 22px;display:flex;align-items:center;gap:18px;z-index:30}
.topbar .crumb{font-size:11.5px;color:var(--text-subtle);font-weight:500}
.topbar .crumb a{color:var(--finza-blue);font-weight:600;text-decoration:none}
.topbar .crumb a:hover{text-decoration:underline}
.topbar .crumb .cur{color:var(--text);font-weight:600}
.topbar .title{font-size:13.5px;font-weight:600;color:var(--text);letter-spacing:-0.005em}
.topbar .spacer{flex:1}
.topbar .search{position:relative}
.topbar .search input{padding:6px 12px 6px 30px;font-size:12px;border:1px solid var(--border);background:var(--surface-2);border-radius:99px;width:280px;outline:none;color:var(--text);font-family:var(--font-sans)}
.topbar .search input:focus{border-color:var(--finza-blue);background:var(--surface)}
.topbar .search::before{content:"";position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%235C5C7A' stroke-width='2.5' stroke-linecap='round'><circle cx='11' cy='11' r='7'/><path d='m21 21-4.3-4.3'/></svg>") no-repeat center}
.topbar .meta{font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:.02em}
.topbar .meta strong{color:var(--text);font-weight:600}

/* ===== Layout ===== */
.layout{position:fixed;left:0;top:54px;right:0;bottom:0;display:grid;grid-template-columns:1fr 360px}

/* ===== Viewport (canvas) ===== */
#viewport{position:relative;overflow:hidden;background:#FAFAFC;background-image:radial-gradient(circle,#D5D5E0 1px,transparent 1px);background-size:30px 30px;background-position:0 0;cursor:grab;user-select:none;-webkit-user-select:none}
#viewport.panning{cursor:grabbing}
#viewport.panning .node{pointer-events:none}
#world{position:absolute;left:50%;top:50%;width:0;height:0;transform-origin:0 0}
#links{position:absolute;left:-3000px;top:-3000px;width:6000px;height:6000px;pointer-events:none;overflow:visible}
#links line, #links path{vector-effect:non-scaling-stroke}

.node{position:absolute;transform:translate(-50%,-50%);cursor:pointer;transition:box-shadow .15s,transform .15s}
.node.dragging{transition:none;z-index:50}
.node:hover{z-index:20}

/* Hub */
.hub-node{width:240px;background:linear-gradient(135deg,#0A0A2E 0%,#15154A 100%);border:2px solid var(--finza-blue);border-radius:16px;padding:18px 22px;color:#fff;text-align:center;box-shadow:0 20px 40px -10px rgba(10,10,46,.35);z-index:10}
.hub-node .hn{font-size:18px;font-weight:700;letter-spacing:-0.015em;line-height:1}
.hub-node .hsub{font-size:9.5px;letter-spacing:.16em;color:#A5B4FC;font-weight:700;margin-top:6px;text-transform:uppercase}
.hub-node .hd{font-size:10.5px;color:rgba(255,255,255,.62);margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.12);font-weight:500;letter-spacing:.02em}

/* Frente node */
.frente-node{width:230px;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 2px 6px rgba(10,10,46,.06),0 16px 28px -16px rgba(10,10,46,.18)}
.frente-node .fc-band{height:8px;background:var(--c,var(--finza-blue))}
.frente-node .fc-body{padding:10px 14px 12px;display:flex;align-items:center;gap:10px}
.frente-node .fc-icon{width:28px;height:28px;border-radius:6px;background:var(--c);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
.frente-node .fc-text{flex:1;min-width:0}
.frente-node .fc-name{font-size:12.5px;font-weight:700;color:var(--text);letter-spacing:-0.005em;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.frente-node .fc-meta{font-size:10px;color:var(--text-muted);font-weight:600;letter-spacing:.04em;margin-top:2px;text-transform:uppercase}
.frente-node .fc-chev{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--bg);color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;line-height:1}
.frente-node:hover{box-shadow:0 4px 10px rgba(10,10,46,.08),0 20px 30px -10px rgba(10,10,46,.25);transform:translate(-50%,-50%) translateY(-2px)}
.frente-node.on{border-color:var(--c)}
.frente-node.on .fc-chev{background:var(--c);color:#fff}
.frente-node.sel{outline:3px solid var(--c);outline-offset:2px}

/* Item node */
.item-node{width:210px;background:var(--surface);border:1px solid var(--border);border-radius:7px;overflow:hidden;display:flex;box-shadow:0 1px 3px rgba(10,10,46,.05),0 8px 16px -8px rgba(10,10,46,.12)}
.item-node .it-bar{width:4px;background:var(--cs,#9CA3AF);flex-shrink:0}
.item-node .it-body{flex:1;padding:7px 10px;min-width:0}
.item-node .it-id{font-family:var(--font-mono);font-size:9.5px;font-weight:700;color:var(--c,var(--finza-blue));letter-spacing:.04em}
.item-node .it-title{font-size:11px;font-weight:600;color:var(--text);line-height:1.3;margin-top:1px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.item-node .it-foot{display:flex;justify-content:space-between;align-items:center;margin-top:4px;gap:4px}
.item-node.overdue{box-shadow:0 0 0 2px #DC2626, 0 6px 16px rgba(220,38,38,.25)}
.it-over{font-size:10px;color:#DC2626;font-weight:700}
.datefilter{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.df-chip{padding:4px 9px;border:1px solid var(--border,#e2e8f0);border-radius:99px;background:var(--surface,#fff);color:var(--text,#0f172a);font-size:11px;cursor:pointer;font-weight:600}
.df-chip:hover{border-color:#1A1AFF}
.df-chip.on{background:#1A1AFF;color:#fff;border-color:#1A1AFF}
.df-chip.clear{color:#DC2626;border-color:#DC2626}
.df-date{padding:3px 6px;border:1px solid var(--border,#e2e8f0);border-radius:8px;background:var(--surface,#fff);color:var(--text,#0f172a);font-size:11px}
.item-node .it-st{font-size:8.5px;font-weight:700;letter-spacing:.06em;color:var(--text-muted);text-transform:uppercase}
.item-node .it-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.item-node .it-dot.urg{background:var(--urgent)}
.item-node .it-dot.alta{background:#F97316}
.item-node:hover{box-shadow:0 3px 8px rgba(10,10,46,.08),0 12px 20px -8px rgba(10,10,46,.22);transform:translate(-50%,-50%) translateY(-2px)}
.item-node.sel{outline:2.5px solid var(--c);outline-offset:2px;z-index:15}
.item-node.on{background:linear-gradient(180deg,var(--surface) 0%,#F9F9FE 100%)}
.item-node[data-status="cancelado"]{opacity:.55}
.item-node[data-status="cancelado"] .it-title{text-decoration:line-through}
.item-node[data-status="entregue"] .it-id::after{content:" ✓";color:var(--success)}

/* Bucket node (priority group) */
.bucket-node{width:200px;background:var(--surface);border:1px solid var(--border);border-radius:99px;display:flex;align-items:center;gap:8px;padding:5px 9px 5px 5px;box-shadow:0 2px 4px rgba(10,10,46,.06),0 10px 18px -8px rgba(10,10,46,.15)}
.bucket-node .bk-band{width:6px;height:30px;background:var(--c);border-radius:3px;flex-shrink:0}
.bucket-node .bk-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.bucket-node .bk-prio{font-size:10.5px;font-weight:700;color:var(--c);letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:6px;line-height:1.1}
.bucket-node .bk-prio .bk-count{font-family:var(--font-mono);font-size:9.5px;background:var(--bg);color:var(--text-muted);padding:1px 6px;border-radius:99px;font-weight:700;border:1px solid var(--border);text-transform:none;letter-spacing:.02em}
.bucket-node .bk-hint{font-size:9.5px;font-family:var(--font-mono);color:var(--text-subtle);font-weight:600;letter-spacing:.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bucket-node .bk-chev{width:22px;height:22px;border-radius:50%;background:var(--bg);color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;line-height:1}
.bucket-node.on{border-color:var(--c)}
.bucket-node.on .bk-chev{background:var(--c);color:#fff}
.bucket-node:hover{box-shadow:0 4px 8px rgba(10,10,46,.08),0 14px 22px -8px rgba(10,10,46,.22);transform:translate(-50%,-50%) translateY(-2px)}

/* Subtarefa node */
.sub-node{background:var(--surface-2);border:1px solid var(--border);border-radius:5px;padding:5px 9px;display:flex;align-items:center;gap:6px;font-size:10.5px;line-height:1.3;width:180px;box-shadow:0 1px 2px rgba(10,10,46,.04)}
.sub-node .sub-id{font-family:var(--font-mono);font-size:9px;font-weight:700;color:var(--text-subtle);letter-spacing:.04em;flex-shrink:0}
.sub-node .sub-t{flex:1;color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sub-node .sub-gate{flex-shrink:0;width:14px;height:14px;border-radius:50%;background:#FEF3C7;color:#92400E;border:1px solid #FDE68A;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.sub-node.gate{border-color:#FDE68A;background:#FFFBEB}
.sub-node:hover{border-color:var(--border-strong);background:var(--surface)}

/* dimmed when filtered */
.node.dim{opacity:0.18;pointer-events:none;filter:saturate(0.3)}
.node.match{outline:2px solid #10B981;outline-offset:3px}

/* ===== Side panel ===== */
#panel{background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;padding:18px 20px 24px;display:flex;flex-direction:column;gap:16px}
#panel .ph{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:var(--text-subtle);margin-bottom:8px}
#panel .pn-empty{font-size:12.5px;color:var(--text-muted);line-height:1.65}
#panel .pn-empty strong{display:block;font-size:14px;color:var(--text);font-weight:600;margin-bottom:8px;letter-spacing:-0.005em}
#panel .pn-empty ul{margin:8px 0 0;padding-left:18px;font-size:12px}
#panel .pn-empty li{margin:5px 0;line-height:1.55}
#panel .pn-empty kbd{font-family:var(--font-mono);font-size:10px;background:var(--bg);border:1px solid var(--border);padding:1px 5px;border-radius:3px;font-weight:600;color:var(--text)}

.detail-card{background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--c,var(--finza-blue));border-radius:8px;padding:14px 16px}
.detail-card .d-id{font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--text-subtle);letter-spacing:.04em}
.detail-card .d-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.4;margin:5px 0 10px;letter-spacing:-0.005em}
.detail-card .d-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.detail-card .d-grid{display:grid;grid-template-columns:auto 1fr;gap:6px 12px;font-size:11.5px;margin-bottom:10px}
.detail-card .d-grid dt{font-size:9.5px;letter-spacing:.12em;color:var(--text-muted);font-weight:700;text-transform:uppercase;padding-top:1px}
.detail-card .d-grid dd{margin:0;color:var(--text);font-weight:500}
.detail-card .d-grid dd.mono{font-family:var(--font-mono);font-size:10.5px}
.detail-card .d-grid dd.muted{color:var(--text-subtle);font-style:italic;font-weight:400}
.detail-card .d-context{font-size:12px;color:var(--text-muted);line-height:1.55;padding-top:10px;border-top:1px solid var(--border)}

.rels-section{margin-top:4px}
.rels-section h4{margin:0 0 8px;font-size:9.5px;font-weight:700;letter-spacing:.16em;color:var(--text-muted);text-transform:uppercase}
.rels-section .rel-chips{display:flex;flex-wrap:wrap;gap:5px}
.rel-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;background:var(--surface);border:1px solid var(--border);border-radius:99px;font-family:var(--font-mono);font-size:10.5px;font-weight:700;color:var(--text);cursor:pointer;transition:all .12s}
.rel-chip:hover{background:var(--finza-blue);color:#fff;border-color:var(--finza-blue)}
.rel-chip.dep{border-color:#FED7AA;background:#FFF7EE;color:#9A3412}
.rel-chip.dep:hover{background:#F59E0B;color:#fff;border-color:#F59E0B}
.rel-chip.blq{border-color:#FECACA;background:#FEF2F2;color:#991B1B}
.rel-chip.blq:hover{background:#EF4444;color:#fff;border-color:#EF4444}

.sub-list{display:flex;flex-direction:column;gap:5px}
.sub-list .sl-it{display:grid;grid-template-columns:auto 1fr auto;gap:8px;padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:5px;font-size:11px;line-height:1.4;align-items:center}
.sub-list .sl-it .sl-id{font-family:var(--font-mono);font-size:9.5px;font-weight:700;color:var(--text-subtle)}
.sub-list .sl-it .sl-t{color:var(--text);font-weight:500;line-height:1.35}
.sub-list .sl-it .sl-meta{font-family:var(--font-mono);font-size:9.5px;color:var(--text-subtle);white-space:nowrap}
.sub-list .sl-it.gate{background:#FFFBEB;border-color:#FDE68A}
.sub-list .sl-it.gate .sl-id{color:#92400E}

/* Sub-node selection */
.sub-node.sel{outline:2.5px solid var(--finza-blue);outline-offset:2px;background:#EEF2FF;z-index:15}

/* Rich panel cards */
.panel-section{margin-top:4px}
.panel-section h4{margin:0 0 8px;font-size:9.5px;font-weight:700;letter-spacing:.16em;color:var(--text-muted);text-transform:uppercase;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.panel-section h4 .h4-count{font-family:var(--font-mono);font-size:9px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:1px 6px;border-radius:99px;font-weight:700;letter-spacing:.02em;text-transform:none}
.panel-text{font-size:12px;color:var(--text);line-height:1.6;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:11px 13px;white-space:pre-wrap}
.panel-text.muted{color:var(--text-muted);font-size:11.5px}
.panel-text.history{border-left:3px solid var(--finza-blue);padding-left:13px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:4px}
.kpi-cell{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px;text-align:left}
.kpi-cell .kpi-l{font-size:8.5px;letter-spacing:.14em;color:var(--text-muted);font-weight:700;text-transform:uppercase}
.kpi-cell .kpi-v{font-size:14px;font-weight:700;color:var(--text);font-family:var(--font-mono);margin-top:3px;letter-spacing:-0.01em}
.kpi-cell.score{background:var(--finza-blue);border-color:var(--finza-blue)}
.kpi-cell.score .kpi-l{color:rgba(255,255,255,.78)}
.kpi-cell.score .kpi-v{color:#fff;font-size:15px}
.ca-list{display:flex;flex-direction:column;gap:8px}
.ca-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid #10B981;border-radius:6px;padding:10px 12px;font-size:11.5px;line-height:1.5}
.ca-card .ca-line{display:grid;grid-template-columns:38px 1fr;gap:8px;margin-bottom:4px}
.ca-card .ca-line:last-child{margin-bottom:0}
.ca-card .ca-tag{font-size:8.5px;letter-spacing:.1em;font-weight:700;text-transform:uppercase;color:#047857;background:#ECFDF5;border:1px solid #A7F3D0;padding:1px 4px;border-radius:3px;align-self:start;text-align:center;line-height:1.4}
.ca-card .ca-line.w .ca-tag{color:#92400E;background:#FFFBEB;border-color:#FDE68A}
.ca-card .ca-line.t .ca-tag{color:#1A1AFF;background:#EEF2FF;border-color:#C7CEFF}
.bullet-list{display:flex;flex-direction:column;gap:5px;margin:0;padding:0;list-style:none}
.bullet-list li{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:7px 11px 7px 24px;font-size:11.5px;color:var(--text);line-height:1.5;position:relative}
.bullet-list li::before{content:"";position:absolute;left:10px;top:13px;width:5px;height:5px;border-radius:50%;background:var(--text-subtle)}
.bullet-list.risk li::before{background:#EF4444}
.bullet-list.prem li::before{background:#0EA5E9}
.tags-row{display:flex;flex-wrap:wrap;gap:4px}
.tag-chip{font-family:var(--font-mono);font-size:9.5px;font-weight:700;padding:2px 7px;background:var(--bg);border:1px solid var(--border);border-radius:99px;color:var(--text-muted);letter-spacing:.02em}
.subs-list{display:flex;flex-direction:column;gap:5px}
.sub-card{display:grid;grid-template-columns:auto 1fr auto;gap:8px;padding:7px 11px;background:var(--surface);border:1px solid var(--border);border-radius:5px;font-size:11px;line-height:1.4;align-items:center;cursor:pointer;transition:border-color .12s,background .12s}
.sub-card:hover{border-color:var(--finza-blue);background:#F8F8FF}
.sub-card.sel{border-color:var(--finza-blue);background:#EEF2FF;outline:1px solid var(--finza-blue);outline-offset:-1px}
.sub-card.gate{background:#FFFBEB;border-color:#FDE68A}
.sub-card.gate:hover{background:#FEF3C7}
.sub-card .sc-id{font-family:var(--font-mono);font-size:9.5px;font-weight:700;color:var(--text-subtle);min-width:36px}
.sub-card.gate .sc-id{color:#92400E}
.sub-card .sc-t{color:var(--text);font-weight:500;line-height:1.35;min-width:0;overflow:hidden}
.sub-card .sc-meta{font-family:var(--font-mono);font-size:9px;color:var(--text-subtle);white-space:nowrap;text-align:right}
.back-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--finza-blue);font-weight:600;cursor:pointer;background:transparent;border:0;padding:3px 6px 3px 0;letter-spacing:.01em}
.back-btn:hover{text-decoration:underline}
.contextual-section{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.bucket-pill-row{display:flex;flex-wrap:wrap;gap:4px}
.bucket-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.04em;cursor:pointer;border:1px solid;text-transform:uppercase;transition:transform .1s}
.bucket-pill:hover{transform:translateY(-1px)}
.bucket-pill .bp-n{font-family:var(--font-mono);font-size:9px;background:rgba(255,255,255,.5);padding:1px 5px;border-radius:99px}

.badge{display:inline-flex;padding:2px 7px;font-size:9.5px;font-weight:700;letter-spacing:.06em;border-radius:3px;border:1px solid transparent;text-transform:uppercase}
.badge.urgente{background:#FFF0F0;color:#B91C1C;border-color:#FECACA}
.badge.alta{background:#FFF4EC;color:#9A3412;border-color:#FED7AA}
.badge.media{background:#FFFBEB;color:#92400E;border-color:#FDE68A}
.badge.baixa{background:#F4F4F7;color:#52525B;border-color:#E4E4ED}
.badge.a-refinar{background:#F4F4F7;color:#52525B;border-color:#E4E4ED}
.badge.em-refinamento{background:#FFFBEB;color:#92400E;border-color:#FDE68A}
.badge.refinado{background:#ECFEFF;color:#0E7490;border-color:#A5F3FC}
.badge.em-curso{background:#EEF2FF;color:#1A1AFF;border-color:#C7CEFF}
.badge.bloqueado{background:#FEF2F2;color:#991B1B;border-color:#FECACA}
.badge.validacao{background:#FAF5FF;color:#6B21A8;border-color:#E9D5FF}
.badge.entregue{background:#ECFDF5;color:#047857;border-color:#A7F3D0}

/* Toolbar */
.toolbar{position:absolute;left:14px;bottom:14px;display:flex;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:5px;box-shadow:0 4px 12px rgba(10,10,46,.08);z-index:20}
.toolbar button{background:var(--surface);border:0;padding:6px 10px;font-size:11.5px;font-weight:600;color:var(--text-muted);cursor:pointer;border-radius:5px;letter-spacing:.02em;display:inline-flex;align-items:center;gap:4px}
.toolbar button:hover{background:var(--bg);color:var(--text)}
.toolbar button.primary{color:var(--finza-blue)}
.toolbar .zoom-val{padding:6px 10px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);min-width:48px;text-align:center;border-left:1px solid var(--border);border-right:1px solid var(--border)}

.hint{position:absolute;right:14px;bottom:14px;background:rgba(255,255,255,0.92);border:1px solid var(--border);padding:8px 12px;border-radius:8px;font-size:10.5px;color:var(--text-muted);line-height:1.6;backdrop-filter:blur(6px);max-width:280px;z-index:20;box-shadow:0 4px 12px rgba(10,10,46,.05)}
.hint kbd{font-family:var(--font-mono);font-size:9.5px;background:var(--bg);border:1px solid var(--border);padding:1px 5px;border-radius:3px;font-weight:600;color:var(--text)}
.hint strong{color:var(--text);font-weight:600}

  .layout{grid-template-columns:1fr}
  #panel{display:none}
}

try {

      o.positions = Object.fromEntries(Object.entries(o.positions).filter(([k]) => !k.startsWith('sub:')));
    }

} catch(e){}

// ===== State =====

let zoom = 1;

let expandedBuckets = new Set(); // keys 'frenteKey|prio'

let searchQ = '';

let dateFilterStart = '';
let dateFilterEnd = '';
let datePresetMap = '';
let openOnlyMap = false;
const REF_DATE_M = new Date((DATA.generated_at||'2026-06-02').slice(0,10)+'T00:00:00');
const OPEN_ST = new Set(['a-refinar','em-refinamento','refinado','em-curso','bloqueado','validacao']);
function parseDM(s){ if(!s) return null; const d=new Date(String(s).slice(0,10)+'T00:00:00'); return isNaN(d)?null:d; }
function monthStartM(){ return new Date(REF_DATE_M.getFullYear(),REF_DATE_M.getMonth(),1); }
function monthWinM(off){ const s=new Date(REF_DATE_M.getFullYear(),REF_DATE_M.getMonth()+off,1); const e=new Date(REF_DATE_M.getFullYear(),REF_DATE_M.getMonth()+off+1,0,23,59,59); return {s,e}; }
function isOverdueOpenM(it){ const c=parseDM(it.criada); return !!(c && OPEN_ST.has(it.status) && c < monthStartM()); }
function dateWinM(){
  if(datePresetMap==='este') return monthWinM(0);
  if(datePresetMap==='passado') return monthWinM(-1);
  if(datePresetMap==='anteriores') return {anteriores:true};
  if(dateFilterStart||dateFilterEnd){ const e=parseDM(dateFilterEnd); if(e) e.setHours(23,59,59); return {s:parseDM(dateFilterStart),e}; }
  return null;
}
function passDateM(it){
  if(openOnlyMap && !OPEN_ST.has(it.status)) return false;
  const dw=dateWinM(); if(!dw) return true;
  if(dw.anteriores) return isOverdueOpenM(it);
  const c=parseDM(it.criada); if(!c) return false;
  if(dw.s && c<dw.s) return false; if(dw.e && c>dw.e) return false; return true;
}

// Load persisted state
try{

  if(typeof saved.showHistorico === 'boolean') showHistorico = saved.showHistorico;
}catch(e){}

function persist(){

    localStorage.setItem(STORAGE, JSON.stringify({
      positions, pan, zoom,

}

// ===== Helpers =====
const NS = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs){
  const e = document.createElementNS(NS, tag);
  for(const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}
function escapeHtml(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function ensureFrentePositions(){
  DATA.frentes.forEach((f, i) => {
    const key = 'frente:'+f.key;
    if(!positions[key]){
      const angle = (-90 + i * (360/DATA.frentes.length)) * Math.PI/180;
      positions[key] = {x: 460*Math.cos(angle), y: 460*Math.sin(angle)};
    }
  });
}

// ===== Priority / impact ordering =====
const PRIO_ORDER = ['urgente','alta','media','baixa'];
const PRIO_LBL = {urgente:'Urgentes', alta:'Altas', media:'Médias', baixa:'Baixas'};
const PRIO_COLOR = {urgente:'#DC2626', alta:'#F97316', media:'#F59E0B', baixa:'#9CA3AF'};
const STATUS_RANK = {'em-curso':0,'em-refinamento':1,'refinado':2,'validacao':3,'bloqueado':4,'a-refinar':5,'entregue':6,'cancelado':7};

function activeItems(fk){
  // Cancelados nunca aparecem no mapa (não contam no backlog)
  const its = ITEMS.filter(i => i.frente === fk && i.status !== 'cancelado' && passDateM(i));
  if(showHistorico) return its;
  return its.filter(i => i.status !== 'entregue');
}
function bucketsForFrente(fk){
  const its = activeItems(fk);
  return PRIO_ORDER.filter(p => its.some(i => i.prioridade === p));
}
function sortByImpact(a, b){
  const sa = STATUS_RANK[a.status]; const sb = STATUS_RANK[b.status];
  const saV = sa==null ? 9 : sa, sbV = sb==null ? 9 : sb;
  if(saV !== sbV) return saV - sbV;
  const ra = a.rice || 0, rb = b.rice || 0;
  if(ra !== rb) return rb - ra;
  const da = a.deadline && /^\d{4}-\d{2}-\d{2}$/.test(a.deadline) ? +new Date(a.deadline) : Infinity;
  const db = b.deadline && /^\d{4}-\d{2}-\d{2}$/.test(b.deadline) ? +new Date(b.deadline) : Infinity;
  return da - db;
}

function ensureBucketPositions(fk){
  const buckets = bucketsForFrente(fk);
  if(!buckets.length) return;
  const fpos = positions['frente:'+fk];
  const a0 = Math.atan2(fpos.y, fpos.x);
  const N = buckets.length;
  const spread = (N === 1 ? 0 : N === 2 ? 50 : N === 3 ? 90 : 130) * Math.PI/180;
  const r = 220;
  buckets.forEach((p, i) => {
    const t = N === 1 ? 0.5 : i/(N-1);
    const a = a0 - spread/2 + t*spread;
    const key = 'bucket:'+fk+':'+p;
    if(!positions[key]){
      positions[key] = {x: fpos.x + r*Math.cos(a), y: fpos.y + r*Math.sin(a)};
    }
  });
}
// ===== Layout helpers (slot-aware arc) =====
// Lays out N children around a parent. Uses a CONSTANT spread across rings,
// so slot widths are predictable. Half-slot stagger offsets odd rings so
// items in adjacent rings don't fall on the same radial line.
function layoutAround(parentPos, refPos, n, opts){
  const dx = parentPos.x - refPos.x, dy = parentPos.y - refPos.y;
  const a0 = Math.atan2(dy, dx);
  const baseR = opts.baseR;
  const ringStep = opts.ringStep; // MUST be >= node width to prevent radial overlap
  const minSep = opts.minSep;
  const spread = opts.spread * Math.PI/180;
  const positions = [];
  let placed = 0, ri = 0;
  while(placed < n){
    const r = baseR + ri*ringStep;
    const arcLen = spread * r;
    const slots = Math.max(1, Math.floor(arcLen / minSep));
    const take = Math.min(slots, n - placed);
    const slotWidth = spread / slots;
    const offset = (ri % 2) * (slotWidth / 2);
    for(let j = 0; j < take; j++){
      const t = (j + 0.5) / slots;
      const a = a0 - spread/2 + t*spread + offset;
      positions.push({x: parentPos.x + r*Math.cos(a), y: parentPos.y + r*Math.sin(a)});
    }
    placed += take;
    ri++;
    if(ri > 8) break;
  }
  return positions;
}
function ensureItemPositions(fk, prio){
  const items = activeItems(fk).filter(i => i.prioridade === prio).sort(sortByImpact);
  if(!items.length) return;
  const bpos = positions['bucket:'+fk+':'+prio];
  const fpos = positions['frente:'+fk];
  if(!bpos || !fpos) return;
  // item-node ~210px wide → ringStep 220 ensures no radial overlap
  const pts = layoutAround(bpos, fpos, items.length, {
    baseR: 200, ringStep: 220, minSep: 240, spread: 160
  });
  items.forEach((it, i) => {
    const key = 'item:'+it.id;
    if(!positions[key]) positions[key] = pts[i];
  });
}
function ensureSubPositions(itemId){
  const item = ITEMS_BY_ID[itemId];
  if(!item || !item.subtarefas.length) return;
  const ipos = positions['item:'+itemId];
  const fpos = positions['frente:'+item.frente];
  if(!ipos || !fpos) return;
  // sub-node ~190px wide → ringStep 195 ensures no radial overlap;
  // baseR 205 keeps the first ring just clear of the item-node bbox (item ~210 wide)
  const pts = layoutAround(ipos, fpos, item.subtarefas.length, {
    baseR: 205, ringStep: 195, minSep: 215, spread: 210
  });
  item.subtarefas.forEach((st, i) => {
    const key = 'sub:'+itemId+':'+st.id;
    if(!positions[key]) positions[key] = pts[i];
  });
}

  const visibleItemIds = new Set();
  expandedFrentes.forEach(fk => {
    ensureBucketPositions(fk);
    const buckets = bucketsForFrente(fk);
    buckets.forEach(prio => {
      const bpos = positions['bucket:'+fk+':'+prio];
      if(!bpos) return;
      const items = activeItems(fk).filter(i => i.prioridade === prio).sort(sortByImpact);
      const bkey = fk+'|'+prio;
      const isOn = expandedBuckets.has(bkey);
      // Bucket node
      const bel = document.createElement('div');
      bel.className = 'node bucket-node' + (isOn ? ' on' : '');
      bel.style.left = bpos.x + 'px';
      bel.style.top = bpos.y + 'px';
      bel.style.setProperty('--c', PRIO_COLOR[prio]);
      bel.style.setProperty('--cf', FRENTES[fk].color);
      bel.dataset.key = 'bucket:'+fk+':'+prio;
      const hint = items.slice(0,2).map(i=>i.id).join(' · ') + (items.length>2 ? ' · +'+(items.length-2) : '');
      bel.innerHTML = `
        <div class="bk-band"></div>
        <div class="bk-body">
          <div class="bk-prio">${PRIO_LBL[prio]}<span class="bk-count">${items.length}</span></div>
          <div class="bk-hint">${hint || '\u2014'}</div>
        </div>
        <div class="bk-chev">${isOn ? '−' : '+'}</div>
      `;
      attachInteractions(bel, () => toggleBucket(fk, prio));
      world.appendChild(bel);
      // Items inside expanded bucket
      if(isOn){
        ensureItemPositions(fk, prio);
        items.forEach(it => {
          visibleItemIds.add(it.id);
          const ipos = positions['item:'+it.id];
          if(!ipos) return;
          const f = FRENTES[it.frente];
          const iel = document.createElement('div');
          iel.className = 'node item-node' + (selectedItem === it.id ? ' sel' : '') + (expandedItems.has(it.id) ? ' on' : '') + (isOverdueOpenM(it) ? ' overdue' : '');
          iel.style.left = ipos.x + 'px';
          iel.style.top = ipos.y + 'px';
          iel.style.setProperty('--c', f.color);
          iel.style.setProperty('--cs', STATUS_COLORS[it.status]);
          iel.dataset.key = 'item:'+it.id;
          iel.dataset.status = it.status;
          const dotCls = it.prioridade === 'urgente' ? 'urg' : it.prioridade === 'alta' ? 'alta' : '';
          iel.innerHTML = `
            <div class="it-bar"></div>
            <div class="it-body">
              <div class="it-id">${it.id}</div>
              <div class="it-title">${escapeHtml(it.title)}</div>
              <div class="it-foot">
                <span class="it-st">${STATUS_LABELS[it.status]}</span>
                ${isOverdueOpenM(it)?'<span class="it-over" title="criada em mês anterior e ainda aberta">⏳</span>':''}
                ${dotCls ? '<span class="it-dot '+dotCls+'"></span>' : ''}
              </div>
            </div>
          `;
          attachInteractions(iel, () => selectItem(it.id));
          world.appendChild(iel);
        });
      }
    });
  });

  // Subtarefas
  expandedItems.forEach(iid => {
    if(!visibleItemIds.has(iid)) return;
    ensureSubPositions(iid);
    const item = ITEMS_BY_ID[iid];
    item.subtarefas.forEach(st => {
      const pos = positions['sub:'+iid+':'+st.id];
      const el = document.createElement('div');
      el.className = 'node sub-node' + (st.isGate ? ' gate' : '');
      el.style.left = pos.x + 'px';
      el.style.top = pos.y + 'px';
      el.dataset.key = 'sub:'+iid+':'+st.id;
      el.innerHTML = `
        ${st.isGate ? '<span class="sub-gate">!</span>' : ''}
        <span class="sub-id">${st.id}</span>
        <span class="sub-t">${escapeHtml(st.title)}</span>
      `;
      if(selectedSub && selectedSub.itemId === iid && selectedSub.subId === st.id) el.classList.add('sel');
      attachInteractions(el, () => selectSubtarefa(iid, st.id));
      world.appendChild(el);
    });
  });

  // SVG links
  renderLinks(visibleItemIds);

  // Search dim/highlight
  applySearchVisual();

  // Side panel
  renderPanel();

  applyTransform();
}

function renderLinks(visibleItemIds){
  // Clear
  while(links.firstChild) links.removeChild(links.firstChild);

  // Defs: arrow markers
  const defs = svgEl('defs', {});
  const mk = (id, color) => {
    const m = svgEl('marker', {id, markerWidth:8, markerHeight:8, refX:7, refY:4, orient:'auto-start-reverse', markerUnits:'userSpaceOnUse'});
    const p = svgEl('path', {d:'M0,0 L8,4 L0,8 z', fill:color});
    m.appendChild(p);
    return m;
  };
  defs.appendChild(mk('arr-dep', '#F59E0B'));
  defs.appendChild(mk('arr-blq', '#EF4444'));
  links.appendChild(defs);

  const O = 3000; // offset

  // Hub → frentes (always)
  DATA.frentes.forEach(f => {
    const fpos = positions['frente:'+f.key];
    // direction
    const dx = fpos.x, dy = fpos.y;
    const len = Math.sqrt(dx*dx+dy*dy);
    const ux = dx/len, uy = dy/len;
    // hub edge ≈ 100px from center; frente edge ≈ 130px from center (frente size 230x96)
    const x1 = O + ux*95;
    const y1 = O + uy*55;
    const x2 = O + fpos.x - ux*130;
    const y2 = O + fpos.y - uy*45;
    links.appendChild(svgEl('line', {x1, y1, x2, y2, stroke:f.color, 'stroke-width':2.5, 'stroke-opacity':expandedFrentes.has(f.key) ? 0.85 : 0.45}));
  });

  // Frente → buckets, and bucket → items (when expanded)
  expandedFrentes.forEach(fk => {
    const fpos = positions['frente:'+fk];
    bucketsForFrente(fk).forEach(prio => {
      const bpos = positions['bucket:'+fk+':'+prio];
      if(!bpos) return;
      links.appendChild(svgEl('line', {
        x1: O+fpos.x, y1: O+fpos.y,
        x2: O+bpos.x, y2: O+bpos.y,
        stroke: PRIO_COLOR[prio],
        'stroke-width': 1.8,
        'stroke-opacity': 0.55
      }));
      if(expandedBuckets.has(fk+'|'+prio)){
        activeItems(fk).filter(i => i.prioridade === prio).forEach(it => {
          const ipos = positions['item:'+it.id];
          if(!ipos) return;
          links.appendChild(svgEl('line', {
            x1: O+bpos.x, y1: O+bpos.y,
            x2: O+ipos.x, y2: O+ipos.y,
            stroke: FRENTES[fk].color,
            'stroke-width': 1,
            'stroke-opacity': 0.32
          }));
        });
      }
    });
  });

  // Item → subtarefas
  expandedItems.forEach(iid => {
    if(!visibleItemIds.has(iid)) return;
    const ipos = positions['item:'+iid];
    ITEMS_BY_ID[iid].subtarefas.forEach(st => {
      const spos = positions['sub:'+iid+':'+st.id];
      if(!spos) return;
      links.appendChild(svgEl('line', {
        x1: O+ipos.x, y1: O+ipos.y,
        x2: O+spos.x, y2: O+spos.y,
        stroke: '#9CA3AF',
        'stroke-width': 1,
        'stroke-opacity': 0.55,
        'stroke-dasharray': '3,3'
      }));
    });
  });

  // Item ↔ Item dependencies/blocks
  ITEMS.forEach(i => {
    if(!visibleItemIds.has(i.id)) return;
    const a = positions['item:'+i.id];
    // depends on
    i.dependencias.forEach(depId => {
      if(!visibleItemIds.has(depId)) return;
      const b = positions['item:'+depId];
      // curve from b → a (dep flows TO i)
      const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
      const dx = a.x - b.x, dy = a.y - b.y;
      const len = Math.sqrt(dx*dx+dy*dy) || 1;
      const px = -dy/len * 28, py = dx/len * 28;
      links.appendChild(svgEl('path', {
        d: `M ${O+b.x} ${O+b.y} Q ${O+mx+px} ${O+my+py} ${O+a.x} ${O+a.y}`,
        stroke: '#F59E0B',
        'stroke-width': 1.6,
        'stroke-dasharray': '5,3',
        fill: 'none',
        opacity: 0.85,
        'marker-end': 'url(#arr-dep)'
      }));
    });
    // blocks
    i.bloqueia.forEach(blockId => {
      if(!visibleItemIds.has(blockId)) return;
      const b = positions['item:'+blockId];
      const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
      const dx = b.x - a.x, dy = b.y - a.y;
      const len = Math.sqrt(dx*dx+dy*dy) || 1;
      const px = -dy/len * (-28), py = dx/len * (-28);
      links.appendChild(svgEl('path', {
        d: `M ${O+a.x} ${O+a.y} Q ${O+mx+px} ${O+my+py} ${O+b.x} ${O+b.y}`,
        stroke: '#EF4444',
        'stroke-width': 1.6,
        'stroke-dasharray': '7,4',
        fill: 'none',
        opacity: 0.85,
        'marker-end': 'url(#arr-blq)'
      }));
    });
  });
}

  if(selectedFrente){

              ${bItems.map(i => `<div class="sub-card" data-goto="${i.id}">
                <span class="sc-id">${i.id}</span>
                <span class="sc-t">${escapeHtml(i.title)}</span>
                <span class="sc-meta">${i.rice?.score?'RICE '+i.rice.score:(i.esforco||'—')}<br>${STATUS_LABELS[i.status].split(' ')[0]}</span>
              </div>`).join('')}
            </div>
          </div>
        `;
      }).join('')}
    `;
    panel.querySelectorAll('[data-goto]').forEach(c => c.onclick = () => navigateToItem(c.dataset.goto));
    return;
  }

  // === Empty state ===
  panel.innerHTML = `
    <div>
      <div class="ph">Mapa interativo</div>
      <div class="pn-empty">
        <strong>Squad IAF · 30 itens · 7 frentes</strong>
        Canvas tipo Miro · explore o backlog clicando, arrastando, dando zoom.
        <ul>
          <li><kbd>clique</kbd> em uma <strong>frente</strong> para abrir buckets de prioridade</li>
          <li><kbd>clique</kbd> num <strong>bucket</strong> para ver os itens ordenados por impacto</li>
          <li><kbd>clique</kbd> num <strong>item</strong> para ver contexto, RICE, critérios, riscos e subtarefas</li>
          <li><kbd>clique</kbd> numa <strong>subtarefa</strong> para detalhe + responsável + prazo</li>
          <li>Linhas <span style="color:#F59E0B;font-weight:600">laranja tracejadas</span> = depende de</li>
          <li>Linhas <span style="color:#EF4444;font-weight:600">vermelhas tracejadas</span> = bloqueia</li>
          <li><kbd>arraste</kbd> nós · <kbd>scroll</kbd> para zoom · <kbd>arraste o fundo</kbd> para pan</li>
        </ul>
      </div>
    </div>
    <div>
      <div class="ph">Ir para uma frente</div>
      <div class="bucket-pill-row">
        ${DATA.frentes.map(f => `<span class="bucket-pill" data-frente="${f.key}" style="border-color:${f.color};color:${f.color};background:rgba(0,0,0,0)">${escapeHtml(f.label.split('·')[0].trim())}<span class="bp-n" style="color:${f.color};border:1px solid ${f.color}30">${activeItems(f.key).length}</span></span>`).join('')}
      </div>
    </div>
  `;
  panel.querySelectorAll('[data-frente]').forEach(c => {
    c.onclick = () => {
      const k = c.dataset.frente;
      if(!expandedFrentes.has(k)) expandedFrentes.add(k);
      selectedFrente = k; selectedItem = null; selectedSub = null;
      ensureBucketPositions(k);
      panTo(positions['frente:'+k]);
      render(); persist();
    };
  });
}

function applySearchVisual(){
  const q = searchQ.toLowerCase().trim();
  if(!q){
    document.querySelectorAll('.node').forEach(n => {n.classList.remove('dim'); n.classList.remove('match');});
    matchedIds.clear();
    return;
  }
  matchedIds.clear();
  ITEMS.forEach(i => {
    if(i.id.toLowerCase().includes(q) || i.title.toLowerCase().includes(q)) matchedIds.add(i.id);
  });
  document.querySelectorAll('.node').forEach(n => {
    const key = n.dataset.key||'';
    if(!key){n.classList.add('dim');return;}
    if(key.startsWith('item:')){
      const id = key.slice(5);
      if(matchedIds.has(id)){n.classList.add('match');n.classList.remove('dim');}
      else {n.classList.add('dim');n.classList.remove('match');}
    } else if(key.startsWith('bucket:')){
      const [, fk, prio] = key.split(':');
      const hasMatch = ITEMS.some(i => i.frente===fk && i.prioridade===prio && matchedIds.has(i.id));
      if(hasMatch){n.classList.remove('dim');n.classList.remove('match');}
      else {n.classList.add('dim');n.classList.remove('match');}
    } else if(key.startsWith('frente:')){
      const fk = key.slice(7);
      const has = ITEMS.some(i => i.frente===fk && matchedIds.has(i.id));
      if(has){n.classList.remove('dim');n.classList.remove('match');}
      else{n.classList.add('dim');n.classList.remove('match');}
    } else {
      n.classList.add('dim');
    }
  });
}

// ===== Actions =====
function toggleFrente(key){
  if(expandedFrentes.has(key)){
    expandedFrentes.delete(key);
    // collapse buckets and items in this frente
    [...expandedBuckets].forEach(b => { if(b.startsWith(key+'|')) expandedBuckets.delete(b); });
    ITEMS.filter(i => i.frente === key).forEach(i => expandedItems.delete(i.id));
  } else {
    expandedFrentes.add(key);
    ensureBucketPositions(key);
  }
  selectedFrente = key;
  selectedItem = null;
  render(); persist();
}
function toggleBucket(fk, prio){
  const key = fk+'|'+prio;
  if(expandedBuckets.has(key)){
    expandedBuckets.delete(key);
    activeItems(fk).filter(i => i.prioridade === prio).forEach(i => expandedItems.delete(i.id));
  } else {
    expandedBuckets.add(key);
    ensureItemPositions(fk, prio);
  }
  render(); persist();
}
function selectItem(id){
  selectedItem = id;
  selectedFrente = null;
  selectedSub = null;
  if(expandedItems.has(id)) expandedItems.delete(id);
  else { expandedItems.add(id); ensureSubPositions(id); }
  render(); persist();
}
function selectSubtarefa(itemId, subId){
  selectedSub = {itemId, subId};
  selectedItem = itemId;
  selectedFrente = null;
  render(); persist();
}
function navigateToItem(id){
  const it = ITEMS_BY_ID[id];
  if(!it) return;
  selectedItem = id;
  selectedFrente = null;
  // Cancelados não aparecem no mapa — só atualiza painel
  if(it.status === 'cancelado'){
    render(); persist(); return;
  }
  if(it.status === 'entregue' && !showHistorico){
    showHistorico = true; updateHistoricoBtn();
  }
  if(!expandedFrentes.has(it.frente)) {
    expandedFrentes.add(it.frente);
    ensureBucketPositions(it.frente);
  }
  const bkey = it.frente+'|'+it.prioridade;
  if(!expandedBuckets.has(bkey)){
    expandedBuckets.add(bkey);
    ensureItemPositions(it.frente, it.prioridade);
  }
  panTo(positions['item:'+id]);
  render(); persist();
}
function panTo(worldPos){
  const rect = viewport.getBoundingClientRect();
  // we want world point at viewport center
  pan.x = -worldPos.x * zoom;
  pan.y = -worldPos.y * zoom;
}
function resetAll(){
  if(!confirm('Resetar posições e estado do mapa?')) return;
  positions = {};
  expandedFrentes.clear();
  expandedBuckets.clear();
  expandedItems.clear();
  selectedItem = null; selectedFrente = null;
  pan = {x:0, y:0}; zoom = 1;
  searchQ = ''; searchInput.value = '';
  showHistorico = false; updateHistoricoBtn();
  ensureFrentePositions();
  render(); persist();
}
function collapseAll(){
  expandedFrentes.clear();
  expandedBuckets.clear();
  expandedItems.clear();
  render(); persist();
}
function fitView(){
  pan = {x:0, y:0}; zoom = 1;
  applyTransform(); persist();
}

// ===== Interactions on nodes =====
function attachInteractions(el, onClick){
  let startX, startY, origPos, moved, downTime;
  el.addEventListener('mousedown', e => {
    if(e.button !== 0) return;
    e.stopPropagation();
    startX = e.clientX; startY = e.clientY;
    moved = false;
    downTime = Date.now();
    const key = el.dataset.key;
    origPos = positions[key] ? {...positions[key]} : null;
    const onMove = ev => {
      const dx = ev.clientX - startX, dy = ev.clientY - startY;
      if(!moved && Math.abs(dx)+Math.abs(dy) > 4){moved = true; el.classList.add('dragging');}
      if(moved && origPos){
        positions[key] = {x: origPos.x + dx/zoom, y: origPos.y + dy/zoom};
        el.style.left = positions[key].x + 'px';
        el.style.top = positions[key].y + 'px';
        // re-render links on the fly
        const visibleItemIds = new Set();
        expandedFrentes.forEach(fk => {
          bucketsForFrente(fk).forEach(prio => {
            if(expandedBuckets.has(fk+'|'+prio)){
              activeItems(fk).filter(i => i.prioridade === prio).forEach(i => visibleItemIds.add(i.id));
            }
          });
        });
        renderLinks(visibleItemIds);
      }
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      el.classList.remove('dragging');
      if(!moved){ onClick(); }
      else persist();
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });
}

// ===== Pan / zoom on viewport =====
let panning = false, panStart = null;
viewport.addEventListener('mousedown', e => {
  if(e.target.closest('.node')) return;
  if(e.button !== 0) return;
  panning = true;
  panStart = {x:e.clientX, y:e.clientY, px:pan.x, py:pan.y};
  viewport.classList.add('panning');
});
window.addEventListener('mousemove', e => {
  if(!panning) return;
  pan.x = panStart.px + (e.clientX - panStart.x);
  pan.y = panStart.py + (e.clientY - panStart.y);
  applyTransform();
});
window.addEventListener('mouseup', () => {
  if(panning){panning = false; viewport.classList.remove('panning'); persist();}
});
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const cx = e.clientX - rect.left - rect.width/2;
  const cy = e.clientY - rect.top - rect.height/2;
  const factor = e.deltaY < 0 ? 1.12 : 1/1.12;
  const newZoom = Math.max(0.18, Math.min(2.8, zoom * factor));
  const worldX = (cx - pan.x)/zoom;
  const worldY = (cy - pan.y)/zoom;
  pan.x = cx - worldX * newZoom;
  pan.y = cy - worldY * newZoom;
  zoom = newZoom;
  applyTransform(); persist();
}, {passive:false});

// ===== Toolbar =====
document.getElementById('btn-zoom-in').onclick = () => { zoom = Math.min(2.8, zoom*1.15); applyTransform(); persist(); };
document.getElementById('btn-zoom-out').onclick = () => { zoom = Math.max(0.18, zoom/1.15); applyTransform(); persist(); };
document.getElementById('btn-fit').onclick = fitView;
document.getElementById('btn-collapse').onclick = collapseAll;
document.getElementById('btn-reset').onclick = resetAll;
function updateHistoricoBtn(){
  const b = document.getElementById('btn-hist');
  if(!b) return;
  b.textContent = showHistorico ? '● Entregues visíveis' : '○ Entregues ocultos';
  b.style.color = showHistorico ? 'var(--success)' : '';
}
document.getElementById('btn-hist').onclick = () => {
  showHistorico = !showHistorico;
  updateHistoricoBtn();
  render(); persist();
};
updateHistoricoBtn();

// Filtro de data (criada)
function updateDateChips(){
  document.querySelectorAll('.df-chip[data-dpm]').forEach(b=>b.classList.toggle('on', datePresetMap===b.dataset.dpm));
  const ob=document.getElementById('dfm-open'); if(ob) ob.classList.toggle('on', openOnlyMap);
}
function clearDateInputs(){ const s=document.getElementById('dfm-start'),e=document.getElementById('dfm-end'); if(s)s.value=''; if(e)e.value=''; }
document.querySelectorAll('.df-chip[data-dpm]').forEach(b=>{
  b.onclick=()=>{ datePresetMap=(datePresetMap===b.dataset.dpm?'':b.dataset.dpm); dateFilterStart=''; dateFilterEnd=''; clearDateInputs(); updateDateChips(); render(); };
});
(function(){ const ob=document.getElementById('dfm-open'); if(ob) ob.onclick=()=>{ openOnlyMap=!openOnlyMap; updateDateChips(); render(); }; })();
(function(){ const s=document.getElementById('dfm-start'); if(s) s.onchange=()=>{ dateFilterStart=s.value; datePresetMap=''; updateDateChips(); render(); }; })();
(function(){ const e=document.getElementById('dfm-end'); if(e) e.onchange=()=>{ dateFilterEnd=e.value; datePresetMap=''; updateDateChips(); render(); }; })();
(function(){ const c=document.getElementById('dfm-clear'); if(c) c.onclick=()=>{ datePresetMap=''; openOnlyMap=false; dateFilterStart=''; dateFilterEnd=''; clearDateInputs(); updateDateChips(); render(); }; })();
updateDateChips();

// Search
let searchTimer;
searchInput.addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQ = e.target.value;
    // auto-expand frentes that contain matches
    if(searchQ.trim()){
      const q = searchQ.toLowerCase();
      ITEMS.forEach(i => {
        if(i.status === 'cancelado') return;
        if(i.id.toLowerCase().includes(q) || i.title.toLowerCase().includes(q)){
          if(i.status === 'entregue' && !showHistorico){
            showHistorico = true; updateHistoricoBtn();
          }
          expandedFrentes.add(i.frente);
          ensureBucketPositions(i.frente);
          const bkey = i.frente+'|'+i.prioridade;
          expandedBuckets.add(bkey);
          ensureItemPositions(i.frente, i.prioridade);
        }
      });
      render();
    } else {
      applySearchVisual();
    }
  }, 150);
});

// Keyboard
document.addEventListener('keydown', e => {
  if(document.activeElement === searchInput) return;
  if(e.key === 'Escape'){selectedItem = null; selectedFrente = null; selectedSub = null; render(); persist();}
  if(e.key === '0'){fitView();}
  if(e.key === '+' || e.key === '='){document.getElementById('btn-zoom-in').click();}
  if(e.key === '-'){document.getElementById('btn-zoom-out').click();}
});

// Init
ensureFrentePositions();
render();
</script>
